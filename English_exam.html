async function load(){let bin=Uint8Array.from(atob(B64),c=>c.charCodeAt(0));let ds=new DecompressionStream("gzip");let stream=new Blob([bin]).stream().pipeThrough(ds);DATA=JSON.parse(await new Response(stream).text());units();make()}
function sh(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function sm(a,n){return sh(a).slice(0,Math.min(n,a.length))}
function es(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function chosen(){let b=[...document.querySelectorAll(".uc")],c=b.filter(x=>x.checked).map(x=>+x.value);return c.length?c:[1,2,3,4,5,6,7,8,9]}
function units(){let w=document.getElementById("units");w.innerHTML='<span class=small>选择抽题单元：</span>';for(let u=1;u<=9;u++)w.insertAdjacentHTML("beforeend",`<label><input type=checkbox class=uc value="${u}" checked> Unit ${u}</label>`)}
function fil(a,u){return a.filter(x=>u.includes(+x.u))}
function make(){let u=chosen();let c=sm(fil(DATA.c,u),15),right=c.map(x=>x.raw),other=DATA.c.map(x=>x.raw).filter(w=>!right.includes(w)),bank=sh([...right,...sm([...new Set(other)],19-right.length)]).slice(0,19);cur={m:sm(fil(DATA.m,u),30),j:sm(fil(DATA.j,u),15),c,bank};render();document.getElementById("score").style.display="none"}
function mc(q,i){let ops=q.o.map((op,k)=>`<label class=opt><input type=radio name=m${i} value="${L[k]}"><span><b>${L[k]}.</b> ${es(op)}</span></label>`).join("");return `<div class=q data-t=m data-a="${q.a}"><div class=head><div class=qt>${i+1}. ${es(q.q)}</div><span class=tag>Unit ${q.u}</span></div><div class=opts>${ops}</div><div class=fb></div></div>`}
function ju(q,i){return `<div class=q data-t=j data-a="${q.a}"><div class=head><div class=qt>${i+1}. ${es(q.q)}</div><span class=tag>Unit ${q.u}</span></div><div class=opts><label class=opt><input type=radio name=j${i} value=A><span><b>A.</b> True / 正确</span></label><label class=opt><input type=radio name=j${i} value=B><span><b>B.</b> False / 错误</span></label></div><div class=fb></div></div>`}
function cl(q,i){return `<div class=q data-t=c data-a="${es(q.a)}" data-raw="${es(q.raw)}"><div class=head><div class=qt>${i+1}. ${es(q.q)}</div><span class=tag>Unit ${q.u}</span></div><div class=answer-row><span class=small>从词库中选词并变形：</span><input type=text name=c${i} placeholder="请输入变形后的答案"></div><div class=fb></div></div>`}
function render(){document.getElementById("paper").innerHTML=`<section class=sec><h2>Part I Multiple-choice Questions / 选择题</h2><p class=small>共30道。请选择最合适的答案。</p>${cur.m.map(mc).join("")}</section><section class=sec><h2>Part II Judgments / 判断题</h2><p class=small>共15道。A=True，B=False。</p>${cur.j.map(ju).join("")}</section><section class=sec><h2>Part III Cloze / 19选15变形填空</h2><p class=small>共15道。先从下方19个原始词中判断应选哪个词，再把它变成正确形式填入空白处。</p><div class=bank>${cur.bank.map(w=>`<span class=word>${es(w)}</span>`).join("")}</div>${cur.c.map(cl).join("")}</section>`;scrollTo({top:0,behavior:"smooth"})}
function norm(s){return String(s||"").trim().toLowerCase().replace(/\s+/g," ")}
function grade(){let sc={m:[0,cur.m.length],j:[0,cur.j.length],c:[0,cur.c.length]};document.querySelectorAll(".q").forEach(q=>{let t=q.dataset.t,a=q.dataset.a,u="";q.classList.remove("ok","bad");q.querySelectorAll(".opt").forEach(o=>o.classList.remove("ok","bad"));let fb=q.querySelector(".fb");if(t=="c")u=q.querySelector("input[type=text]").value;else{let ck=q.querySelector("input:checked");u=ck?ck.value:"";q.querySelectorAll(".opt").forEach(o=>{let ip=o.querySelector("input");if(ip.value==a)o.classList.add("ok");if(ip.checked&&ip.value!=a)o.classList.add("bad")})}let ok=t=="c"?norm(u)==norm(a):u==a;if(ok){sc[t][0]++;q.classList.add("ok");fb.className="fb ok";fb.textContent=t=="c"?`正确。原始词：${q.dataset.raw}；应填：${a}`:`正确。答案：${a}`}else{q.classList.add("bad");fb.className="fb bad";fb.textContent=t=="c"?`错误。你的答案：${u||"未作答"}；原始词：${q.dataset.raw}；应填：${a}`:`错误。你的答案：${u||"未作答"}；正确答案：${a}`}});let r=sc.m[0]+sc.j[0]+sc.c[0],tot=sc.m[1]+sc.j[1]+sc.c[1],p=tot?Math.round(r/tot*100):0,s=document.getElementById("score");s.style.display="block";s.innerHTML=`<div class=score>总分：${r} / ${tot}（${p}%）</div><div class=small>选择题：${sc.m[0]}/${sc.m[1]}；判断题：${sc.j[0]}/${sc.j[1]}；填空题：${sc.c[0]}/${sc.c[1]}</div>`;s.scrollIntoView({behavior:"smooth",block:"nearest"})}
function reset(){document.querySelectorAll("input").forEach(x=>{if(x.type=="radio")x.checked=false;if(x.type=="text")x.value=""});document.querySelectorAll(".q,.opt").forEach(x=>x.classList.remove("ok","bad"));document.querySelectorAll(".fb").forEach(x=>{x.className="fb";x.textContent=""});document.getElementById("score").style.display="none"}
document.getElementById("g").onclick=make;document.getElementById("sub").onclick=grade;document.getElementById("r").onclick=reset;load();
</script></body></html>
