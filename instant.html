<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>英语科研论文写作随机练习｜即时翻译解析版</title>
<style>
:root{--blue:#2563eb;--blue2:#1d4ed8;--bg:#f5f7fb;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--ok:#16a34a;--bad:#dc2626}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:15px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}
header{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:white;padding:28px 18px}
.wrap,main{max-width:1120px;margin:auto}
main{margin:18px auto 48px;padding:0 16px}
h1{margin:0 0 8px;font-size:28px}
h2{margin:0 0 8px;font-size:22px}
button{border:0;background:var(--blue);color:white;padding:10px 16px;border-radius:10px;font-weight:700;cursor:pointer}
button:hover{background:var(--blue2)}
button.s{background:#eef2ff;color:#1d4ed8}
button.d{background:#fee2e2;color:#b91c1c}
.panel,.sec,.q,.wrongbox{background:white;border:1px solid var(--line);border-radius:16px;box-shadow:0 6px 18px #0f172a0d}
.panel{padding:18px;margin-bottom:18px;position:sticky;top:0;z-index:2}
.bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}
.small{font-size:13px;color:var(--muted)}
.units{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px 14px}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:13px;font-weight:700;margin:10px 6px 0 0}
#score{display:none;margin-top:14px;padding:14px;border-radius:14px;background:#f8fafc;border:1px solid #e5e7eb}
.score{font-size:20px;font-weight:800}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.stat{background:white;border:1px solid #e5e7eb;border-radius:12px;padding:10px;text-align:center}
.stat b{display:block;font-size:18px}
.sec{padding:18px;margin:18px 0}
.q{padding:16px;margin:14px 0;box-shadow:none}
.head{display:flex;gap:10px;justify-content:space-between;margin-bottom:10px}
.qt{font-weight:700}
.tag{white-space:nowrap;background:#f3f4f6;color:#4b5563;border-radius:999px;padding:2px 8px;font-size:12px}
.opts{display:grid;gap:8px;margin-top:8px}
.opt{display:flex;gap:8px;align-items:flex-start;padding:9px 10px;border:1px solid var(--line);border-radius:10px;cursor:pointer}
.opt:hover{background:#f9fafb}
.opt.ok{border-color:#16a34a80;background:#f0fdf4}
.opt.bad{border-color:#dc262680;background:#fef2f2}
.q.ok{border-color:#16a34a80}
.q.bad{border-color:#dc262680}
.bank{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 16px;padding:12px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px}
.word{padding:4px 10px;border-radius:999px;background:white;border:1px solid #d1d5db;font-weight:700}
.answer-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px}
input[type=text]{width:min(100%,420px);padding:10px 12px;border-radius:10px;border:1px solid #cbd5e1;background:white;font-size:15px}
.fb{display:none;margin-top:10px;padding:10px 12px;border-radius:10px;font-size:14px}
.fb.ok{display:block;color:#166534;background:#dcfce7;border:0}
.fb.bad{display:block;color:#991b1b;background:#fee2e2;border:0}
.exp{display:none;margin-top:10px;padding:12px;border-radius:12px;background:#f8fafc;border:1px solid #e5e7eb;color:#374151}
.q.answered .exp{display:block}
.exp b{color:#1d4ed8}
.exp .cn{margin:8px 0;padding:10px;border-radius:10px;background:white;border:1px solid #e5e7eb}
.exp .explain{margin:8px 0;padding:10px;border-radius:10px;background:#fff7ed;border:1px solid #fed7aa}
.wrongbox{display:none;padding:18px;margin:18px 0}
.wrongitem{padding:10px;border-bottom:1px solid #e5e7eb}
.wrongitem:last-child{border-bottom:0}
.mobile-actions{display:none}
footer{color:#6b7280;text-align:center;padding:28px}
@media(max-width:700px){
  body{font-size:14px;padding-bottom:76px}
  header{padding:18px 14px}
  h1{font-size:22px;line-height:1.25}
  header p{font-size:13px}
  main{margin:10px auto 32px;padding:0 10px}
  .panel{position:static;padding:12px;border-radius:14px;margin-bottom:12px}
  .bar{display:block}
  .bar>div:last-child{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .bar>div:last-child button:first-child{grid-column:1/-1}
  button{width:100%;padding:12px 10px;font-size:15px}
  .units{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:#f8fafc;padding:10px;border-radius:12px;max-height:132px;overflow:auto}
  .units .small{grid-column:1/-1}
  .units label{font-size:13px}
  .badge{font-size:12px;margin:8px 4px 0 0}
  .statgrid{grid-template-columns:repeat(2,1fr)}
  .sec{padding:12px;margin:12px 0;border-radius:14px}
  .sec h2{font-size:18px;line-height:1.35}
  .q{padding:12px;margin:10px 0;border-radius:12px}
  .head{display:block;margin-bottom:8px}
  .qt{font-size:15px;line-height:1.55}
  .tag{display:inline-block;margin-top:6px}
  .opts{gap:10px}
  .opt{padding:12px;border-radius:12px;font-size:14px;min-height:46px}
  .opt input{transform:scale(1.15);margin-top:5px}
  .bank{position:sticky;top:0;z-index:1;max-height:126px;overflow-y:auto;gap:6px;padding:10px;margin:10px 0 12px;border-radius:12px}
  .word{font-size:13px;padding:3px 8px}
  .answer-row{display:block}
  input[type=text]{width:100%;font-size:16px;padding:12px;margin-top:6px}
  .fb,.exp{font-size:13px}
  .mobile-actions{position:fixed;left:0;right:0;bottom:0;z-index:99;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px;background:rgba(255,255,255,.96);border-top:1px solid #e5e7eb;box-shadow:0 -6px 18px #0f172a1a}
  .mobile-actions button{padding:11px 6px;font-size:14px;border-radius:10px}
  footer{padding:18px 12px 90px}
}

@media(min-width:701px){
  .sec:nth-of-type(3) .bank{
    position:sticky;
    top:165px;
    z-index:4;
    max-height:120px;
    overflow:auto;
    box-shadow:0 8px 22px #0f172a14;
    background:rgba(248,250,252,.98);
    backdrop-filter:blur(6px);
  }
}

@media print{.panel,button,.units,footer,.mobile-actions{display:none!important}body{background:white}.sec,.q{box-shadow:none;border-color:#ccc}}
</style>
</head>
<body>
<header><div class="wrap"><h1>英语科研论文写作 1–9 单元随机练习</h1><p>即时翻译解析版：题目和选项保持英文；答题后显示该题中文翻译、标准答案和原文解释。</p></div></header>
<main>
  <div class="panel">
    <div class="bar">
      <div>
        <b>学习模式控制台</b>
        <div class="small" id="bankinfo"></div>
      </div>
      <div>
        <button id="g">生成新题</button>
        <button id="sub" class="s">交卷 / 查看全部</button>
        <button id="r" class="d">清空作答</button>
      </div>
    </div>
    <div class="units" id="units"></div>
    <span class="badge">Part I：30道选择题</span>
    <span class="badge">Part II：15道判断题</span>
    <span class="badge">Part III：19选15变形填空</span>
    <span class="badge">即时翻译 + 原文解析</span>
    <div id="score"></div>
  </div>
  <div id="paper">正在加载题库……</div>
  <div id="wrongbox" class="wrongbox"></div>
</main>
<div class="mobile-actions"><button id="mg">新题</button><button id="ms" class="s">交卷</button><button id="mr" class="d">清空</button></div>
<footer>本网站由上传的《英语期末复习》题库生成。</footer>

<script>
const DATA={"m": [{"u": 1, "no": "01", "q": "Which of the following sources cannot be classified as the primary sources?", "a": "D", "opts": [{"label": "A", "text": "Scientific journals. 科学期刊。", "show": "Scientific journals"}, {"label": "B", "text": "Government documents. 政府文件。", "show": "Government documents"}, {"label": "C", "text": "Interviews and surveys. 访谈和调查。", "show": "Interviews and surveys"}, {"label": "D", "text": "Journals of abstracts. 摘要期刊。", "show": "Journals of abstracts"}], "trans": "以下哪一项不能被归类为第一手资料？（D）", "explain": "第一手资料通常指原始资料，如原始研究论文、政府文件、访谈和调查。摘要期刊是对已有文献进行概括、整理或索引的资料，不属于第一手资料。", "q_show": "Which of the following sources cannot be classified as the primary sources?"}, {"u": 1, "no": "02", "q": "Which of the following sources cannot be classified as the secondary sources?", "a": "A", "opts": [{"label": "A", "text": "Scientific journals. 科学期刊。", "show": "Scientific journals"}, {"label": "B", "text": "Monographs. 专著。", "show": "Monographs"}, {"label": "C", "text": "Bibliographies. 书目。", "show": "Bibliographies"}, {"label": "D", "text": "Essays or reviews. 论文或评论。", "show": "Essays or reviews"}], "trans": "以下哪一项不能被归类为第二手资料？（A）", "explain": "第二手资料通常是对第一手资料的解释、评论或分析。科学期刊中常包含原始研究论文，因此更接近第一手资料，不一定属于第二手资料。", "q_show": "Which of the following sources cannot be classified as the secondary sources?"}, {"u": 1, "no": "03", "q": "Which of the following sources cannot be classified as the tertiary sources?", "a": "D", "opts": [{"label": "A", "text": "Fact books. 事实手册。", "show": "Fact books"}, {"label": "B", "text": "Indexes. 索引。", "show": "Indexes"}, {"label": "C", "text": "Chronologies. 年表。", "show": "Chronologies"}, {"label": "D", "text": "Archival materials. 档案材料。", "show": "Archival materials"}], "trans": "以下哪一项不能被归类为第三手资料？（D）", "explain": "第三手资料通常是对第一手和第二手资料进行整理、汇总或索引的资料，如事实手册、索引和年表。档案材料属于原始记录，更接近第一手资料。", "q_show": "Which of the following sources cannot be classified as the tertiary sources?"}, {"u": 1, "no": "04", "q": "In the process of database information retrieval（检索）, the following elements of information should be guaranteed except for ______.", "a": "A", "opts": [{"label": "A", "text": "quantity 数量。", "show": "quantity"}, {"label": "B", "text": "quality 质量。", "show": "quality"}, {"label": "C", "text": "accuracy 准确性。", "show": "accuracy"}, {"label": "D", "text": "reliability 可靠性。", "show": "reliability"}], "trans": "在数据库信息检索过程中，除以下哪一项外，其他信息要素都应得到保证？（A）", "explain": "信息检索更强调信息的质量、准确性和可靠性。数量不是最核心的保证，因为结果太多可能会包含大量无关信息。", "q_show": "In the process of database information retrieval, the following elements of information should be guaranteed except for ______."}, {"u": 1, "no": "05", "q": "Operators (modifiers) such as AND, NOT, and OR are ______ operators.", "a": "A", "opts": [{"label": "A", "text": "Boolean logic 布尔逻辑。", "show": "Boolean logic"}, {"label": "B", "text": "Truncation 截词。", "show": "Truncation"}, {"label": "C", "text": "wildcard 通配符。", "show": "wildcard"}, {"label": "D", "text": "Proximity 邻近。", "show": "Proximity"}], "trans": "AND、NOT 和 OR 等运算符属于 ______ 运算符。（A）", "explain": "AND、OR、NOT 是布尔逻辑运算符，主要用于组合、扩大或排除检索词。", "q_show": "Operators (modifiers) such as AND, NOT, and OR are ______ operators."}, {"u": 1, "no": "06", "q": "The symbol “?” is mainly used as a ______ operator.", "a": "C", "opts": [{"label": "A", "text": "Boolean logic 布尔逻辑。", "show": "Boolean logic"}, {"label": "B", "text": "Truncation 截词。", "show": "Truncation"}, {"label": "C", "text": "wildcard 通配符。", "show": "wildcard"}, {"label": "D", "text": "Proximity 邻近。", "show": "Proximity"}], "trans": "符号 “?” 主要用作 ______ 运算符。（C）", "explain": "“?” 通常用作通配符，可以替代检索词中的一个未知字符。", "q_show": "The symbol “?” is mainly used as a ______ operator."}, {"u": 1, "no": "07", "q": "To improve your search results, which of the following strategies cannot be used to create a list of key words?", "a": "D", "opts": [{"label": "A", "text": "Find terms that start with some scoping searches. 通过一些初步范围检索来寻找术语。", "show": "Find terms that start with some scoping searches"}, {"label": "B", "text": "Identify your research question. 明确你的研究问题。", "show": "Identify your research question"}, {"label": "C", "text": "Break down your research question into key words. 将你的研究问题分解为关键词。", "show": "Break down your research question into key words"}, {"label": "D", "text": "Pay attention to irrelevant index terms (subject headings). 关注无关的索引词或主题词。", "show": "Pay attention to irrelevant index terms (subject headings)"}], "trans": "为了改进检索结果，以下哪种策略不能用于创建关键词列表？（D）", "explain": "创建关键词列表时，应关注与研究主题相关的关键词、同义词和主题词。无关的索引词会降低检索准确性。", "q_show": "To improve your search results, which of the following strategies cannot be used to create a list of key words?"}, {"u": 1, "no": "08", "q": "Which of the following strategies cannot be used to broaden your search results?", "a": "D", "opts": [{"label": "A", "text": "Find information in the references in your textbooks or papers. 从教材或论文的参考文献中寻找信息。", "show": "Find information in the references in your textbooks or papers"}, {"label": "B", "text": "Search based on information such as authors, references, citations, key words, etc. 根据作者、参考文献、引文、关键词等信息进行检索。", "show": "Search based on information such as authors, references, citations, key words, etc"}, {"label": "C", "text": "Click on related articles to expand your sources. 点击相关文章以扩展信息来源。", "show": "Click on related articles to expand your sources"}, {"label": "D", "text": "Use more specific search terms. 使用更具体的检索词。", "show": "Use more specific search terms"}], "trans": "以下哪种策略不能用于扩大检索结果？（D）", "explain": "使用更具体的检索词通常会缩小检索范围，而不是扩大检索范围。因此 D 不能用于扩大检索结果。", "q_show": "Which of the following strategies cannot be used to broaden your search results?"}, {"u": 1, "no": "09", "q": "When retrieving information, which of the following methods cannot improve the quality of your search result?", "a": "C", "opts": [{"label": "A", "text": "Pay attention to highly cited articles. 关注高被引文章。", "show": "Pay attention to highly cited articles"}, {"label": "B", "text": "Limit the research results by dates, key words, etc. 通过日期、关键词等限制检索结果。", "show": "Limit the research results by dates, key words, etc"}, {"label": "C", "text": "Use more general search terms. 使用更宽泛的检索词。", "show": "Use more general search terms"}, {"label": "D", "text": "Select the appropriate Library Database. 选择合适的图书馆数据库。", "show": "Select the appropriate Library Database"}], "trans": "在检索信息时，以下哪种方法不能提高检索结果的质量？（C）", "explain": "更宽泛的检索词可能会增加结果数量，但也容易带来无关信息，因此不能有效提高检索结果质量。", "q_show": "When retrieving information, which of the following methods cannot improve the quality of your search result?"}, {"u": 2, "no": "01", "q": "Which of the following factors cannot be used as the key attributes（属性） for a good research question of a research paper?", "a": "D", "opts": [{"label": "A", "text": "Specificity. 具体性。", "show": "Specificity"}, {"label": "B", "text": "Specific relevance to a broad scientific community. 与广泛科学共同体具有具体相关性。", "show": "Specific relevance to a broad scientific community"}, {"label": "C", "text": "Originality. 原创性。", "show": "Originality"}, {"label": "D", "text": "General relevance to a broad scientific community. 与广泛科学共同体具有一般相关性。", "show": "General relevance to a broad scientific community"}], "trans": "以下哪一项不能作为科研论文中一个好研究问题的关键属性？（D）", "explain": "好的研究问题应该具体、有原创性，并且与较广泛的学术群体有明确而具体的关联。“一般相关性”太宽泛，不能作为好的研究问题的关键属性。", "q_show": "Which of the following factors cannot be used as the key attributes for a good research question of a research paper?"}, {"u": 2, "no": "02", "q": "Which of the following is irrelevant to the quality of a research paper?", "a": "A", "opts": [{"label": "A", "text": "Correct journal format. 正确的期刊格式。", "show": "Correct journal format"}, {"label": "B", "text": "Creativity. 创造性。", "show": "Creativity"}, {"label": "C", "text": "Originality. 原创性。", "show": "Originality"}, {"label": "D", "text": "Repeatability. 可重复性。", "show": "Repeatability"}], "trans": "以下哪一项与科研论文的质量无关？（A）", "explain": "论文质量主要体现在创造性、原创性和可重复性等方面。期刊格式属于投稿规范或排版要求，不是论文研究质量本身的核心指标。", "q_show": "Which of the following is irrelevant to the quality of a research paper?"}, {"u": 2, "no": "03", "q": "Which of the following is irrelevant to the writing skills of a research paper?", "a": "A", "opts": [{"label": "A", "text": "Academic significance. 学术意义。", "show": "Academic significance"}, {"label": "B", "text": "Correct journal format. 正确的期刊格式。", "show": "Correct journal format"}, {"label": "C", "text": "Sufficient evidence. 充分的证据。", "show": "Sufficient evidence"}, {"label": "D", "text": "Accurate expressions. 准确的表达。", "show": "Accurate expressions"}, {"label": "E", "text": "Complex sentences. 复杂句。", "show": "Complex sentences"}, {"label": "F", "text": "Convincing and valid. 有说服力且有效。", "show": "Convincing and valid"}, {"label": "G", "text": "Standardization. 规范性。", "show": "Standardization"}, {"label": "H", "text": "Logical development of meaning. 意义发展的逻辑性。", "show": "Logical development of meaning"}, {"label": "I", "text": "Academic property. 学术性。", "show": "Academic property"}, {"label": "J", "text": "complete, concise, clear and coherent. 完整、简洁、清楚、连贯。", "show": "complete, concise, clear and coherent"}, {"label": "K", "text": "Correct grammar. 正确的语法。", "show": "Correct grammar"}], "trans": "以下哪一项与科研论文的写作技巧无关？（A）", "explain": "写作技巧主要包括表达、逻辑、语法、结构和规范等方面。学术意义属于研究内容本身的价值，不属于写作技巧。", "q_show": "Which of the following is irrelevant to the writing skills of a research paper?"}, {"u": 2, "no": "04", "q": "Compared with other styles of writing, which of the following is not unique to a research paper?", "a": "A", "opts": [{"label": "A", "text": "It repeats tentatively the ideas of others. 它试探性地重复他人的观点。", "show": "It repeats tentatively the ideas of others"}, {"label": "B", "text": "It is a work that shows your innovation. 它是展示你创新性的作品。", "show": "It is a work that shows your innovation"}, {"label": "C", "text": "It acknowledges all sources you have used. 它承认你使用过的所有资料来源。", "show": "It acknowledges all sources you have used"}, {"label": "D", "text": "It shows that you are part of a community of scholars. 它表明你是学术共同体的一员。", "show": "It shows that you are part of a community of scholars"}], "trans": "与其他写作类型相比，以下哪一项不是科研论文独有的特点？（A）", "explain": "科研论文强调创新、引用来源和学术共同体意识，而不是简单重复他人的观点。因此 A 不是科研论文的独有特点。", "q_show": "Compared with other styles of writing, which of the following is not unique to a research paper?"}, {"u": 2, "no": "05", "q": "Compared with other forms of academic or professional writing, which of the following does not belong to common characteristics of research papers?", "a": "F", "opts": [{"label": "A", "text": "Evidence-based. 以证据为基础。", "show": "Evidence-based"}, {"label": "B", "text": "Structured and organized. 结构清晰、有组织。", "show": "Structured and organized"}, {"label": "C", "text": "Formal and objective. 正式且客观。", "show": "Formal and objective"}, {"label": "D", "text": "Citations and references. 引文和参考文献。", "show": "Citations and references"}, {"label": "E", "text": "Peer-reviewed. 同行评审。", "show": "Peer-reviewed"}, {"label": "F", "text": "Subjective and biased. 主观且有偏见。", "show": "Subjective and biased"}], "trans": "与其他学术或专业写作形式相比，以下哪一项不属于科研论文的共同特征？（F）", "explain": "科研论文应当以证据为基础，结构清晰，语言正式客观，并重视引用和同行评审。“主观且有偏见”不符合科研论文的特征。", "q_show": "Compared with other forms of academic or professional writing, which of the following does not belong to common characteristics of research papers?"}, {"u": 2, "no": "06", "q": "Most research proposals will contain the following elements except for ______.", "a": "A", "opts": [{"label": "A", "text": "Preface. 前言。", "show": "Preface"}, {"label": "B", "text": "Title page. 标题页。", "show": "Title page"}, {"label": "C", "text": "Introduction. 引言。", "show": "Introduction"}, {"label": "D", "text": "Research design. 研究设计。", "show": "Research design"}], "trans": "大多数研究计划书通常包含以下要素，除了 ______。（A）", "explain": "研究计划书通常包括标题页、引言、研究设计等内容。“Preface”一般不是研究计划书必不可少的组成部分。", "q_show": "Most research proposals will contain the following elements except for ______."}, {"u": 2, "no": "07", "q": "Which of the following elements is not indispensable in a research proposal?", "a": "A", "opts": [{"label": "A", "text": "To tell the thesis committee that your supervisor agrees to continue the project. 告诉论文委员会你的导师同意继续该项目。", "show": "To tell the thesis committee that your supervisor agrees to continue the project"}, {"label": "B", "text": "To address what you plan to accomplish and how you are going to do it. 说明你计划完成什么以及准备如何完成。", "show": "To address what you plan to accomplish and how you are going to do it"}, {"label": "C", "text": "To show that you have a good grasp of the relevant literature and the major issues. 表明你很好地掌握了相关文献和主要问题。", "show": "To show that you have a good grasp of the relevant literature and the major issues"}, {"label": "D", "text": "To demonstrate that your writing is coherent, clear and compelling. 展示你的写作连贯、清晰且有说服力。", "show": "To demonstrate that your writing is coherent, clear and compelling"}], "trans": "以下哪一项不是研究计划书中必不可少的要素？（A）", "explain": "研究计划书重点在于说明研究目标、研究方法、文献掌握情况和写作逻辑。导师是否同意继续项目不是研究计划书本身必不可少的内容。", "q_show": "Which of the following elements is not indispensable in a research proposal?"}, {"u": 2, "no": "08", "q": "The functions of the title in a research paper do not necessarily include ______.", "a": "D", "opts": [{"label": "A", "text": "To show the most important achievement(s) in the research. 展示研究中最重要的成果。", "show": "To show the most important achievement(s) in the research"}, {"label": "B", "text": "To indicate both the specific study and the general research field. 指明具体研究和总体研究领域。", "show": "To indicate both the specific study and the general research field"}, {"label": "C", "text": "To illustrate the unique research methodology. 说明独特的研究方法。", "show": "To illustrate the unique research methodology"}, {"label": "D", "text": "To create a sensational effect for the readers. 为读者制造轰动效果。", "show": "To create a sensational effect for the readers"}], "trans": "科研论文标题的功能不一定包括 ______。（D）", "explain": "科研论文标题应准确、简洁地反映研究内容、领域或方法，而不是追求夸张或轰动效果。", "q_show": "The functions of the title in a research paper do not necessarily include ______."}, {"u": 2, "no": "09", "q": "The broad categories（大类） of titles in research papers do not include ______ titles.", "a": "D", "opts": [{"label": "A", "text": "declarative. 陈述式的。", "show": "declarative"}, {"label": "B", "text": "informative. 信息型的。", "show": "informative"}, {"label": "C", "text": "interrogative. 疑问式的。", "show": "interrogative"}, {"label": "D", "text": "performative. 表演式的。", "show": "performative"}], "trans": "科研论文标题的大类不包括 ______ 标题。（D）", "explain": "科研论文标题常见类型包括陈述式、信息型和疑问式等。“performative”不是常见的科研论文标题类别。", "q_show": "The broad categories of titles in research papers do not include ______ titles."}, {"u": 2, "no": "10", "q": "In research papers, compound titles have a subtitle, which is not used to ______.", "a": "D", "opts": [{"label": "A", "text": "provide additional context. 提供额外背景。", "show": "provide additional context"}, {"label": "B", "text": "provide geographic or temporal scope of the research. 提供研究的地理或时间范围。", "show": "provide geographic or temporal scope of the research"}, {"label": "C", "text": "inform about the study design. 说明研究设计。", "show": "inform about the study design"}, {"label": "D", "text": "add irrelevant substance to a provocative or a literary title. 给刺激性或文学性标题添加无关内容。", "show": "add irrelevant substance to a provocative or a literary title"}], "trans": "在科研论文中，复合标题含有副标题，副标题不是用来 ______。（D）", "explain": "副标题应补充说明研究背景、范围或设计，不能添加与研究无关的内容。", "q_show": "In research papers, compound titles have a subtitle, which is not used to ______."}, {"u": 2, "no": "11", "q": "Which of the following phrases is not redundant（冗余的） in the title of a research paper?", "a": "D", "opts": [{"label": "A", "text": "“A study of…” “关于……的研究”。", "show": "“A study of…”"}, {"label": "B", "text": "“Investigation on…” “关于……的调查”。", "show": "“Investigation on…”"}, {"label": "C", "text": "“Research on…” “关于……的研究”。", "show": "“Research on…”"}, {"label": "D", "text": "“Plasticity of…” “……的可塑性”。", "show": "“Plasticity of…” “……"}], "trans": "以下哪一个短语在科研论文标题中不是冗余表达？（D）", "explain": "“A study of… / Investigation on… / Research on…” 这类表达常显得冗余，可以直接删去。而 “Plasticity of…” 是具体研究概念，不属于冗余表达。", "q_show": "Which of the following phrases is not redundant in the title of a research paper?"}, {"u": 2, "no": "12", "q": "Before a countable noun in plural form or uncountable noun in the title of a research paper, which of the following articles should be used?", "a": "D", "opts": [{"label": "A", "text": "A. 不定冠词 A。", "show": "A"}, {"label": "B", "text": "An. 不定冠词 An。", "show": "An"}, {"label": "C", "text": "The. 定冠词 The。", "show": "The"}, {"label": "D", "text": "Zero article. 零冠词。", "show": "Zero article"}], "trans": "在科研论文标题中，复数可数名词或不可数名词前应使用以下哪种冠词？（D）", "explain": "科研论文标题中，复数可数名词或不可数名词前通常不加冠词，即使用零冠词。", "q_show": "Before a countable noun in plural form or uncountable noun in the title of a research paper, which of the following articles should be used?"}, {"u": 2, "no": "13", "q": "APA Style uses two types of capitalization for titles of works (such as paper titles) and headings within works: ______ case and sentence case.", "a": "D", "opts": [{"label": "A", "text": "subjective. 主观的。", "show": "subjective"}, {"label": "B", "text": "objective. 客观的。", "show": "objective"}, {"label": "C", "text": "possessive. 所有格的。", "show": "possessive"}, {"label": "D", "text": "title. 标题式的。", "show": "title"}], "trans": "APA 格式对作品标题和文内标题使用两种大写方式：______ 式大写和句子式大写。（D）", "explain": "APA 格式中常见两种大小写规则：title case 和 sentence case。title case 指标题式大写。", "q_show": "APA Style uses two types of capitalization for titles of works (such as paper titles) and headings within works: ______ case and sentence case."}, {"u": 2, "no": "14", "q": "Which of the following words don’t need to be capitalized in the title of a research paper?", "a": "A", "opts": [{"label": "A", "text": "Conjunctions. 连词。", "show": "Conjunctions"}, {"label": "B", "text": "Verbs. 动词。", "show": "Verbs"}, {"label": "C", "text": "Adjectives. 形容词。", "show": "Adjectives"}, {"label": "D", "text": "Nouns. 名词。", "show": "Nouns"}], "trans": "科研论文标题中，以下哪类词不需要大写？（A）", "explain": "在标题式大写中，名词、动词、形容词等实词通常需要大写，而较短的连词一般不需要大写。", "q_show": "Which of the following words don’t need to be capitalized in the title of a research paper?"}, {"u": 3, "no": "01", "q": "A well-written abstract serves the following purposes except for ______.", "a": "A", "opts": [{"label": "A", "text": "Make search engines difficult to index your published paper. 使搜索引擎难以索引你发表的论文。", "show": "Make search engines difficult to index your published paper"}, {"label": "B", "text": "Help readers remember key points from your paper. 帮助读者记住论文的关键点。", "show": "Help readers remember key points from your paper"}, {"label": "C", "text": "Prepare readers to follow the detailed information, analyses, and arguments. 帮助读者为理解详细信息、分析和论证做好准备。", "show": "Prepare readers to follow the detailed information, analyses, and arguments"}, {"label": "D", "text": "Let readers get the gist or essence of your paper quickly. 让读者快速了解论文的主旨或核心内容。", "show": "Let readers get the gist or essence of your paper quickly"}], "trans": "一篇写得好的摘要具有以下作用，除了 ______。（A）", "explain": "摘要的作用是帮助读者快速了解论文内容，并方便检索和索引，而不是让搜索引擎难以索引论文，所以 A 是错误作用。", "q_show": "A well-written abstract serves the following purposes except for ______."}, {"u": 3, "no": "02", "q": "Generally, in an abstract, “Conclusion” refers to both ______ and Conclusion.", "a": "A", "opts": [{"label": "A", "text": "Discussion. 讨论。", "show": "Discussion"}, {"label": "B", "text": "Introduction. 引言。", "show": "Introduction"}, {"label": "C", "text": "Results. 结果。", "show": "Results"}, {"label": "D", "text": "Materials & Method. 材料与方法。", "show": "Materials & Method"}], "trans": "一般来说，在摘要中，“Conclusion” 同时指 ______ 和结论。（A）", "explain": "摘要中的 Conclusion 往往不仅总结研究结论，也包含对结果意义的讨论，因此通常包括 Discussion 和 Conclusion 的内容。", "q_show": "Generally, in an abstract, “Conclusion” refers to both ______ and Conclusion."}, {"u": 3, "no": "03", "q": "Which of the following descriptions of the abstract in a research paper is not right?", "a": "A", "opts": [{"label": "A", "text": "An abstract should be written before its complete paper is finished. 摘要应该在完整论文完成之前撰写。", "show": "An abstract should be written before its complete paper is finished"}, {"label": "B", "text": "An abstract should briefly present the most important points s of the paper. 摘要应简要呈现论文最重要的内容。", "show": "An abstract should briefly present the most important points s of the paper"}, {"label": "C", "text": "Necessary background information is indispensable. 必要的背景信息是不可缺少的。", "show": "Necessary background information is indispensable"}, {"label": "D", "text": "Results and conclusions are definitely the central components. 结果和结论无疑是核心组成部分。", "show": "Results and conclusions are definitely the central components"}], "trans": "以下关于科研论文摘要的描述，哪一项是不正确的？（A）", "explain": "摘要通常应在全文基本完成后撰写，这样才能准确概括研究内容。因此 A 的说法不正确。", "q_show": "Which of the following descriptions of the abstract in a research paper is not right?"}, {"u": 3, "no": "04", "q": "The abstract in a research paper should not ______.", "a": "A", "opts": [{"label": "A", "text": "be an excerpt（摘录） from your paper. 是论文中的摘录。", "show": "be an excerpt from your paper"}, {"label": "B", "text": "be a self-contained text. 是一段独立完整的文本。", "show": "be a self-contained text"}, {"label": "C", "text": "be fully understandable on its own. 本身能够被完全理解。", "show": "be fully understandable on its own"}, {"label": "D", "text": "reflect the structure of your larger work. 反映整篇论文的结构。", "show": "reflect the structure of your larger work"}], "trans": "科研论文中的摘要不应该 ______。（A）", "explain": "摘要不是从正文中直接摘抄一段，而应是对全文内容的独立概括。因此 A 是不应采用的做法。", "q_show": "The abstract in a research paper should not ______."}, {"u": 3, "no": "05", "q": "When writing an abstract, you should never refer to the ______ tense（时态）, as the research is already complete.", "a": "A", "opts": [{"label": "A", "text": "future. 将来时。", "show": "future"}, {"label": "B", "text": "present simple. 一般现在时。", "show": "present simple"}, {"label": "C", "text": "past simple. 一般过去时。", "show": "past simple"}, {"label": "D", "text": "present perfect. 现在完成时。", "show": "present perfect"}], "trans": "写摘要时，由于研究已经完成，你不应该使用 ______ 时态。（A）", "explain": "摘要描述的是已经完成的研究，不应使用将来时来表达研究内容。因此答案为 A。", "q_show": "When writing an abstract, you should never refer to the ______ tense, as the research is already complete."}, {"u": 3, "no": "06", "q": "In writing the “Introduction” of an abstract, ________ tense should be used.", "a": "A", "opts": [{"label": "A", "text": "present. 现在时。", "show": "present"}, {"label": "B", "text": "past. 过去时。", "show": "past"}, {"label": "C", "text": "future. 将来时。", "show": "future"}, {"label": "D", "text": "present perfect. 现在完成时。", "show": "present perfect"}], "trans": "在撰写摘要中的“引言”部分时，应使用 ______ 时态。（A）", "explain": "摘要引言部分通常介绍研究背景、研究领域或普遍事实，因此常使用现在时。", "q_show": "In writing the “Introduction” of an abstract, ________ tense should be used."}, {"u": 3, "no": "07", "q": "Which of the following tips cannot keep your abstract short and clear?", "a": "A", "opts": [{"label": "A", "text": "Avoid active voice. 避免使用主动语态。", "show": "Avoid active voice"}, {"label": "B", "text": "Avoid detailed descriptions. 避免详细描述。", "show": "Avoid detailed descriptions"}, {"label": "C", "text": "Avoid long sentences. 避免长句。", "show": "Avoid long sentences"}, {"label": "D", "text": "Avoid repetition and filler words. 避免重复和填充词。", "show": "Avoid repetition and filler words"}], "trans": "以下哪一条建议不能使摘要保持简短清晰？（A）", "explain": "主动语态通常更直接、更简洁，有助于表达清楚。避免主动语态反而不一定能使摘要简短清晰，因此 A 不合适。", "q_show": "Which of the following tips cannot keep your abstract short and clear?"}, {"u": 3, "no": "08", "q": "Which of the following statements about the length of an Abstract is not correct?", "a": "C", "opts": [{"label": "A", "text": "It is required by a specific journal. 它由具体期刊要求决定。", "show": "It is required by a specific journal"}, {"label": "B", "text": "It depends on the total number of words of the paper. 它取决于论文的总字数。", "show": "It depends on the total number of words of the paper"}, {"label": "C", "text": "Generally, the length should be 10% of the total paper. 一般来说，摘要长度应为整篇论文的 10%。", "show": "Generally, the length should be 10% of the total paper"}, {"label": "D", "text": "It should normally contain no less than 250 content words. 它通常不应少于 250 个实义词。", "show": "It should normally contain no less than 250 content words"}], "trans": "以下关于摘要长度的说法，哪一项不正确？（C）", "explain": "摘要长度通常由期刊要求或论文类型决定，并不是固定为全文的 10%。因此 C 不正确。", "q_show": "Which of the following statements about the length of an Abstract is not correct?"}, {"u": 3, "no": "09", "q": "Which of the following elements can be written in an abstract of a research paper?", "a": "A", "opts": [{"label": "A", "text": "hypothesis. 假设。", "show": "hypothesis"}, {"label": "B", "text": "examples. 例子。", "show": "examples"}, {"label": "C", "text": "equations. 公式。", "show": "equations"}, {"label": "D", "text": "tables & figures. 表格和图。", "show": "tables & figures"}], "trans": "以下哪一项可以写入科研论文摘要中？（A）", "explain": "摘要可以简要说明研究假设，但通常不放具体例子、公式、表格或图。", "q_show": "Which of the following elements can be written in an abstract of a research paper?"}, {"u": 3, "no": "10", "q": "What important element does the sentence “Soil K depletion was greater for hybrid rice than for inbred rice.” express in the Results section of an abstract?", "a": "A", "opts": [{"label": "A", "text": "comparison and contrast. 比较和对比。", "show": "comparison and contrast"}, {"label": "B", "text": "Quantity. 数量。", "show": "Quantity"}, {"label": "C", "text": "Degree of change. 变化程度。", "show": "Degree of change"}, {"label": "D", "text": "Relationship. 关系。", "show": "Relationship"}], "trans": "句子“Soil K depletion was greater for hybrid rice than for inbred rice.”在摘要结果部分表达了什么重要要素？（A）", "explain": "该句使用 “greater...than...” 比较杂交水稻和常规水稻的土壤钾消耗，因此体现的是比较和对比。", "q_show": "What important element does the sentence “Soil K depletion was greater for hybrid rice than for inbred rice.” express in the Results section of an abstract?"}, {"u": 3, "no": "11", "q": "Which of the following verbs cannot be used as “discourse marker” to indicate “discussif aon” in an abstract on academic paper?", "a": "A", "opts": [{"label": "A", "text": "swallow. 吞咽。", "show": "swallow"}, {"label": "B", "text": "indicate. 表明。", "show": "indicate"}, {"label": "C", "text": "discuss. 讨论。", "show": "discuss"}, {"label": "D", "text": "highlight. 强调。", "show": "highlight"}], "trans": "以下哪个动词不能作为学术论文摘要中表示“讨论”的语篇标记？（A）", "explain": "indicate、discuss、highlight 都可以用于学术表达，而 swallow 与学术摘要中的讨论标记无关，因此不能使用。", "q_show": "Which of the following verbs cannot be used as “discourse marker” to indicate “discussif aon” in an abstract on academic paper?"}, {"u": 3, "no": "12", "q": "Which of the following rules should not be obeyed when writing abstract of a research paper?", "a": "A", "opts": [{"label": "A", "text": "The second person pronoun is formal but the third person pronoun is forbidden. 第二人称代词是正式的，而第三人称代词是禁止的。", "show": "The second person pronoun is formal but the third person pronoun is forbidden"}, {"label": "B", "text": "Verb abbreviation is not allowed. 不允许使用动词缩写。", "show": "Verb abbreviation is not allowed"}, {"label": "C", "text": "Questions are not recommended and they can be switched into statements. 不建议使用疑问句，可以改为陈述句。", "show": "Questions are not recommended and they can be switched into statements"}, {"label": "D", "text": "Negative forms are not suggested to be used in predicate verb phrases. 不建议在谓语动词短语中使用否定形式。", "show": "Negative forms are not suggested to be used in predicate verb phrases"}], "trans": "撰写科研论文摘要时，以下哪条规则不应遵守？（A）", "explain": "学术摘要中一般避免第二人称，而第三人称通常更正式。因此 A 的说法与学术写作规则相反。", "q_show": "Which of the following rules should not be obeyed when writing abstract of a research paper?"}, {"u": 3, "no": "13", "q": "Which of the following statements about the key words in an Abstract is not correct?", "a": "A", "opts": [{"label": "A", "text": "List 5-8 key words to follow the universally normal regulation. 列出 5—8 个关键词以遵循普遍通用规范。", "show": "List 5-8 key words to follow the universally normal regulation"}, {"label": "B", "text": "Pick up key words from title. 从标题中提取关键词。", "show": "Pick up key words from title"}, {"label": "C", "text": "Use the words that indicate the core of the research. 使用能够体现研究核心的词语。", "show": "Use the words that indicate the core of the research"}, {"label": "D", "text": "Determine the key words after the paper is finally finished. 在论文最终完成后确定关键词。", "show": "Determine the key words after the paper is finally finished"}], "trans": "以下关于摘要关键词的说法，哪一项不正确？（A）", "explain": "关键词数量并没有绝对统一的“普遍规范”，通常应根据期刊或课程要求确定。因此 A 的说法不准确。", "q_show": "Which of the following statements about the key words in an Abstract is not correct?"}, {"u": 4, "no": "01", "q": "Which of the following descriptions of Introduction is academically unacceptable?", "a": "D", "opts": [{"label": "A", "text": "It is the first portion of an article according to the IMRAD pattern. 根据 IMRAD 结构，引言是文章的第一部分。", "show": "It is the first portion of an article according to the IMRAD pattern"}, {"label": "B", "text": "It explains the paper’s main topic and prepares the reader for the rest of the paper. 它解释论文的主要主题，并帮助读者为阅读论文其余部分做好准备。", "show": "It explains the paper’s main topic and prepares the reader for the rest of the paper"}, {"label": "C", "text": "It familiarizes the reader with the background of the issue at hand. 它使读者熟悉当前问题的背景。", "show": "It familiarizes the reader with the background of the issue at hand"}, {"label": "D", "text": "It doesn’t need to reflect why the issue is topical in the research being done globally. 它不需要反映为什么该问题在全球研究中具有现实意义。", "show": "It doesn’t need to reflect why the issue is topical in the research being done globally"}], "trans": "以下关于引言部分的描述，哪一项在学术上是不可接受的？（D）", "explain": "引言需要说明研究问题的背景、重要性和现实意义，因此不能说“不需要反映该问题为什么具有研究热点性”。所以 D 是不可接受的。", "q_show": "Which of the following descriptions of Introduction is academically unacceptable?"}, {"u": 4, "no": "02", "q": "Definitions used in Introduction can be written in the following ways except for ______.", "a": "A", "opts": [{"label": "A", "text": "compound definitions 复合定义。", "show": "compound definitions"}, {"label": "B", "text": "short definitions 简短定义。", "show": "short definitions"}, {"label": "C", "text": "sentence definitions 句子定义。", "show": "sentence definitions"}, {"label": "D", "text": "extended definitions 扩展定义。", "show": "extended definitions"}], "trans": "引言中使用的定义可以通过以下方式来写，除了 ______。（A）", "explain": "引言中的定义通常可以采用简短定义、句子定义和扩展定义等形式。“compound definitions”不是常见的定义写法分类，因此选 A。", "q_show": "Definitions used in Introduction can be written in the following ways except for ______."}, {"u": 4, "no": "03", "q": "Which of the following writing actions can’t be taken to establish a territory（领域） of research?", "a": "D", "opts": [{"label": "A", "text": "Claiming importance of the research. 声明研究的重要性。", "show": "Claiming importance of the research"}, {"label": "B", "text": "Making topic generalizations. 对研究主题进行概括。", "show": "Making topic generalizations"}, {"label": "C", "text": "Reviewing items of previous research. 回顾已有研究。", "show": "Reviewing items of previous research"}, {"label": "D", "text": "Avoiding any reflection of the previous research. 避免对已有研究进行任何反映。", "show": "Avoiding any reflection of the previous research"}], "trans": "以下哪种写作行为不能用于建立研究领域？（D）", "explain": "建立研究领域时，需要说明研究重要性、概括研究主题并回顾前人研究。如果完全不涉及已有研究，就无法建立研究背景和研究领域。", "q_show": "Which of the following writing actions can’t be taken to establish a territory of research?"}, {"u": 4, "no": "04", "q": "To achieve “Establishing a Niche（空白）”, which of the following steps can’t be taken?", "a": "A", "opts": [{"label": "A", "text": "Entirely obeying a tradition. 完全遵循传统。", "show": "Entirely obeying a tradition"}, {"label": "B", "text": "Counter-claiming. 提出反驳性观点。", "show": "Counter-claiming"}, {"label": "C", "text": "Indicating a gap. 指出研究空白。", "show": "Indicating a gap"}, {"label": "D", "text": "Question-raising. 提出问题。", "show": "Question-raising"}], "trans": "为了实现“建立研究空白”，以下哪一步不能采用？（A）", "explain": "“建立研究空白”通常要指出已有研究不足、提出问题或反驳已有观点。如果只是完全遵循传统，就不能体现研究空白。", "q_show": "To achieve “Establishing a Niche”, which of the following steps can’t be taken?"}, {"u": 4, "no": "05", "q": "To achieve “Occupying the Niche”, which of the following steps can’t be taken?", "a": "C", "opts": [{"label": "A", "text": "Outlining purposes. 概述研究目的。", "show": "Outlining purposes"}, {"label": "B", "text": "Announcing present research. 宣布当前研究。", "show": "Announcing present research"}, {"label": "C", "text": "Announcing all findings in detail. 详细宣布所有研究发现。", "show": "Announcing all findings in detail"}, {"label": "D", "text": "Indicating article structure. 说明文章结构。", "show": "Indicating article structure"}], "trans": "为了实现“占据研究空白”，以下哪一步不能采用？（C）", "explain": "“占据研究空白”通常说明研究目的、当前研究内容和文章结构，不应在引言中详细公布所有研究发现，详细结果应放在结果或讨论部分。", "q_show": "To achieve “Occupying the Niche”, which of the following steps can’t be taken?"}, {"u": 4, "no": "06", "q": "In the Introduction section, the sentence pattern “Few studies/ researchers/attempts...” is used to ________.", "a": "A", "opts": [{"label": "A", "text": "indicate the limitation of previous study 表明已有研究的局限。", "show": "indicate the limitation of previous study"}, {"label": "B", "text": "specify the purpose of the research 说明研究目的。", "show": "specify the purpose of the research"}, {"label": "C", "text": "make a hypothesis of the research 提出研究假设。", "show": "make a hypothesis of the research"}, {"label": "D", "text": "introduce the importance of the research area 介绍研究领域的重要性。", "show": "introduce the importance of the research area"}], "trans": "在引言部分，句型 “Few studies/researchers/attempts...” 用于 ______。（A）", "explain": "“Few studies...” 表示“很少有研究……”，通常用于指出已有研究不足或研究空白。", "q_show": "In the Introduction section, the sentence pattern “Few studies/ researchers/attempts...” is used to ________."}, {"u": 4, "no": "07", "q": "The following logical connecting terminologies except for ______ can be used to signal “Continuing a tradition”.", "a": "A", "opts": [{"label": "A", "text": "“Despite” “尽管”。", "show": "“Despite”"}, {"label": "B", "text": "“Hence” “因此”。", "show": "“Hence”"}, {"label": "C", "text": "“Consequently” “因此”。", "show": "“Consequently”"}, {"label": "D", "text": "“Therefore” “因此”。", "show": "“Therefore”"}], "trans": "以下逻辑连接词中，除了 ______，都可以用于表示“延续传统”。（A）", "explain": "“Hence”“Consequently”“Therefore”都表示顺承或结果关系，可以体现延续已有研究传统。“Despite”表示转折，与“延续传统”的逻辑不一致。", "q_show": "The following logical connecting terminologies except for ______ can be used to signal “Continuing a tradition”."}, {"u": 4, "no": "08", "q": "To write a good Introduction, which of the following should be avoided?", "a": "C", "opts": [{"label": "A", "text": "Stuff suitable general information. 填入适当的一般性信息。", "show": "Stuff suitable general information"}, {"label": "B", "text": "Pack suitable references. 加入适当的参考文献。", "show": "Pack suitable references"}, {"label": "C", "text": "Describe conclusions of the study. 描述研究结论。", "show": "Describe conclusions of the study"}, {"label": "D", "text": "Take neutral attitude to prior research. 对已有研究采取中立态度。", "show": "Take neutral attitude to prior research"}], "trans": "为了写好引言，以下哪一项应该避免？（C）", "explain": "引言可以介绍背景、文献和研究目的，但不应提前详细描述研究结论。结论应放在后文相应部分。", "q_show": "To write a good Introduction, which of the following should be avoided?"}, {"u": 4, "no": "09", "q": "In a research paper the Introduction section does not answer the question of ______.", "a": "D", "opts": [{"label": "A", "text": "Why was this study performed? 为什么进行这项研究？", "show": "Why was this study performed?"}, {"label": "B", "text": "What has been done in previous research? 之前已有研究做了什么？", "show": "What has been done in previous research?"}, {"label": "C", "text": "What was the specific purpose of the study? 这项研究的具体目的是什么？", "show": "What was the specific purpose of the study?"}, {"label": "D", "text": "How was exactly the research conducted? 研究具体是如何开展的？", "show": "How was exactly the research conducted?"}], "trans": "在科研论文中，引言部分不回答 ______ 这一问题。（D）", "explain": "引言主要回答研究背景、已有研究和研究目的。研究具体如何开展属于方法部分的内容。", "q_show": "In a research paper the Introduction section does not answer the question of ______."}, {"u": 4, "no": "10", "q": "A well-organized Introduction presents a shape of ______, the top presenting the general view and the rest narrowing down to the specific research problem.", "a": "A", "opts": [{"label": "A", "text": "funnel 漏斗。", "show": "funnel"}, {"label": "B", "text": "triangle 三角形。", "show": "triangle"}, {"label": "C", "text": "circle 圆形。", "show": "circle"}, {"label": "D", "text": "rectangle 矩形。", "show": "rectangle"}], "trans": "一个组织良好的引言呈现出 ______ 形状，顶部展示一般性观点，其余部分逐渐缩小到具体研究问题。（A）", "explain": "引言通常采用“漏斗式结构”，先从宽泛背景开始，再逐渐聚焦到具体研究问题。", "q_show": "A well-organized Introduction presents a shape of ______, the top presenting the general view and the rest narrowing down to the specific research problem."}, {"u": 4, "no": "11", "q": "The goals of creating a Literature Review（文献综述） in Introduction excludes ______.", "a": "D", "opts": [{"label": "A", "text": "To develop a theory or evaluate an existing theory 发展一种理论或评价已有理论。", "show": "To develop a theory or evaluate an existing theory"}, {"label": "B", "text": "To summarize the historical or existing state of a research topic 总结某一研究主题的历史或现有状态。", "show": "To summarize the historical or existing state of a research topic"}, {"label": "C", "text": "To identify a problem in a field of research 识别某一研究领域中的问题。", "show": "To identify a problem in a field of research"}, {"label": "D", "text": "To conclude the study 总结本研究。", "show": "To conclude the study"}], "trans": "在引言中进行文献综述的目的不包括 ______。（D）", "explain": "引言中的文献综述用于展示已有研究、发现问题和建立研究基础，而不是总结本研究。总结研究应放在结论部分。", "q_show": "The goals of creating a Literature Review in Introduction excludes ______."}, {"u": 4, "no": "12", "q": "The purposes of citations（引用）include all of the followings except for ______.", "a": "B", "opts": [{"label": "A", "text": "indicating when you’re taking information from another source 表明你何时使用了其他来源的信息。", "show": "indicating when you’re taking information from another source"}, {"label": "B", "text": "showing the author has done far better research than previous scholars 表明作者比前人做了更好的研究。", "show": "showing the author has done far better research than previous scholars"}, {"label": "C", "text": "giving proper credit to the author of that source 给予原作者适当的认可。", "show": "giving proper credit to the author of that source"}, {"label": "D", "text": "allowing readers to consult your sources for themselves 允许读者自行查阅你的资料来源。", "show": "allowing readers to consult your sources for themselves"}], "trans": "引用的目的包括以下所有内容，除了 ______。（B）", "explain": "引用的作用是说明信息来源、尊重原作者并方便读者查证，而不是为了证明作者比前人研究得更好。", "q_show": "The purposes of citationsinclude all of the followings except for ______."}, {"u": 4, "no": "13", "q": "In citations, the verb tense “simple past” is used when referring to ______.", "a": "A", "opts": [{"label": "A", "text": "single study 单项研究。", "show": "single study"}, {"label": "B", "text": "areas of inquiry 研究领域。", "show": "areas of inquiry"}, {"label": "C", "text": "current knowledge 当前知识。", "show": "current knowledge"}, {"label": "D", "text": "conclusion 结论。", "show": "conclusion"}], "trans": "在引用中，当提到 ______ 时使用一般过去时。（A）", "explain": "当引用某一项具体研究时，通常使用一般过去时，因为该研究是过去完成的具体事件。", "q_show": "In citations, the verb tense “simple past” is used when referring to ______."}, {"u": 4, "no": "14", "q": "The sentence pattern “The aim/purpose/of this paper/investigation is to give...” is used in the introduction to a research paper to ______.", "a": "A", "opts": [{"label": "A", "text": "specify the purpose of the research 说明研究目的。", "show": "specify the purpose of the research"}, {"label": "B", "text": "indicate the limitation of previous study 表明已有研究的局限。", "show": "indicate the limitation of previous study"}, {"label": "C", "text": "make a hypothesis of the research 提出研究假设。", "show": "make a hypothesis of the research"}, {"label": "D", "text": "introduce the importance of the research area 介绍研究领域的重要性。", "show": "introduce the importance of the research area"}], "trans": "句型 “The aim/purpose/of this paper/investigation is to give...” 在科研论文引言中用于 ______。（A）", "explain": "“The aim/purpose of...” 是典型的说明研究目的的表达，因此用于明确本研究要做什么。", "q_show": "The sentence pattern “The aim/purpose/of this paper/investigation is to give...” is used in the introduction to a research paper to ______."}, {"u": 4, "no": "15", "q": "In a research paper, which of the following ways cannot indicate old information?", "a": "A", "opts": [{"label": "A", "text": "Use “This / These” without summary noun. 使用 “This/These” 但不加概括性名词。", "show": "Use “This / These” without summary noun"}, {"label": "B", "text": "Repeat the words. 重复词语。", "show": "Repeat the words"}, {"label": "C", "text": "Use pronouns or demonstrative pronouns. 使用代词或指示代词。", "show": "Use pronouns or demonstrative pronouns"}, {"label": "D", "text": "Use the synonyms of the words. 使用词语的同义词。", "show": "Use the synonyms of the words"}], "trans": "在科研论文中，以下哪种方式不能表示旧信息？（A）", "explain": "“This/These” 后面如果没有概括性名词，指代可能不清楚，不能有效承接旧信息。重复关键词、使用代词或同义词都可以帮助衔接旧信息。", "q_show": "In a research paper, which of the following ways cannot indicate old information?"}, {"u": 5, "no": "01", "q": "The Materials and Methods section needs to be only focused on the research and should not be very ______.", "a": "A", "opts": [{"label": "A", "text": "bulky 庞杂的。", "show": "bulky"}, {"label": "B", "text": "clear 清楚的。", "show": "clear"}, {"label": "C", "text": "specific 具体的。", "show": "specific"}, {"label": "D", "text": "detailed 详细的。", "show": "detailed"}], "trans": "材料与方法部分只需要聚焦于研究本身，不应该非常 ______。（A）", "explain": "材料与方法部分应清楚、具体、详细，但不应写得过于庞杂冗长，所以选 A。", "q_show": "The Materials and Methods section needs to be only focused on the research and should not be very ______."}, {"u": 5, "no": "02", "q": "Sufficient detail must be provided in the Materials and Methods section to allow any competent（有能力的） investigator to ________ the experiments to obtain similar results.", "a": "A", "opts": [{"label": "A", "text": "replicate 复制；重复。", "show": "replicate"}, {"label": "B", "text": "redesign 重新设计。", "show": "redesign"}, {"label": "C", "text": "revise 修改。", "show": "revise"}, {"label": "D", "text": "reproach 责备。", "show": "reproach"}], "trans": "材料与方法部分必须提供足够细节，使任何有能力的研究者都能够 ______ 实验并获得相似结果。（A）", "explain": "材料与方法部分的重要作用是保证研究可重复，因此应提供足够信息，使其他研究者能够重复实验。", "q_show": "Sufficient detail must be provided in the Materials and Methods section to allow any competent investigator to ________ the experiments to obtain similar results."}, {"u": 5, "no": "03", "q": "In the materials and methods section, the materials category(类别) does not include ______.", "a": "A", "opts": [{"label": "A", "text": "data collection 数据收集。", "show": "data collection"}, {"label": "B", "text": "the samples 样本。", "show": "the samples"}, {"label": "C", "text": "materials 材料。", "show": "materials"}, {"label": "D", "text": "instruments 仪器。", "show": "instruments"}], "trans": "在材料与方法部分中，材料类别不包括 ______。（A）", "explain": "材料类别通常包括样本、材料和仪器等。数据收集属于方法或过程，不属于材料类别。", "q_show": "In the materials and methods section, the materials category does not include ______."}, {"u": 5, "no": "04", "q": "In the materials and methods section, the methods category does not describe ______.", "a": "A", "opts": [{"label": "A", "text": "the samples 样本。", "show": "the samples"}, {"label": "B", "text": "sample preparation 样本准备。", "show": "sample preparation"}, {"label": "C", "text": "experimental design 实验设计。", "show": "experimental design"}, {"label": "D", "text": "data collection 数据收集。", "show": "data collection"}], "trans": "在材料与方法部分中，方法类别不描述 ______。（A）", "explain": "方法类别主要描述实验设计、样本准备和数据收集等过程。样本本身属于材料类别，不属于方法类别。", "q_show": "In the materials and methods section, the methods category does not describe ______."}, {"u": 5, "no": "05", "q": "In the Materials and Methods section, the subheading “________” is one of the three general subheadings that scientific papers often contain, and it describes how the experiment was conducted.", "a": "B", "opts": [{"label": "A", "text": "Materials 材料。", "show": "Materials"}, {"label": "B", "text": "Procedures 程序；步骤。", "show": "Procedures"}, {"label": "C", "text": "Restrictions 限制。", "show": "Restrictions"}, {"label": "D", "text": "Data analysis 数据分析。", "show": "Data analysis"}], "trans": "在材料与方法部分中，小标题 “________” 是科学论文常见的三个一般小标题之一，它描述实验是如何开展的。（B）", "explain": "Procedures 指实验步骤或操作程序，用来说明实验如何进行，因此选 B。", "q_show": "In the Materials and Methods section, the subheading “________” is one of the three general subheadings that scientific papers often contain, and it describes how the experiment was conducted."}, {"u": 5, "no": "06", "q": "What kind of specific information does the expression “Observations were conducted at X hospital…” correctly describes?", "a": "A", "opts": [{"label": "A", "text": "The physical setting（环境） of the study. 研究的实际地点或物理环境。", "show": "The physical setting of the study"}, {"label": "B", "text": "The methodological approach. 方法学途径。", "show": "The methodological approach"}, {"label": "C", "text": "The subjects/ participants. 研究对象/参与者。", "show": "The subjects/ participants"}, {"label": "D", "text": "Pre-experiment choices. 实验前选择。", "show": "Pre-experiment choices"}], "trans": "表达 “Observations were conducted at X hospital…” 正确描述了哪类具体信息？（A）", "explain": "“at X hospital” 说明研究发生的地点，因此描述的是研究场所或物理环境。", "q_show": "What kind of specific information does the expression “Observations were conducted at X hospital…” correctly describes?"}, {"u": 5, "no": "07", "q": "______ should not be included in the description of the study site when doing a field study.", "a": "A", "opts": [{"label": "A", "text": "Researchers’ full names 研究者全名。", "show": "Researchers’ full names"}, {"label": "B", "text": "The significant physical features 重要的物理特征。", "show": "The significant physical features"}, {"label": "C", "text": "The precise location 精确位置。", "show": "The precise location"}, {"label": "D", "text": "The significant biological features 重要的生物特征。", "show": "The significant biological features"}], "trans": "进行田野研究时，研究地点描述中不应包括 ______。（A）", "explain": "研究地点描述应包括位置、物理特征和生物特征等，与研究者全名无关。", "q_show": "______ should not be included in the description of the study site when doing a field study."}, {"u": 5, "no": "08", "q": "Data analysis is a systematic process of inspecting, cleaning, transforming, and modeling data, rather than ______.", "a": "A", "opts": [{"label": "A", "text": "recording figures only 仅记录数字。", "show": "recording figures only"}, {"label": "B", "text": "uncovering meaningful insights 发现有意义的见解。", "show": "uncovering meaningful insights"}, {"label": "C", "text": "supporting decision-making 支持决策。", "show": "supporting decision-making"}, {"label": "D", "text": "solving specific problems 解决具体问题。", "show": "solving specific problems"}], "trans": "数据分析是检查、清理、转换和建模数据的系统过程，而不是 ______。（A）", "explain": "数据分析不只是记录数字，还包括发现规律、支持决策和解决问题，所以 A 不属于数据分析的本质。", "q_show": "Data analysis is a systematic process of inspecting, cleaning, transforming, and modeling data, rather than ______."}, {"u": 5, "no": "09", "q": "The purpose of ______ analysis is to draw conclusions or make predictions about a population based on sample data.", "a": "A", "opts": [{"label": "A", "text": "inferential 推断性的。", "show": "inferential"}, {"label": "B", "text": "descriptive 描述性的。", "show": "descriptive"}, {"label": "C", "text": "diagnostic 诊断性的。", "show": "diagnostic"}, {"label": "D", "text": "prescriptive 规范性的；处方性的。", "show": "prescriptive"}], "trans": "______ 分析的目的是基于样本数据对总体得出结论或进行预测。（A）", "explain": "推断性分析用于根据样本推断总体情况，因此选 A。", "q_show": "The purpose of ______ analysis is to draw conclusions or make predictions about a population based on sample data."}, {"u": 5, "no": "10", "q": "When identifying a person’s marital status, we are collecting ______ data.", "a": "A", "opts": [{"label": "A", "text": "categorical 分类的。", "show": "categorical"}, {"label": "B", "text": "qualitative 定性的。", "show": "qualitative"}, {"label": "C", "text": "quantitative 定量的。", "show": "quantitative"}, {"label": "D", "text": "prescriptive 规范性的；处方性的。", "show": "prescriptive"}], "trans": "当识别一个人的婚姻状况时，我们收集的是 ______ 数据。（A）", "explain": "婚姻状况如已婚、未婚、离异等属于类别，因此是分类数据。", "q_show": "When identifying a person’s marital status, we are collecting ______ data."}, {"u": 5, "no": "11", "q": "In qualitative research, the commonly used methods do not include ______ analysis.", "a": "A", "opts": [{"label": "A", "text": "regression 回归。", "show": "regression"}, {"label": "B", "text": "content 内容。", "show": "content"}, {"label": "C", "text": "discourse 语篇。", "show": "discourse"}, {"label": "D", "text": "narrative 叙事。", "show": "narrative"}], "trans": "在定性研究中，常用方法不包括 ______ 分析。（A）", "explain": "内容分析、语篇分析和叙事分析是定性研究常用方法。回归分析主要用于定量研究。", "q_show": "In qualitative research, the commonly used methods do not include ______ analysis."}, {"u": 5, "no": "12", "q": "The methods section contains verbs in the ______ tense because data collection and analysis are typically completed by the time researchers start working on their manuscript.", "a": "A", "opts": [{"label": "A", "text": "past 过去时。", "show": "past"}, {"label": "B", "text": "present 现在时。", "show": "present"}, {"label": "C", "text": "future 将来时。", "show": "future"}, {"label": "D", "text": "present perfect 现在完成时。", "show": "present perfect"}], "trans": "方法部分使用 ______ 时态的动词，因为研究者开始写论文时，数据收集和分析通常已经完成。（A）", "explain": "方法部分描述已经完成的实验过程和数据分析，因此通常使用过去时。", "q_show": "The methods section contains verbs in the ______ tense because data collection and analysis are typically completed by the time researchers start working on their manuscript."}, {"u": 5, "no": "13", "q": "In academic paper writing, single verbs are usually more ________ than verbal phrases.", "a": "A", "opts": [{"label": "A", "text": "formal 正式。", "show": "formal"}, {"label": "B", "text": "informal 非正式。", "show": "informal"}, {"label": "C", "text": "unacceptable 不可接受。", "show": "unacceptable"}, {"label": "D", "text": "prohibited 被禁止。", "show": "prohibited"}], "trans": "在学术论文写作中，单个动词通常比动词短语更加 ______。（A）", "explain": "学术写作中，单个动词通常比口语化动词短语更简洁、更正式。", "q_show": "In academic paper writing, single verbs are usually more ________ than verbal phrases."}, {"u": 6, "no": "01", "q": "The ______ section can be considered the nucleus of a scientific article because they justify your claims, so you need to ensure that they are clear and understandable.", "a": "A", "opts": [{"label": "A", "text": "Results 结果。", "show": "Results"}, {"label": "B", "text": "Introduction 引言。", "show": "Introduction"}, {"label": "C", "text": "Methods 方法。", "show": "Methods"}, {"label": "D", "text": "Discussion 讨论。", "show": "Discussion"}], "trans": "______ 部分可以被认为是科学论文的核心，因为它们支持你的论点，所以你需要确保它们清楚且易于理解。（A）", "explain": "结果部分呈现研究发现，是支撑论文论点的重要依据，因此被视为科学论文的核心部分。", "q_show": "The ______ section can be considered the nucleus of a scientific article because they justify your claims, so you need to ensure that they are clear and understandable."}, {"u": 6, "no": "02", "q": "Depending on the discipline（学科）, journal, and the nature of the study, the Results, Discussion, and even Conclusion sections can be organized in the following ways except for ______.", "a": "D", "opts": [{"label": "A", "text": "Results separate, Discussion and Conclusion combined 结果部分单独成节，讨论和结论合并。", "show": "Results separate, Discussion and Conclusion combined"}, {"label": "B", "text": "Results and Discussion combined; Conclusion separate 结果和讨论合并，结论单独成节。", "show": "Results and Discussion combined; Conclusion separate"}, {"label": "C", "text": "Results, Discussion, and Conclusion in separate sections 结果、讨论和结论分别单独成节。", "show": "Results, Discussion, and Conclusion in separate sections"}, {"label": "D", "text": "Results, Discussion, and Conclusion combined 结果、讨论和结论全部合并。", "show": "Results, Discussion, and Conclusion combined"}], "trans": "根据学科、期刊和研究性质的不同，结果、讨论甚至结论部分可以按以下方式组织，除了 ______。（D）", "explain": "科研论文中常见的是结果、讨论、结论分开，或其中两部分合并。三者全部合并通常不符合规范，因此选 D。", "q_show": "Depending on the discipline, journal, and the nature of the study, the Results, Discussion, and even Conclusion sections can be organized in the following ways except for ______."}, {"u": 6, "no": "03", "q": "In general, the Results section includes the following elements except for ______.", "a": "A", "opts": [{"label": "A", "text": "a very detailed introductory context 非常详细的引言背景。", "show": "a very detailed introductory context"}, {"label": "B", "text": "report on data collection, recruitment, and/or participants 关于数据收集、招募和/或参与者的报告。", "show": "report on data collection, recruitment, and/or participants"}, {"label": "C", "text": "a systematic description of the main findings in a logical order 按逻辑顺序系统描述主要发现。", "show": "a systematic description of the main findings in a logical order"}, {"label": "D", "text": "Visual elements, such as, figures, charts, maps, tables, etc. 视觉元素，如图、图表、地图、表格等。", "show": "Visual elements, such as, figures, charts, maps, tables, etc"}], "trans": "一般来说，结果部分包括以下要素，除了 ______。（A）", "explain": "结果部分应重点呈现研究发现和数据，不应包含非常详细的引言背景，背景应主要放在引言部分。", "q_show": "In general, the Results section includes the following elements except for ______."}, {"u": 6, "no": "04", "q": "According to Swales & Feak (2012:140–141), which of the following functions the Results section in a research paper can’t achieve?", "a": "A", "opts": [{"label": "A", "text": "Interpret the key results of the research. 解释研究的关键结果。", "show": "Interpret the key results of the research"}, {"label": "B", "text": "Compare and evaluate different data sets. 比较和评价不同数据集。", "show": "Compare and evaluate different data sets"}, {"label": "C", "text": "Assess theory, common beliefs, or general practice in light of the given data. 根据给定数据评估理论、普遍看法或一般实践。", "show": "Assess theory, common beliefs, or general practice in light of the given data"}, {"label": "D", "text": "Assess the reliability of the data in terms of the methodology that produced it. 从产生数据的方法角度评估数据可靠性。", "show": "Assess the reliability of the data in terms of the methodology that produced it"}], "trans": "根据 Swales 和 Feak（2012:140–141），科研论文结果部分不能实现以下哪一项功能？（A）", "explain": "结果部分主要客观呈现数据和发现，不应重点解释结果意义。对关键结果的深入解释通常属于讨论部分。", "q_show": "According to Swales & Feak (2012:140–141), which of the following functions the Results section in a research paper can’t achieve?"}, {"u": 6, "no": "05", "q": "When writing the Results section, we’d better use ______ phrases instead of long nouns to make our language visualizable and reduce sentence length.", "a": "A", "opts": [{"label": "A", "text": "verbal 动词性的。", "show": "verbal"}, {"label": "B", "text": "adjective 形容词性的。", "show": "adjective"}, {"label": "C", "text": "adverbial 副词性的。", "show": "adverbial"}, {"label": "D", "text": "prepositional 介词性的。", "show": "prepositional"}], "trans": "撰写结果部分时，我们最好使用 ______ 短语而不是长名词，以使语言更形象并减少句子长度。（A）", "explain": "使用动词性表达通常比堆叠长名词更清楚、更简洁，也更容易让句子具有动作感。", "q_show": "When writing the Results section, we’d better use ______ phrases instead of long nouns to make our language visualizable and reduce sentence length."}, {"u": 6, "no": "06", "q": "The most logical way to structure quantitative results is to frame them around your research questions or hypotheses, for which you should not share ______.", "a": "D", "opts": [{"label": "A", "text": "A reminder of the type of analysis you used 对所使用分析类型的提醒。", "show": "A reminder of the type of analysis you used"}, {"label": "B", "text": "A concise summary of each relevant result, both positive and negative 对每个相关结果的简明总结，包括正向和负向结果。", "show": "A concise summary of each relevant result, both positive and negative"}, {"label": "C", "text": "A brief statement of how each result relates to the question 对每个结果如何与研究问题相关的简要说明。", "show": "A brief statement of how each result relates to the question"}, {"label": "D", "text": "any speculation on their meaning or consequences 对其意义或后果的任何推测。", "show": "any speculation on their meaning or consequences"}], "trans": "组织定量结果最合乎逻辑的方式是围绕研究问题或假设展开，在此过程中不应分享 ______。（D）", "explain": "结果部分应客观呈现结果，不应进行主观推测。对意义和后果的解释应放在讨论部分。", "q_show": "The most logical way to structure quantitative results is to frame them around your research questions or hypotheses, for which you should not share ______."}, {"u": 6, "no": "07", "q": "Which of the following items is not essential in the Results section in an academic paper?", "a": "A", "opts": [{"label": "A", "text": "Background information 背景信息。", "show": "Background information"}, {"label": "B", "text": "Comparison between treatment and control groups 处理组和对照组之间的比较。", "show": "Comparison between treatment and control groups"}, {"label": "C", "text": "Summary of main results 主要结果总结。", "show": "Summary of main results"}, {"label": "D", "text": "Report of general tendency in data 数据总体趋势报告。", "show": "Report of general tendency in data"}], "trans": "以下哪一项不是学术论文结果部分的必要内容？（A）", "explain": "结果部分重点是结果呈现、比较和趋势总结。背景信息不是结果部分的核心内容。", "q_show": "Which of the following items is not essential in the Results section in an academic paper?"}, {"u": 6, "no": "08", "q": "About the well-written sentence “Nitrogen fertilizer significantly increased soy bean total biomass (P=0.05) regardless of the presence or absence of Rhizobium (Table 1)”, which of the following comments is not reasonable?", "a": "A", "opts": [{"label": "A", "text": "The result of adding nitrogen is stated vaguely. 添加氮肥的结果表述得很模糊。", "show": "The result of adding nitrogen is stated vaguely"}, {"label": "B", "text": "The word “significantly” is accompanied by the statistical probability level. “significantly” 一词伴随统计概率水平。", "show": "The word “significantly” is accompanied by the statistical probability level. “significantly”"}, {"label": "C", "text": "The scientific name Rhizobium is italicized. 科学名称 Rhizobium 使用了斜体。", "show": "The scientific name Rhizobium is italicized"}, {"label": "D", "text": "The reader is referred to a table where the data to support the statement can be found. 读者被引导到支持该陈述的数据表。", "show": "The reader is referred to a table where the data to support the statement can be found"}], "trans": "关于句子 “Nitrogen fertilizer significantly increased soy bean total biomass (P=0.05) regardless of the presence or absence of Rhizobium (Table 1)” 这一写得较好的句子，以下哪项评论不合理？（A）", "explain": "该句明确说明氮肥显著增加了大豆总生物量，并给出了 P 值和表格来源，因此并不模糊，所以 A 不合理。", "q_show": "About the well-written sentence “Nitrogen fertilizer significantly increased soy bean total biomass (P=0.05) regardless of the presence or absence of Rhizobium (Table 1)”, which of the following comments is not reasonable?"}, {"u": 6, "no": "09", "q": "When reporting data in a text, we should follow the principles listed except for ______.", "a": "C", "opts": [{"label": "A", "text": "write the text of the Results section concisely and objectively 简洁、客观地撰写结果部分。", "show": "write the text of the Results section concisely and objectively"}, {"label": "B", "text": "avoid repetitive paragraph structures 避免重复的段落结构。", "show": "avoid repetitive paragraph structures"}, {"label": "C", "text": "interpret the data here 在此处解释数据。", "show": "interpret the data here"}, {"label": "D", "text": "the transition into interpretive language can be a slippery slope. 转向解释性语言可能是一个容易出问题的过程。", "show": "the transition into interpretive language can be a slippery slope"}], "trans": "在正文中报告数据时，我们应遵循以下原则，除了 ______。（C）", "explain": "结果部分主要呈现数据，不应在此深入解释数据意义。解释数据通常放在讨论部分。", "q_show": "When reporting data in a text, we should follow the principles listed except for ______."}, {"u": 6, "no": "10", "q": "Tick the steps you think useless for writing Results.", "a": "D", "opts": [{"label": "A", "text": "place the unit after the last in a series of numbers all having the same unit. 当一系列数字具有相同单位时，将单位放在最后一个数字之后。", "show": "place the unit after the last in a series of numbers all having the same unit"}, {"label": "B", "text": "Do not reiterate each value from a figure or table. 不要重复图或表中的每一个数值。", "show": "Do not reiterate each value from a figure or table"}, {"label": "C", "text": "Do not present the same data in both a table and figure. 不要同时用表格和图呈现同一组数据。", "show": "Do not present the same data in both a table and figure"}, {"label": "D", "text": "Stick to one tense only throughout the section. 整个部分只坚持使用一种时态。", "show": "Stick to one tense only throughout the section"}], "trans": "勾选你认为对撰写结果部分无用的步骤。（D）", "explain": "结果部分可以根据语境使用不同的时态，例如描述已完成实验用过去时，指代表格或图时可用现在时。因此全篇只用一种时态是不合适的。", "q_show": "Tick the steps you think useless for writing Results."}, {"u": 7, "no": "02", "q": "Tables are used to display the following information except for ______ in a clear and concise manner.", "a": "A", "opts": [{"label": "A", "text": "acknowledgement 致谢。", "show": "acknowledgement"}, {"label": "B", "text": "numerical data 数值数据。", "show": "numerical data"}, {"label": "C", "text": "categorical information 分类信息。", "show": "categorical information"}, {"label": "D", "text": "summarized findings 总结性发现。", "show": "summarized findings"}], "trans": "表格用于以清晰、简洁的方式展示以下信息，除了 ______。（A）", "explain": "表格常用于展示数值数据、分类信息和总结性结果。致谢不属于表格要展示的主要信息。", "q_show": "Tables are used to display the following information except for ______ in a clear and concise manner."}, {"u": 7, "no": "03", "q": "Which of the following descriptions of the Tables is not correct?", "a": "A", "opts": [{"label": "A", "text": "Left-aligned horizontally on the page. 在页面上水平左对齐。", "show": "Left-aligned horizontally on the page"}, {"label": "B", "text": "Numbered chronologically as they appear in the text. 按照在正文中出现的顺序编号。", "show": "Numbered chronologically as they appear in the text"}, {"label": "C", "text": "Referenced in the order they appear in the text. 按照在正文中出现的顺序引用。", "show": "Referenced in the order they appear in the text"}, {"label": "D", "text": "Labelled with the table number and descriptive title above the table. 在表格上方标注表号和描述性标题。", "show": "Labelled with the table number and descriptive title above the table"}], "trans": "以下关于表格的描述，哪一项不正确？（A）", "explain": "表格通常需要按照正文出现顺序编号和引用，并在表格上方给出表号和标题。A 的说法不是表格规范描述中的正确要求。", "q_show": "Which of the following descriptions of the Tables is not correct?"}, {"u": 7, "no": "04", "q": "To create effective tables, the following elements except for ______ should be followed.", "a": "A", "opts": [{"label": "A", "text": "Use maximal design elements 使用最多的设计元素。", "show": "Use maximal design elements"}, {"label": "B", "text": "Determine the purpose 明确目的。", "show": "Determine the purpose"}, {"label": "C", "text": "Choose an appropriate design 选择合适的设计。", "show": "Choose an appropriate design"}, {"label": "D", "text": "Follow formatting guidelines 遵循格式规范。", "show": "Follow formatting guidelines"}], "trans": "为了制作有效的表格，以下要素都应遵循，除了 ______。（A）", "explain": "有效表格应简洁清楚，避免过度设计。使用过多设计元素会影响可读性，因此选 A。", "q_show": "To create effective tables, the following elements except for ______ should be followed."}, {"u": 7, "no": "05", "q": "Which of the following is not a mistake to avoid when creating an effective Table?", "a": "A", "opts": [{"label": "A", "text": "Consistent Formatting. 格式一致。", "show": "Consistent Formatting"}, {"label": "B", "text": "Overloading Information. 信息过载。", "show": "Overloading Information"}, {"label": "C", "text": "Lack of Explanation. 缺乏解释。", "show": "Lack of Explanation"}, {"label": "D", "text": "Duplicating Content. 重复内容。", "show": "Duplicating Content"}], "trans": "制作有效表格时，以下哪一项不是需要避免的错误？（A）", "explain": "格式一致是表格制作中的正确做法，不是错误。信息过载、缺乏解释和内容重复才是应避免的问题。", "q_show": "Which of the following is not a mistake to avoid when creating an effective Table?"}, {"u": 7, "no": "06", "q": "The Figure caption should not be ______.", "a": "A", "opts": [{"label": "A", "text": "prescriptive 规定性的；指令性的。", "show": "prescriptive"}, {"label": "B", "text": "descriptive 描述性的。", "show": "descriptive"}, {"label": "C", "text": "concise 简洁的。", "show": "concise"}, {"label": "D", "text": "comprehensive 全面的；综合的。", "show": "comprehensive"}], "trans": "图注不应该是 ______。（A）", "explain": "图注应简洁、描述性强，并提供必要信息，但不应像指令一样具有规定性。", "q_show": "The Figure caption should not be ______."}, {"u": 7, "no": "07", "q": "Which of the following fails to suitably describe the purpose of figures in research papers?", "a": "C", "opts": [{"label": "A", "text": "Simplify Complex Data. 简化复杂数据。", "show": "Simplify Complex Data"}, {"label": "B", "text": "Enhance Clarity. 增强清晰度。", "show": "Enhance Clarity"}, {"label": "C", "text": "Highlight all Findings. 突出所有发现。", "show": "Highlight all Findings"}, {"label": "D", "text": "Support the Narrative. 支持论文叙述。", "show": "Support the Narrative"}], "trans": "以下哪一项没有恰当地描述科研论文中图的目的？（C）", "explain": "图的作用是突出关键发现、简化复杂信息和支持论述，而不是突出所有发现。所有发现都放进图中会造成信息过载。", "q_show": "Which of the following fails to suitably describe the purpose of figures in research papers?"}, {"u": 7, "no": "08", "q": "______ explains symbols, colors, or patterns used in the Figure.", "a": "A", "opts": [{"label": "A", "text": "Legend 图例。", "show": "Legend"}, {"label": "B", "text": "Title 标题。", "show": "Title"}, {"label": "C", "text": "Caption 图注。", "show": "Caption"}, {"label": "D", "text": "Axis Labels 坐标轴标签。", "show": "Axis Labels"}], "trans": "______ 用于解释图中使用的符号、颜色或图案。（A）", "explain": "图例用于说明图中的颜色、符号、线型或图案含义，因此选 A。", "q_show": "______ explains symbols, colors, or patterns used in the Figure."}, {"u": 7, "no": "09", "q": "In a research paper, figures are not used to ______.", "a": "A", "opts": [{"label": "A", "text": "gather large data in small space 在小空间内聚集大量数据。", "show": "gather large data in small space"}, {"label": "B", "text": "summarize key data or findings 总结关键数据或发现。", "show": "summarize key data or findings"}, {"label": "C", "text": "explain processes or workflows 解释过程或工作流程。", "show": "explain processes or workflows"}, {"label": "D", "text": "show relationships between variables 展示变量之间的关系。", "show": "show relationships between variables"}], "trans": "在科研论文中，图不是用来 ______。（A）", "explain": "图主要用于总结关键数据、展示关系和说明流程，而不是简单地在小空间内堆积大量数据。大量详细数据更适合表格。", "q_show": "In a research paper, figures are not used to ______."}, {"u": 7, "no": "10", "q": "______ show relationships or correlations between variables.", "a": "A", "opts": [{"label": "A", "text": "Scatter Plot 散点图。", "show": "Scatter Plot"}, {"label": "B", "text": "Line Graph 折线图。", "show": "Line Graph"}, {"label": "C", "text": "Bar Graph 柱状图。", "show": "Bar Graph"}, {"label": "D", "text": "Flowchart 流程图。", "show": "Flowchart"}], "trans": "______ 用于展示变量之间的关系或相关性。（A）", "explain": "散点图常用于展示两个变量之间的关系或相关性，因此选 A。", "q_show": "______ show relationships or correlations between variables."}, {"u": 7, "no": "11", "q": "Which of the following tools can be used to create interactive（交互式的） and advanced（高级的） data visualizations?", "a": "A", "opts": [{"label": "A", "text": "Tableau Tableau 软件。", "show": "Tableau Tableau"}, {"label": "B", "text": "Microsoft Excel 微软 Excel。", "show": "Microsoft Excel"}, {"label": "C", "text": "R and Python R 和 Python。", "show": "R and Python R"}, {"label": "D", "text": "Canva Canva 设计工具。", "show": "Canva Canva"}], "trans": "以下哪种工具可以用来创建交互式和高级数据可视化？（A）", "explain": "标准答案为 Tableau，它常用于制作交互式和高级数据可视化。这里按文件中的标准答案保留。", "q_show": "Which of the following tools can be used to create interactive and advanced data visualizations?"}, {"u": 7, "no": "12", "q": "When creating an effective figure, we should avoid the following common mistakes except for ______.", "a": "A", "opts": [{"label": "A", "text": "Consistent Design 一致的设计。", "show": "Consistent Design"}, {"label": "B", "text": "Overloading Figures 图中过载信息。", "show": "Overloading Figures"}, {"label": "C", "text": "Poor Quality 质量差。", "show": "Poor Quality"}, {"label": "D", "text": "Ignoring Guidelines 忽视规范。", "show": "Ignoring Guidelines"}], "trans": "制作有效图形时，我们应避免以下常见错误，除了 ______。（A）", "explain": "一致的设计是正确做法，不是错误。图中过载信息、质量差和忽视格式规范都是应避免的问题。", "q_show": "When creating an effective figure, we should avoid the following common mistakes except for ______."}, {"u": 7, "no": "13", "q": "Which of the following questions a Legend（图例） does not necessarily answer?", "a": "A", "opts": [{"label": "A", "text": "Where did you do it? 你在哪里做的？", "show": "Where did you do it?"}, {"label": "B", "text": "What is it? 它是什么？", "show": "What is it?"}, {"label": "C", "text": "Why did you do it? 你为什么这样做？", "show": "Why did you do it?"}, {"label": "D", "text": "What were the results? 结果是什么？", "show": "What were the results?"}], "trans": "以下哪一个问题不是图例必须回答的？（A）", "explain": "图例主要解释图中符号、颜色、线型或分组含义，不一定需要说明研究地点，因此选 A。", "q_show": "Which of the following questions a Legend does not necessarily answer?"}, {"u": 7, "no": "14", "q": "When crating tables and figures, you should use the past tense to ________.", "a": "A", "opts": [{"label": "A", "text": "state past facts 陈述过去事实。", "show": "state past facts"}, {"label": "B", "text": "refer to tables & figures 指代表格和图。", "show": "refer to tables & figures"}, {"label": "C", "text": "Explain the results and generalization 解释结果和概括。", "show": "Explain the results and generalization"}, {"label": "D", "text": "Compare with other tests or results 与其他测试或结果比较。", "show": "Compare with other tests or results"}], "trans": "在制作表格和图时，应使用过去时来 ______。（A）", "explain": "过去时通常用于陈述已经完成的实验或过去事实；指代表格和图时通常用现在时。", "q_show": "When crating tables and figures, you should use the past tense to ________."}, {"u": 8, "no": "01", "q": "In the AIMRD macro-level structure, the following moves （步骤）except for ______ appear to be standard concluding moves across all disciplines（学科）.", "a": "A", "opts": [{"label": "A", "text": "Provide background information 提供背景信息。", "show": "Provide background information"}, {"label": "B", "text": "Summarize the study 总结研究。", "show": "Summarize the study"}, {"label": "C", "text": "Evaluate the study 评价研究。", "show": "Evaluate the study"}, {"label": "D", "text": "Make recommendations 提出建议。", "show": "Make recommendations"}], "trans": "在 AIMRD 宏观结构中，以下哪一项不是各学科中常见的标准结论步骤？（A）", "explain": "结论部分通常用于总结研究、评价研究并提出建议，而提供背景信息一般属于引言部分，因此选 A。", "q_show": "In the AIMRD macro-level structure, the following moves except for ______ appear to be standard concluding moves across all disciplines."}, {"u": 8, "no": "02", "q": "The main function of Discussion and Conclusion section in a paper is to explain, compare, and _______ the results of your research.", "a": "A", "opts": [{"label": "A", "text": "evaluate 评价。", "show": "evaluate"}, {"label": "B", "text": "summarize 总结。", "show": "summarize"}, {"label": "C", "text": "collect 收集。", "show": "collect"}, {"label": "D", "text": "decompose 分解。", "show": "decompose"}], "trans": "论文中讨论和结论部分的主要功能是解释、比较并 ______ 你的研究结果。（A）", "explain": "讨论和结论部分不仅要解释和比较结果，还要对研究结果进行评价，因此选 A。", "q_show": "The main function of Discussion and Conclusion section in a paper is to explain, compare, and _______ the results of your research."}, {"u": 8, "no": "03", "q": "The ______ section analyzes the result and the hypothesis, shows your attitude to the present research, makes the conclusion, and proposes suggestions for further research.", "a": "A", "opts": [{"label": "A", "text": "Discussion 讨论。", "show": "Discussion"}, {"label": "B", "text": "Results 结果。", "show": "Results"}, {"label": "C", "text": "Hypothesis 假设。", "show": "Hypothesis"}, {"label": "D", "text": "Conclusion 结论。", "show": "Conclusion"}], "trans": "______ 部分分析结果和假设，表明你对当前研究的态度，得出结论，并提出进一步研究的建议。（A）", "explain": "讨论部分通常对结果进行分析和解释，联系研究假设，指出意义、局限并提出后续研究建议，因此选 A。", "q_show": "The ______ section analyzes the result and the hypothesis, shows your attitude to the present research, makes the conclusion, and proposes suggestions for further research."}, {"u": 8, "no": "04", "q": "The following rules except for ______ can be applied to every discussion section to create a framework.", "a": "B", "opts": [{"label": "A", "text": "place the findings in context. 将研究发现置于语境中。", "show": "place the findings in context"}, {"label": "B", "text": "only mention and discuss the expected results. 只提及并讨论预期结果。", "show": "only mention and discuss the expected results"}, {"label": "C", "text": "address limitations or weaknesses in the research. 说明研究的局限或不足。", "show": "address limitati
