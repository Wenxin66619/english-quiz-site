cer patients should be advised to prevent from smoking to reduce their risk for cardiovascular disease."}, {"u": 6, "no": "01", "q": "Creating a Results section involves ______ presenting and describing the outcomes of the study.", "q_raw": "Creating a Results section involves ______ (system) presenting and describing the outcomes of the study.", "raw": "system", "a": "systematically", "trans": "撰写结果部分需要系统地呈现和描述研究结果。（systematically）", "explain": "presenting and describing 是动词短语，需要副词修饰。system 应变为 systematically，表示“系统地”。", "q_show": "Creating a Results section involves ______ presenting and describing the outcomes of the study."}, {"u": 6, "no": "02", "q": "The function of the Results section is to objectively present your key results in an orderly and logical sequence using both ______ materials and text.", "q_raw": "The function of the Results section is to objectively present your key results in an orderly and logical sequence using both ______ (illustrate) materials and text.", "raw": "illustrate", "a": "illustrative", "trans": "结果部分的功能是使用说明性材料和文字，按照有序且合乎逻辑的顺序客观呈现关键结果。（illustrative）", "explain": "materials 是名词，前面需要形容词修饰。illustrate 应变为 illustrative，表示“说明性的”。", "q_show": "The function of the Results section is to objectively present your key results in an orderly and logical sequence using both ______ materials and text."}, {"u": 6, "no": "03", "q": "The traditional notion is that passive voice lends an ______ tone to the writing which was perceived to be more objective and formal.", "q_raw": "The traditional notion is that passive voice lends an ______ (person) tone to the writing which was perceived to be more objective and formal.", "raw": "person", "a": "impersonal", "trans": "传统观念认为，被动语态会使写作呈现一种非个人化的语气，这被认为更加客观和正式。（impersonal）", "explain": "tone 是名词，前面需要形容词修饰。impersonal 表示“非个人化的”，符合被动语态强调客观性的语境。", "q_show": "The traditional notion is that passive voice lends an ______ tone to the writing which was perceived to be more objective and formal."}, {"u": 6, "no": "04", "q": "Using the active voice definitely makes the long sentences less wordy, more ______, and easier to understand.", "q_raw": "Using the active voice definitely makes the long sentences less wordy, more ______ (read), and easier to understand.", "raw": "read", "a": "readable", "trans": "使用主动语态确实可以使长句不那么冗长，更易读，也更容易理解。（readable）", "explain": "more 后需要形容词。read 应变为 readable，表示“易读的”。", "q_show": "Using the active voice definitely makes the long sentences less wordy, more ______, and easier to understand."}, {"u": 6, "no": "05", "q": "We organize the Results section based on the sequence of tables and figures ______ the results of our statistical analysis.", "q_raw": "We organize the Results section based on the sequence of tables and figures ______ (summarize) the results of our statistical analysis.", "raw": "summarize", "a": "summarizing", "trans": "我们根据总结统计分析结果的表格和图的顺序来组织结果部分。（summarizing）", "explain": "tables and figures 与 summarize 是主动关系，用现在分词 summarizing 作后置定语，表示“总结……的表格和图”。", "q_show": "We organize the Results section based on the sequence of tables and figures ______ the results of our statistical analysis."}, {"u": 6, "no": "06", "q": "Although the passive voice may be tempting（吸引力）, the use of the active voice makes the action of writing the Results section much more ______.", "q_raw": "Although the passive voice may be tempting（吸引力）, the use of the active voice makes the action of writing the Results section much more ______ (visual).", "raw": "visual", "a": "visualizable", "trans": "尽管被动语态可能很有吸引力，但使用主动语态会使撰写结果部分这一行为更加可视化。（visualizable）", "explain": "much more 后需要形容词。visualizable 表示“可视化的、可形象化的”，按标准答案保留。", "q_show": "Although the passive voice may be tempting, the use of the active voice makes the action of writing the Results section much more ______."}, {"u": 6, "no": "07", "q": "Avoid using subjective or emotional words, such as “interestingly” or “unfortunately”, to describe the results as this may cause readers to doubt the ______ of the paper.", "q_raw": "Avoid using subjective or emotional words, such as “interestingly” or “unfortunately”, to describe the results as this may cause readers to doubt the ______ (object) of the paper.", "raw": "object", "a": "objectivity", "trans": "避免使用 “interestingly” 或 “unfortunately” 等主观或情绪化词语来描述结果，因为这可能会使读者怀疑论文的客观性。（objectivity）", "explain": "the 后面需要名词。object 应变为 objectivity，表示“客观性”。", "q_show": "Avoid using subjective or emotional words, such as “interestingly” or “unfortunately”, to describe the results as this may cause readers to doubt the ______ of the paper."}, {"u": 6, "no": "08", "q": "To enhance ______, ensure that negative results, if any, are included in this section, even if they do not support the research hypothesis.", "q_raw": "To enhance ______ (credit), ensure that negative results, if any, are included in this section, even if they do not support the research hypothesis.", "raw": "credit", "a": "credibility", "trans": "为了增强可信度，应确保在本部分中包含负面结果，即使这些结果不支持研究假设。（credibility）", "explain": "enhance 后需要名词作宾语。credit 应变为 credibility，表示“可信度”。", "q_show": "To enhance ______, ensure that negative results, if any, are included in this section, even if they do not support the research hypothesis."}, {"u": 6, "no": "09", "q": "When describing trends of directions, we use ________.", "q_raw": "When describing trends of directions, we use ________ (datum).", "raw": "datum", "a": "data", "trans": "当描述方向趋势时，我们使用数据。（data）", "explain": "datum 是单数形式，data 是复数或集合名词形式，表示“数据”。", "q_show": "When describing trends of directions, we use ________."}, {"u": 6, "no": "10", "q": "The model and ________ parameters are presented in Fig. 1.", "q_raw": "The model and ________ (estimate) parameters are presented in Fig. 1.", "raw": "estimate", "a": "estimated", "trans": "模型和估计参数见图 1。（estimated）", "explain": "parameters 是名词，前面需要过去分词作定语。estimated 表示“估计的”。", "q_show": "The model and ________ parameters are presented in Fig. 1."}, {"u": 6, "no": "11", "q": "In particular（特别是）, greater environmental concern was significantly ________ with higher levels of Agreeableness, Openness, Neuroticism, and Conscientiousness.", "q_raw": "In particular（特别是）, greater environmental concern was significantly ________ (associate) with higher levels of Agreeableness, Openness, Neuroticism, and Conscientiousness.", "raw": "associate", "a": "associated", "trans": "特别是，较高的环境关注度与较高水平的宜人性、开放性、神经质和尽责性显著相关。（associated）", "explain": "be associated with 是固定搭配，表示“与……相关”。", "q_show": "In particular, greater environmental concern was significantly ________ with higher levels of Agreeableness, Openness, Neuroticism, and Conscientiousness."}, {"u": 6, "no": "12", "q": "In contrast（相比之下）, no significant ________ was observed with Extraversion (b ¼ .02).", "q_raw": "In contrast（相比之下）, no significant ________ (relate) was observed with Extraversion (b ¼ .02).", "raw": "relate", "a": "relationship", "trans": "相比之下，未观察到与外向性之间存在显著关系（b = .02）。（relationship）", "explain": "significant 后需要名词，relate 应变为 relationship，表示“关系”。", "q_show": "In contrast, no significant ________ was observed with Extraversion (b ¼ .02)."}, {"u": 7, "no": "01", "q": "Every Table or Figure should be clear, labelled, ______ defined, and have a caption and legends.", "q_raw": "Every Table or Figure should be clear, labelled, ______ (abbreviate) defined, and have a caption and legends.", "raw": "abbreviate", "a": "abbreviations", "trans": "每个表格或图都应清晰、有标签、定义缩略语，并有标题和图例/说明。（abbreviations）", "explain": "这里需要名词，表示“缩略语”。标准答案为 abbreviations，按原答案保留。", "q_show": "Every Table or Figure should be clear, labelled, ______ defined, and have a caption and legends."}, {"u": 7, "no": "02", "q": "Tables and figures are numbered ______ in the order in which they appear in the text.", "q_raw": "Tables and figures are numbered ______ (chronological) in the order in which they appear in the text.", "raw": "chronological", "a": "chronologically", "trans": "表格和图按照它们在正文中出现的顺序编号。（chronologically）", "explain": "numbered 是动词，需要副词修饰。chronological 应变为 chronologically，表示“按时间顺序地、按出现顺序地”。", "q_show": "Tables and figures are numbered ______ in the order in which they appear in the text."}, {"u": 7, "no": "03", "q": "Tables and figures should be numbered ________ in their own system.", "q_raw": "Tables and figures should be numbered ________ (separate) in their own system.", "raw": "separate", "a": "separately", "trans": "表格和图应在各自的系统中分别编号。（separately）", "explain": "numbered 是动词，需要副词修饰。separate 应变为 separately，表示“分别地”。", "q_show": "Tables and figures should be numbered ________ in their own system."}, {"u": 7, "no": "04", "q": "In research papers, a table is a structured ______ of data organized into rows and columns.", "q_raw": "In research papers, a table is a structured ______ (arrange) of data organized into rows and columns.", "raw": "arrange", "a": "arrangement", "trans": "在科研论文中，表格是按行和列组织的数据的结构化排列。（arrangement）", "explain": "a 后面需要名词单数。arrange 应变为 arrangement，表示“排列、安排”。", "q_show": "In research papers, a table is a structured ______ of data organized into rows and columns."}, {"u": 7, "no": "05", "q": "Tables serve as a visual aid that complements the text by summarizing results, presenting comparisons, or organizing information ______.", "q_raw": "Tables serve as a visual aid that complements the text by summarizing results, presenting comparisons, or organizing information ______ (system).", "raw": "system", "a": "systematically", "trans": "表格作为一种视觉辅助工具，通过总结结果、呈现比较或系统地组织信息来补充正文。（systematically）", "explain": "organizing 是动词，需要副词修饰。system 应变为 systematically，表示“系统地”。", "q_show": "Tables serve as a visual aid that complements the text by summarizing results, presenting comparisons, or organizing information ______."}, {"u": 7, "no": "06", "q": "They enhance the clarity and ______ of research findings, allowing readers to quickly grasp key points without wading through dense text.", "q_raw": "They enhance the clarity and ______ (access) of research findings, allowing readers to quickly grasp key points without wading through dense text.", "raw": "access", "a": "accessibility", "trans": "它们提高研究发现的清晰度和可理解性，使读者无需阅读密集文本就能快速把握关键点。（accessibility）", "explain": "clarity and 后面需要并列名词。access 应变为 accessibility，表示“可理解性、可获取性”。", "q_show": "They enhance the clarity and ______ of research findings, allowing readers to quickly grasp key points without wading through dense text."}, {"u": 7, "no": "07", "q": "Note the ______ use of lines to delineate different components of the table, and use of a serif font rather than a sans serif font to present your data efficiently.", "q_raw": "Note the ______ (minimize) use of lines to delineate different components of the table, and use of a serif font rather than a sans serif font to present your data efficiently.", "raw": "minimize", "a": "minimal", "trans": "注意使用最少的线条来划分表格的不同组成部分，并使用衬线字体而不是无衬线字体来高效呈现数据。（minimal）", "explain": "use 是名词，前面需要形容词修饰。minimal 表示“最少的、最低限度的”。", "q_show": "Note the ______ use of lines to delineate different components of the table, and use of a serif font rather than a sans serif font to present your data efficiently."}, {"u": 7, "no": "08", "q": "In a Table, ______ data containing decimal points should be centered and aligned by decimal point.", "q_raw": "In a Table, ______ (number) data containing decimal points should be centered and aligned by decimal point.", "raw": "number", "a": "numeric", "trans": "在表格中，含有小数点的数值数据应居中并按小数点对齐。（numeric）", "explain": "data 是名词，前面需要形容词修饰。numeric 表示“数字的、数值的”。", "q_show": "In a Table, ______ data containing decimal points should be centered and aligned by decimal point."}, {"u": 7, "no": "09", "q": "Figures in research papers refer to graphical（图形的） or visual ______ of information, data, or concepts.", "q_raw": "Figures in research papers refer to graphical（图形的） or visual ______ (present) of information, data, or concepts.", "raw": "present", "a": "presentations", "trans": "科研论文中的图是指对信息、数据或概念的图形化或视觉化呈现。（presentations）", "explain": "空格处需要名词复数，与 information, data, or concepts 搭配。present 应变为 presentations。", "q_show": "Figures in research papers refer to graphical or visual ______ of information, data, or concepts."}, {"u": 7, "no": "10", "q": "Follow the specific formatting ______ of your journal or citation style (e.g., APA, MLA, or Chicago).", "q_raw": "Follow the specific formatting ______ (require) of your journal or citation style (e.g., APA, MLA, or Chicago).", "raw": "require", "a": "requirements", "trans": "遵循期刊或引用格式的具体格式要求，例如 APA、MLA 或 Chicago。（requirements）", "explain": "formatting 后需要名词，且通常指多项要求，所以用 requirements。", "q_show": "Follow the specific formatting ______ of your journal or citation style (e.g., APA, MLA, or Chicago)."}, {"u": 7, "no": "11", "q": "Lack of context（语境） is a prevalent issue, where figures or tables are presented without sufficient ______ information, making interpretation challenging.", "q_raw": "Lack of context（语境） is a prevalent issue, where figures or tables are presented without sufficient ______ (context) information, making interpretation challenging.", "raw": "context", "a": "contextual", "trans": "缺乏语境是一个常见问题，即图或表在没有足够背景信息的情况下呈现，使解释变得困难。（contextual）", "explain": "information 是名词，前面需要形容词修饰。context 应变为 contextual，表示“语境的、背景的”。", "q_show": "Lack of context is a prevalent issue, where figures or tables are presented without sufficient ______ information, making interpretation challenging."}, {"u": 7, "no": "12", "q": "Overemphasis on aesthetics （美观）at the expense of clarity and ______ is another pitfall（陷阱） to be cautious about.", "q_raw": "Overemphasis on aesthetics （美观）at the expense of clarity and ______ (accurate) is another pitfall（陷阱） to be cautious about.", "raw": "accurate", "a": "accuracy", "trans": "过分强调美观而牺牲清晰性和准确性，是另一个需要谨慎对待的陷阱。（accuracy）", "explain": "clarity and 后面需要并列名词。accurate 应变为 accuracy，表示“准确性”。", "q_show": "Overemphasis on aesthetics at the expense of clarity and ______ is another pitfall to be cautious about."}, {"u": 7, "no": "13", "q": "Authors should highlight essential information, using ______ materials for additional details while keeping the main visuals concise（简洁）.", "q_raw": "Authors should highlight essential information, using ______ (supplement) materials for additional details while keeping the main visuals concise（简洁）.", "raw": "supplement", "a": "supplementary", "trans": "作者应突出基本信息，使用补充材料提供额外细节，同时保持主要图表简洁。（supplementary）", "explain": "materials 是名词，前面需要形容词修饰。supplement 应变为 supplementary，表示“补充的”。", "q_show": "Authors should highlight essential information, using ______ materials for additional details while keeping the main visuals concise."}, {"u": 7, "no": "14", "q": "Table 2 ________ the ranking and ratings of backpacker motivations for both respondent groups.", "q_raw": "Table 2 ________ (present) the ranking and ratings of backpacker motivations for both respondent groups.", "raw": "present", "a": "presents", "trans": "表 2 呈现了两个受访者群体的背包客动机排名和评分。（presents）", "explain": "主语 Table 2 是第三人称单数，句子描述表格当前呈现的内容，因此用 presents。", "q_show": "Table 2 ________ the ranking and ratings of backpacker motivations for both respondent groups."}, {"u": 7, "no": "15", "q": "Legends provide extra information, different from that in the main body of the Results section, to indicate other necessary ________.", "q_raw": "Legends provide extra information, different from that in the main body of the Results section, to indicate other necessary ________ (explain).", "raw": "explain", "a": "explanation", "trans": "图例提供额外信息，这些信息不同于结果部分正文中的内容，用于说明其他必要解释。（explanation）", "explain": "necessary 后需要名词。explain 应变为 explanation，表示“解释、说明”。", "q_show": "Legends provide extra information, different from that in the main body of the Results section, to indicate other necessary ________."}, {"u": 8, "no": "01", "q": "There are two types of reference to previous research: ______ of previous research with present research and support of previous research for present research.", "q_raw": "There are two types of reference to previous research: ______ (compare) of previous research with present research and support of previous research for present research.", "raw": "compare", "a": "comparison", "trans": "对前人研究的引用有两种类型：将前人研究与当前研究进行比较，以及用前人研究支持当前研究。（comparison）", "explain": "空格处作名词，表示“比较”。compare 应变为 comparison。", "q_show": "There are two types of reference to previous research: ______ of previous research with present research and support of previous research for present research."}, {"u": 8, "no": "02", "q": "Writers may make a ______ claim arising(由......产生) from results; however, doing so is discipline-specific and study-design specific.", "q_raw": "Writers may make a ______ (general) claim arising(由......产生) from results; however, doing so is discipline-specific and study-design specific.", "raw": "general", "a": "generalizable", "trans": "作者可以根据结果提出一个可推广的主张；然而，这样做取决于具体学科和研究设计。（generalizable）", "explain": "claim 是名词，前面需要形容词修饰。generalizable 表示“可推广的、可概括的”。", "q_show": "Writers may make a ______ claim arising from results; however, doing so is discipline-specific and study-design specific."}, {"u": 8, "no": "03", "q": "Discussion refers to considering both sides of a question before reaching a conclusion or considering the results of research and the ______ of these results.", "q_raw": "Discussion refers to considering both sides of a question before reaching a conclusion or considering the results of research and the ______ (imply) of these results.", "raw": "imply", "a": "implications", "trans": "讨论是指在得出结论前考虑问题的两个方面，或考虑研究结果及这些结果的启示。（implications）", "explain": "the 后面需要名词，且通常指多个影响或启示，因此 imply 变为 implications。", "q_show": "Discussion refers to considering both sides of a question before reaching a conclusion or considering the results of research and the ______ of these results."}, {"u": 8, "no": "04", "q": "______ aren’t about listing your errors, but about providing an accurate picture of what cannot be concluded from your study.", "q_raw": "______ (limit) aren’t about listing your errors, but about providing an accurate picture of what cannot be concluded ions", "trans": "结论通常用于总结并整合写作中涉及的主要领域，并对此给出最终评论或判断。（Conclusions）", "explain": "句子主语需要名词复数，conclude 应变为 Conclusions，表示“结论”。", "q_show": "______ usually serve to summarize and bring together the main areas covered in the writing and give a final comment or judgement on this."}, {"u": 8, "no": "08", "q": "The species-specific responses were ______ with earlier observations of root development.", "q_raw": "The species-specific responses were ______ (consist) with earlier observations of root development.", "raw": "consist", "a": "consistent", "trans": "这些物种特异性反应与早期关于根系发育的观察结果一致。（consistent）", "explain": "be consistent with 是固定搭配，表示“与……一致”。", "q_show": "The species-specific responses were ______ with earlier observations of root development."}, {"u": 8, "no": "09", "q": "These studies did not explore the effect of ______ in light availability at a specific stage on subsequent reproduction.", "q_raw": "These studies did not explore the effect of ______ (different) in light availability at a specific stage on subsequent reproduction.", "raw": "different", "a": "differences", "trans": "这些研究没有探讨特定阶段光照可用性差异对后续繁殖的影响。（differences）", "explain": "of 后面需要名词。different 应变为 differences，表示“差异”。", "q_show": "These studies did not explore the effect of ______ in light availability at a specific stage on subsequent reproduction."}, {"u": 8, "no": "10", "q": "The variation in light availability during the specific rosette stage affected ______ traits（性状） and plant size at maturity in the second year.", "q_raw": "The variation in light availability during the specific rosette stage affected ______ (produce) traits（性状） and plant size at maturity in the second year.", "raw": "produce", "a": "reproductive", "trans": "特定莲座期光照可用性的变化影响了第二年成熟时的繁殖性状和植株大小。（reproductive）", "explain": "traits 是名词，前面需要形容词修饰。reproductive 表示“繁殖的、生殖的”。", "q_show": "The variation in light availability during the specific rosette stage affected ______ traits and plant size at maturity in the second year."}, {"u": 8, "no": let cur={m:[],j:[],c:[],bank:[]};
const DEFAULT_LABELS="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

function es(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function norm(s){return String(s||"").trim().toLowerCase().replace(/\s+/g," ")}
function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function sm(a,n){return sh(a).slice(0,Math.min(n,a.length))}
function fil(a,u){return a.filter(x=>u.includes(x.u))}
function chosen(){return [...document.querySelectorAll(".unit:checked")].map(x=>+x.value)}

function answerText(q){
  if(!q.opts) return q.a;
  let op=q.opts.find(x=>x.label===q.a);
  return op ? `${q.a}. ${op.show||op.text}` : q.a;
}
function expHtml(q,kind){
  if(kind==="m"){
    return `<div class="cn"><b>题目翻译：</b><br>${es(q.trans)}</div>
            <div class="cn"><b>正确答案：</b><br>${es(answerText(q))}</div>
            <div class="explain"><b>解释：</b><br>${es(q.explain)}</div>`;
  }
  if(kind==="j"){
    let tf=q.a==="A" ? "A. True / 正确" : "B. False / 错误";
    return `<div class="cn"><b>题目翻译：</b><br>${es(q.trans)}</div>
            <div class="cn"><b>正确答案：</b><br>${tf}</div>
            <div class="explain"><b>解释：</b><br>${es(q.explain)}</div>`;
  }
  return `<div class="cn"><b>句子翻译：</b><br>${es(q.trans)}</div>
          <div class="cn"><b>原始词：</b> ${es(q.raw)}<br><b>正确变形：</b> ${es(q.a)}</div>
          <div class="explain"><b>解释：</b><br>${es(q.explain)}</div>`;
}

function make(){
  let u=chosen();
  let c=sm(fil(DATA.c,u),15);
  let right=[...new Set(c.map(x=>x.raw).filter(Boolean))];
  let other=[...new Set(DATA.c.map(x=>x.raw).filter(Boolean).filter(w=>!right.includes(w)))];
  let bank=sh([...right,...sm(other,Math.max(0,19-right.length))]).slice(0,19);
  cur={m:sm(fil(DATA.m,u),30),j:sm(fil(DATA.j,u),15),c,bank};
  render();
  document.getElementById("score").style.display="none";
  updateStats();
  renderWrong();
}

function mc(q,i){
  let ops=q.opts.map((op,k)=>`<label class="opt"><input type="radio" name="m${i}" value="${es(op.label)}"><span><b>${es(op.label)}.</b> ${es(op.show||op.text)}</span></label>`).join("");
  return `<div class="q" id="m${i}" data-t="m" data-a="${es(q.a)}"><div class="head"><div class="qt">${i+1}. ${es(q.q_show||q.q)}</div><span class="tag">Unit ${q.u} · 原题${es(q.no)}</span></div><div class="opts">${ops}</div><div class="fb"></div><div class="exp">${expHtml(q,"m")}</div></div>`;
}
function ju(q,i){
  return `<div class="q" id="j${i}" data-t="j" data-a="${es(q.a)}"><div class="head"><div class="qt">${i+1}. ${es(q.q_show||q.q)}</div><span class="tag">Unit ${q.u} · 原题${es(q.no)}</span></div><div class="opts"><label class="opt"><input type="radio" name="j${i}" value="A"><span><b>A.</b> True</span></label><label class="opt"><input type="radio" name="j${i}" value="B"><span><b>B.</b> False</span></label></div><div class="fb"></div><div class="exp">${expHtml(q,"j")}</div></div>`;
}
function cl(q,i){
  return `<div class="q" id="c${i}" data-t="c" data-a="${es(q.a)}" data-raw="${es(q.raw)}"><div class="head"><div class="qt">${i+1}. ${es(q.q_show||q.q)}</div><span class="tag">Unit ${q.u} · 原题${es(q.no)}</span></div><div class="answer-row"><span class="small">从词库中选词并变形：</span><input type="text" name="c${i}" placeholder="请输入变形后的答案"></div><div class="fb"></div><div class="exp">${expHtml(q,"c")}</div></div>`;
}

function render(){
  document.getElementById("paper").innerHTML=
  `<section class="sec"><h2>Part I Multiple-choice Questions / 选择题</h2><p class="small">共30道。点击选项后立即显示中文翻译、答案和解释。</p>${cur.m.map(mc).join("")}</section>
   <section class="sec"><h2>Part II Judgments / 判断题</h2><p class="small">共15道。A=True，B=False。点击后立即显示中文翻译、答案和解释。</p>${cur.j.map(ju).join("")}</section>
   <section class="sec"><h2>Part III Cloze / 19选15变形填空</h2><p class="small">共15道。先从下方19个原始词中选词，再变形成正确答案。19个单词在电脑端和手机端都会悬浮固定，按 Enter 或离开输入框后显示翻译和解释。</p><div class="bank">${cur.bank.map(w=>`<span class="word">${es(w)}</span>`).join("")}</div>${cur.c.map(cl).join("")}</section>`;
  enableInstant();
  scrollTo({top:0,behavior:"smooth"});
}

function markQuestion(q,showEmpty=false){
  let t=q.dataset.t,a=q.dataset.a,u="";
  q.classList.remove("ok","bad");
  q.querySelectorAll(".opt").forEach(o=>o.classList.remove("ok","bad"));
  let fb=q.querySelector(".fb");

  if(t==="c"){
    let inp=q.querySelector("input[type=text]");
    u=inp.value;
    if(!showEmpty && !norm(u)){fb.className="fb";fb.innerHTML="";q.classList.remove("answered");updateStats();return null}
  }else{
    let ck=q.querySelector("input:checked");
    u=ck?ck.value:"";
    if(!showEmpty && !u){fb.className="fb";fb.innerHTML="";q.classList.remove("answered");updateStats();return null}
    q.querySelectorAll(".opt").forEach(o=>{
      let ip=o.querySelector("input");
      if(ip.value===a)o.classList.add("ok");
      if(ip.checked && ip.value!==a)o.classList.add("bad");
    });
  }

  let ok=t==="c"?norm(u)===norm(a):u===a;
  q.classList.add("answered");
  if(ok){
    q.classList.add("ok");
    fb.className="fb ok";
    fb.innerHTML=t==="c"
      ? `正确。原始词：<b>${es(q.dataset.raw)}</b>；应填：<b>${es(a)}</b>`
      : `正确。答案：<b>${es(a)}</b>`;
  }else{
    q.classList.add("bad");
    fb.className="fb bad";
    fb.innerHTML=t==="c"
      ? `错误。你的答案：<b>${es(u||"未作答")}</b>；原始词：<b>${es(q.dataset.raw)}</b>；正确答案：<b>${es(a)}</b>`
      : `错误。你的答案：<b>${es(u||"未作答")}</b>；正确答案：<b>${es(a)}</b>`;
  }
  updateStats();
  renderWrong();
  return ok;
}

function enableInstant(){
  document.querySelectorAll('.q[data-t="m"] input,.q[data-t="j"] input').forEach(x=>{
    x.addEventListener("change",()=>markQuestion(x.closest(".q")));
  });
  document.querySelectorAll('.q[data-t="c"] input[type=text]').forEach(x=>{
    x.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();markQuestion(x.closest(".q"),true)}});
    x.addEventListener("blur",()=>markQuestion(x.closest(".q")));
  });
}

function updateStats(){
  let done=0, correct=0, wrong=0, m=[0,0], j=[0,0], c=[0,0];
  document.querySelectorAll(".q").forEach(q=>{
    if(q.classList.contains("answered")){
      done++;
      let t=q.dataset.t;
      if(q.classList.contains("ok")){correct++; if(t==="m")m[0]++; if(t==="j")j[0]++; if(t==="c")c[0]++}
      else{wrong++}
      if(t==="m")m[1]++; if(t==="j")j[1]++; if(t==="c")c[1]++;
    }
  });
  let pct=done?Math.round(correct/done*100):0;
  let s=document.getElementById("score");
  s.style.display="block";
  s.innerHTML=`<div class="score">实时正确率：${pct}%</div>
  <div class="statgrid">
    <div class="stat"><span class="small">已做</span><b>${done}</b></div>
    <div class="stat"><span class="small">正确</span><b>${correct}</b></div>
    <div class="stat"><span class="small">错误</span><b>${wrong}</b></div>
    <div class="stat"><span class="small">总题数</span><b>${cur.m.length+cur.j.length+cur.c.length}</b></div>
  </div>
  <div class="small">选择题：${m[0]}/${m[1]||cur.m.length}；判断题：${j[0]}/${j[1]||cur.j.length}；填空题：${c[0]}/${c[1]||cur.c.length}</div>`;
}
function renderWrong(){
  let wrong=[...document.querySelectorAll(".q.bad")];
  let box=document.getElementById("wrongbox");
  if(!wrong.length){box.style.display="none";box.innerHTML="";return}
  box.style.display="block";
  box.innerHTML=`<h2>错题本（${wrong.length}）</h2><p class="small">以下是当前这套题中已经做错的题目。</p>`+
  wrong.map((q,i)=>`<div class="wrongitem"><b>${i+1}.</b> ${q.querySelector(".qt").textContent}<br><span class="small">正确答案：${es(q.dataset.a)}</span></div>`).join("");
}
function grade(){
  document.querySelectorAll(".q").forEach(q=>markQuestion(q,true));
  document.getElementById("score").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function reset(){
  document.querySelectorAll("input").forEach(x=>{if(x.type==="radio")x.checked=false;if(x.type==="text")x.value=""});
  document.querySelectorAll(".q,.opt").forEach(x=>x.classList.remove("ok","bad","answered"));
  document.querySelectorAll(".fb").forEach(x=>{x.className="fb";x.innerHTML=""});
  updateStats();
  renderWrong();
}
function load(){
  document.getElementById("bankinfo").textContent=`题库：选择题${DATA.m.length}道，判断题${DATA.j.length}道，词形填空${DATA.c.length}道。`;
  let us=[...new Set([...DATA.m,...DATA.j,...DATA.c].map(x=>x.u))].sort((a,b)=>a-b);
  document.getElementById("units").innerHTML='<span class="small">选择单元：</span>'+us.map(u=>`<label><input class="unit" type="checkbox" value="${u}" checked> Unit ${u}</label>`).join("");
  document.querySelectorAll(".unit").forEach(x=>x.onchange=make);
  make();
}
document.getElementById("g").onclick=make;
document.getElementById("sub").onclick=grade;
document.getElementById("r").onclick=reset;
document.getElementById("mg").onclick=make;
document.getElementById("ms").onclick=grade;
document.getElementById("mr").onclick=reset;
load();
</script>
</body>
</html>
