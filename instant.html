ons or weaknesses in the research"}, {"label": "D", "text": "provide a brief look at potential follow-up research studies. 简要展望可能的后续研究。", "show": "provide a brief look at potential follow-up research studies"}], "trans": "以下规则都可以用于构建讨论部分的框架，除了 ______。（B）", "explain": "讨论部分不能只讨论预期结果，也应讨论意外结果、负面结果和局限性。因此 B 不适合作为讨论部分的规则。", "q_show": "The following rules except for ______ can be applied to every discussion section to create a framework."}, {"u": 8, "no": "05", "q": "When writing the Discussion section, an author should be aware of the following pitfalls（陷阱） except for ______.", "a": "A", "opts": [{"label": "A", "text": "don’t rewrite the results section 不要重写结果部分。", "show": "don’t rewrite the results section"}, {"label": "B", "text": "draw conclusions from the findings without support 在没有支持的情况下从结果中得出结论。", "show": "draw conclusions from the findings without support"}, {"label": "C", "text": "bring up new information 提出新信息。", "show": "bring up new information"}, {"label": "D", "text": "cherry-pick the results to analyze 选择性挑选结果进行分析。", "show": "cherry-pick the results to analyze"}], "trans": "撰写讨论部分时，作者应注意以下陷阱，除了 ______。（A）", "explain": "“不要重写结果部分”是正确建议，不是陷阱；而无依据下结论、引入新信息、选择性分析结果都是讨论部分应避免的问题。", "q_show": "When writing the Discussion section, an author should be aware of the following pitfalls except for ______."}, {"u": 8, "no": "06", "q": "When writing the discussion section, which of the following approaches cannot be utilized to（用于） interpret the data?", "a": "A", "opts": [{"label": "A", "text": "Decontextualizing your findings within previous research and theory. 将你的研究发现从已有研究和理论背景中脱离出来。", "show": "Decontextualizing your findings within previous research and theory"}, {"label": "B", "text": "Identifying correlations, patterns, and relationships among the data. 识别数据之间的相关性、模式和关系。", "show": "Identifying correlations, patterns, and relationships among the data"}, {"label": "C", "text": "Discussing whether the results supported your hypothesis. 讨论结果是否支持你的假设。", "show": "Discussing whether the results supported your hypothesis"}, {"label": "D", "text": "Explaining unexpected results and evaluating their significance. 解释意外结果并评价其意义。", "show": "Explaining unexpected results and evaluating their significance"}], "trans": "撰写讨论部分时，以下哪种方法不能用于解释数据？（A）", "explain": "讨论部分应把研究发现放在已有研究和理论背景中解释，而不是使其脱离语境。因此 A 不能用于解释数据。", "q_show": "When writing the discussion section, which of the following approaches cannot be utilized to interpret the data?"}, {"u": 8, "no": "07", "q": "In an academic paper, the ________ section explains whether you solved the problem completely, or how much progress you’ve made in your field because of your work.", "a": "A", "opts": [{"label": "A", "text": "Conclusion 结论。", "show": "Conclusion"}, {"label": "B", "text": "Results 结果。", "show": "Results"}, {"label": "C", "text": "Hypothesis 假设。", "show": "Hypothesis"}, {"label": "D", "text": "Discussion 讨论。", "show": "Discussion"}], "trans": "在学术论文中，______ 部分说明你是否完全解决了问题，或者你的研究在该领域取得了多大进展。（A）", "explain": "结论部分通常总结研究贡献，说明研究问题是否得到解决，以及研究对领域发展的意义。", "q_show": "In an academic paper, the ________ section explains whether you solved the problem completely, or how much progress you’ve made in your field because of your work."}, {"u": 8, "no": "08", "q": "Which of the following descriptions fail to point out the purposes of a Conclusion?", "a": "A", "opts": [{"label": "A", "text": "Simply provide an overview of a paper. 只是提供论文概述。", "show": "Simply provide an overview of a paper"}, {"label": "B", "text": "Reiterate why your research is important. 重申你的研究为什么重要。", "show": "Reiterate why your research is important"}, {"label": "C", "text": "Leave readers feeling both satisfied yet hungry for more. 让读者既感到满足，又希望继续了解更多。", "show": "Leave readers feeling both satisfied yet hungry for more"}, {"label": "D", "text": "Help readers spark their desire to further explore the subject. 激发读者进一步探索该主题的兴趣。", "show": "Help readers spark their desire to further explore the subject"}], "trans": "以下哪一项没有指出结论部分的目的？（A）", "explain": "结论不只是简单概述论文，还要强调研究意义、总结贡献并引发进一步思考。因此 A 不符合结论部分的目的。", "q_show": "Which of the following descriptions fail to point out the purposes of a Conclusion?"}, {"u": 8, "no": "09", "q": "When writing the conclusion section, you should not ______.", "a": "A", "opts": [{"label": "A", "text": "introduce new information 引入新信息。", "show": "introduce new information"}, {"label": "B", "text": "keep it short and sweet 保持简短精炼。", "show": "keep it short and sweet"}, {"label": "C", "text": "address whether or not it answers your research questions. 说明研究是否回答了研究问题。", "show": "address whether or not it answers your research questions"}, {"label": "D", "text": "mention the limitations of your study and their implications 提及研究局限及其影响。", "show": "mention the limitations of your study and their implications"}], "trans": "撰写结论部分时，你不应该 ______。（A）", "explain": "结论部分不应引入正文中没有出现的新信息，应总结已有内容并说明研究意义。", "q_show": "When writing the conclusion section, you should not ______."}, {"u": 8, "no": "10", "q": "The language in the Discussion and Conclusion section should not be ________.", "a": "A", "opts": [{"label": "A", "text": "ambiguous 模糊的。", "show": "ambiguous"}, {"label": "B", "text": "correct 正确的。", "show": "correct"}, {"label": "C", "text": "clear 清楚的。", "show": "clear"}, {"label": "D", "text": "concise 简洁的。", "show": "concise"}], "trans": "讨论和结论部分的语言不应 ______。（A）", "explain": "讨论和结论部分的语言应正确、清楚、简洁，不应模糊。", "q_show": "The language in the Discussion and Conclusion section should not be ________."}, {"u": 8, "no": "11", "q": "______ cannot be utilized to（用于） summarize the main findings in the discussion section.", "a": "A", "opts": [{"label": "A", "text": "In line with（与......一致） the hypothesis… 与假设一致……", "show": "In line with the hypothesis…"}, {"label": "B", "text": "The results indicate that… 结果表明……", "show": "The results indicate that…"}, {"label": "C", "text": "The data suggest that… 数据表明……", "show": "The data suggest that…"}, {"label": "D", "text": "This analysis supports … 该分析支持……", "show": "This analysis supports …"}], "trans": "______ 不能用于总结讨论部分的主要发现。（A）", "explain": "标准答案为 A。B、C、D 更直接用于总结研究发现；A 更偏向说明结果与假设一致，不是典型的总结主要发现表达。", "q_show": "______ cannot be utilized to summarize the main findings in the discussion section."}, {"u": 8, "no": "12", "q": "Which element is represented by the statement “Further research is required to provide a greater depth of understanding of backpacker motivations…”?", "a": "A", "opts": [{"label": "A", "text": "Recommendation 建议。", "show": "Recommendation"}, {"label": "B", "text": "Agreement 一致。", "show": "Agreement"}, {"label": "C", "text": "Implication 启示。", "show": "Implication"}, {"label": "D", "text": "Limitation 局限。", "show": "Limitation"}], "trans": "句子 “Further research is required to provide a greater depth of understanding of backpacker motivations…” 表示哪一要素？（A）", "explain": "该句提出“需要进一步研究”，属于对未来研究的建议，因此选 A。", "q_show": "Which element is represented by the statement “Further research is required to provide a greater depth of understanding of backpacker motivations…”?"}, {"u": 8, "no": "13", "q": "Which of the following expressions cannot be used to express “Implication”?", "a": "A", "opts": [{"label": "A", "text": "The result fits into… 该结果符合……", "show": "The result fits into…"}, {"label": "B", "text": "Further progress can be provided by this… 这可以带来进一步进展……", "show": "Further progress can be provided by this…"}, {"label": "C", "text": "The findings imply that… 研究发现意味着……", "show": "The findings imply that…"}, {"label": "D", "text": "Our data leave open the question of whether… 我们的数据仍留下了……的问题。", "show": "Our data leave open the question of whether…"}], "trans": "以下哪种表达不能用于表示“启示/影响”？（A）", "explain": "标准答案为 A。“The result fits into...” 更像是表示结果与某理论或背景相符，不是典型表达 implication 的句式。", "q_show": "Which of the following expressions cannot be used to express “Implication”?"}, {"u": 8, "no": "14", "q": "Which of the following expressions can be used to express “Finding review”?", "a": "A", "opts": [{"label": "A", "text": "The research work reveals that… 该研究表明……", "show": "The research work reveals that…"}, {"label": "B", "text": "The result obtained agrees with… 所获得的结果与……一致。", "show": "The result obtained agrees with…"}, {"label": "C", "text": "This experiment has not shown… 本实验没有显示……", "show": "This experiment has not shown…"}, {"label": "D", "text": "The above account of… 上述关于……的说明。", "show": "The above account of…"}], "trans": "以下哪种表达可以用于表示“研究发现回顾”？（A）", "explain": "“The research work reveals that...” 可以直接引出对研究发现的回顾，因此选 A。", "q_show": "Which of the following expressions can be used to express “Finding review”?"}, {"u": 9, "no": "01", "q": "When writing an academic paper, by citing the sources we can ensure the following qualities(品质) of the paper except for ______.", "a": "A", "opts": [{"label": "A", "text": "plagiarism 剽窃。", "show": "plagiarism"}, {"label": "B", "text": "reliability 可靠性。", "show": "reliability"}, {"label": "C", "text": "accuracy 准确性。", "show": "accuracy"}, {"label": "D", "text": "verifiability 可验证性。", "show": "verifiability"}], "trans": "写学术论文时，通过引用资料来源，我们可以保证论文具有以下品质，除了 ______。（A）", "explain": "引用资料可以提高论文的可靠性、准确性和可验证性，但不能“保证剽窃”。相反，规范引用是为了避免剽窃。", "q_show": "When writing an academic paper, by citing the sources we can ensure the following qualities of the paper except for ______."}, {"u": 9, "no": "02", "q": "Which of the following information cannot be considered as the content of citations?", "a": "D", "opts": [{"label": "A", "text": "words (quotations, phrases, sayings) 文字，如引语、短语、谚语。", "show": "words (quotations, phrases, sayings)"}, {"label": "B", "text": "thoughts or ideas 思想或观点。", "show": "thoughts or ideas"}, {"label": "C", "text": "audio or visual material 音频或视觉材料。", "show": "audio or visual material"}, {"label": "D", "text": "common knowledge 常识。", "show": "common knowledge"}], "trans": "以下哪一类信息不能被视为引用的内容？（D）", "explain": "引用通常用于他人的文字、观点、音频或视觉材料。常识不需要引用，因此选 D。", "q_show": "Which of the following information cannot be considered as the content of citations?"}, {"u": 9, "no": "03", "q": "Differences in citation styles come down to formatting differences in ______.", "a": "D", "opts": [{"label": "A", "text": "the order of the information elements 信息要素的顺序。", "show": "the order of the information elements"}, {"label": "B", "text": "capitalization, punctuation, and presentation of the author’s name 大写、标点以及作者姓名的呈现方式。", "show": "capitalization, punctuation, and presentation of the author’s name"}, {"label": "C", "text": "how the individual references are presented within the text. 单个参考文献在正文中的呈现方式。", "show": "how the individual references are presented within the text"}, {"label": "D", "text": "All of them. 以上全部。", "show": "All of them"}], "trans": "引用格式之间的差异归结为 ______ 方面的格式差异。（D）", "explain": "不同引用格式的差异包括信息排列顺序、大小写和标点、作者姓名写法以及正文引用方式等，因此选 D。", "q_show": "Differences in citation styles come down to formatting differences in ______."}, {"u": 9, "no": "04", "q": "Which of the following items is optional when citing an article from a journal?", "a": "A", "opts": [{"label": "A", "text": "Issue Number 期号。", "show": "Issue Number"}, {"label": "B", "text": "Author(s) 作者。", "show": "Author(s)"}, {"label": "C", "text": "Publisher 出版者。", "show": "Publisher"}, {"label": "D", "text": "Title of Journal 期刊标题。", "show": "Title of Journal"}], "trans": "引用期刊文章时，以下哪一项是可选的？（A）", "explain": "引用期刊文章时，作者、期刊标题等是重要信息；期号在某些格式或情况下可能不是必须项，因此标准答案为 A。", "q_show": "Which of the following items is optional when citing an article from a journal?"}, {"u": 9, "no": "05", "q": "The following items must be included except for ______ when a book or a monograph is cited.", "a": "A", "opts": [{"label": "A", "text": "contact information 联系信息。", "show": "contact information"}, {"label": "B", "text": "author(s) or editors 作者或编辑。", "show": "author(s) or editors"}, {"label": "C", "text": "date and place of publication 出版日期和出版地点。", "show": "date and place of publication"}, {"label": "D", "text": "book title and publisher 书名和出版社。", "show": "book title and publisher"}], "trans": "引用书籍或专著时，以下项目都必须包括，除了 ______。（A）", "explain": "引用书籍或专著时，需要作者或编辑、书名、出版社、出版日期和地点等信息，但不需要联系信息。", "q_show": "The following items must be included except for ______ when a book or a monograph is cited."}, {"u": 9, "no": "06", "q": "Which of the following names is given by parents or Church at birth in an English-speaking country?", "a": "A", "opts": [{"label": "A", "text": "First name 名。", "show": "First name"}, {"label": "B", "text": "Family name 姓。", "show": "Family name"}, {"label": "C", "text": "Surname 姓。", "show": "Surname"}, {"label": "D", "text": "Middle name 中间名。", "show": "Middle name"}], "trans": "在英语国家，以下哪种名字是在出生时由父母或教会给予的？（A）", "explain": "First name 通常是出生时由父母或教会给予的名字，因此选 A。", "q_show": "Which of the following names is given by parents or Church at birth in an English-speaking country?"}, {"u": 9, "no": "07", "q": "In the English name “E. J. Milner-Gulland”, the full stops after “E” and “J” indicate that ______.", "a": "A", "opts": [{"label": "A", "text": "the corresponding names are abbreviated（缩写） 对应的名字被缩写了。", "show": "the corresponding names are abbreviated"}, {"label": "B", "text": "a last name is put before it 姓放在它前面。", "show": "a last name is put before it"}, {"label": "C", "text": "the corresponding names are unknown 对应的名字未知。", "show": "the corresponding names are unknown"}, {"label": "D", "text": "the two parts make up a last name 这两个部分组成一个姓。", "show": "the two parts make up a last name"}], "trans": "在英文姓名 “E. J. Milner-Gulland” 中，“E”和“J”后面的句点表示 ______。（A）", "explain": "“E.” 和 “J.” 是名字或中间名的首字母缩写，后面的句点表示缩写。", "q_show": "In the English name “E. J. Milner-Gulland”, the full stops after “E” and “J” indicate that ______."}, {"u": 9, "no": "08", "q": "In a single citation, the names of two authors can be listed in the following ways except for ______.", "a": "A", "opts": [{"label": "A", "text": "Full stop (.) 句点。", "show": "Full stop (.)"}, {"label": "B", "text": "and 和。", "show": "and"}, {"label": "C", "text": "Comma (,) 逗号。", "show": "Comma (,)"}, {"label": "D", "text": "& 和号。", "show": "&"}], "trans": "在单个引用中，两位作者的姓名可以用以下方式列出，除了 ______。（A）", "explain": "两位作者姓名之间通常可以用 and、& 或逗号等连接，但句点不是用于连接两位作者姓名的方式。", "q_show": "In a single citation, the names of two authors can be listed in the following ways except for ______."}, {"u": 9, "no": "09", "q": "When citing the title of an article, if there is a subtitle, a ______ or an em dash is used between them.", "a": "A", "opts": [{"label": "A", "text": "colon 冒号。", "show": "colon"}, {"label": "B", "text": "full stop 句点。", "show": "full stop"}, {"label": "C", "text": "slash 斜杠。", "show": "slash"}, {"label": "D", "text": "hyphen 连字符。", "show": "hyphen"}], "trans": "引用文章标题时，如果有副标题，标题和副标题之间使用 ______ 或破折号。（A）", "explain": "英文标题和副标题之间通常使用冒号或长破折号连接，因此选 A。", "q_show": "When citing the title of an article, if there is a subtitle, a ______ or an em dash is used between them."}, {"u": 9, "no": "10", "q": "Which of the following errors belong to the common errors in the “in-text citations”?", "a": "A", "opts": [{"label": "A", "text": "Citing a cross reference without reading the original source. 没有阅读原始资料就引用转引文献。", "show": "Citing a cross reference without reading the original source"}, {"label": "B", "text": "Errors in listing names of authors, journal, year, volume number, etc. 作者姓名、期刊、年份、卷号等列写错误。", "show": "Errors in listing names of authors, journal, year, volume number, etc"}, {"label": "C", "text": "Error in number of authors listed. 作者人数列写错误。", "show": "Error in number of authors listed"}, {"label": "D", "text": "Incorporating irrelevant information. 加入无关信息。", "show": "Incorporating irrelevant information"}], "trans": "以下哪一项属于“文内引用”中的常见错误？（A）", "explain": "文内引用中的常见问题之一是没有阅读原始文献就进行转引，这会影响引用的准确性和可靠性。", "q_show": "Which of the following errors belong to the common errors in the “in-text citations”?"}, {"u": 9, "no": "11", "q": "Which of the following errors belong to the common errors in the “reference list”?", "a": "A", "opts": [{"label": "A", "text": "The journal format is not followed/not adhered to. 没有遵循期刊格式。", "show": "The journal format is not followed/not adhered to"}, {"label": "B", "text": "Duplication of citation in the manuscript. 文稿中重复引用。", "show": "Duplication of citation in the manuscript"}, {"label": "C", "text": "Citing a cross reference without reading the original source. 未阅读原始资料就引用转引文献。", "show": "Citing a cross reference without reading the original source"}, {"label": "D", "text": "Citing a reference based on its abstract only. 仅根据摘要引用文献。", "show": "Citing a reference based on its abstract only"}], "trans": "以下哪一项属于“参考文献列表”中的常见错误？（A）", "explain": "参考文献列表常见错误包括没有按照期刊或引用格式要求书写，因此标准答案为 A。", "q_show": "Which of the following errors belong to the common errors in the “reference list”?"}, {"u": 9, "no": "12", "q": "The Advantages of Using Endnotes exclude ______.", "a": "A", "opts": [{"label": "A", "text": "flipping to the end of the research paper to find the information. 翻到论文末尾查找信息。", "show": "flipping to the end of the research paper to find the information"}, {"label": "B", "text": "less distracting to the reader and allowing the narrative to flow better 较少干扰读者，使叙述更流畅。", "show": "less distracting to the reader and allowing the narrative to flow better"}, {"label": "C", "text": "not cluttering up the page 不使页面显得杂乱。", "show": "not cluttering up the page"}, {"label": "D", "text": "allowing the reader to read and contemplate all the notes at once 允许读者一次性阅读和思考所有注释。", "show": "allowing the reader to read and contemplate all the notes at once"}], "trans": "使用尾注的优点不包括 ______。（A）", "explain": "尾注的优点包括减少正文页面干扰、保持叙述流畅、集中阅读注释。但需要翻到文末查找信息并不是优点，因此选 A。", "q_show": "The Advantages of Using Endnotes exclude ______."}], "j": [{"u": 1, "no": "1", "q": "Tertiary sources refer to an index and/or textual condensation of primary and secondary sources.", "a": "A", "trans": "第三手资料是指对第一手和第二手资料进行索引和/或文字浓缩整理后的资料。（A）", "explain": "第三手资料的主要作用是整理、概括或索引第一手和第二手资料，所以该说法正确。", "q_show": "Tertiary sources refer to an index and/or textual condensation of primary and secondary sources."}, {"u": 1, "no": "2", "q": "SCI covers all disciplines of science, providing indexing and abstracts of journal articles in the world’s most important scientific journals.", "a": "A", "trans": "SCI 涵盖所有科学学科，为世界上重要科学期刊中的期刊论文提供索引和摘要。（A）", "explain": "SCI 是重要的科学引文索引，收录并索引许多重要科学期刊论文，所以该说法正确。", "q_show": "SCI covers all disciplines of science, providing indexing and abstracts of journal articles in the world’s most important scientific journals."}, {"u": 1, "no": "3", "q": "CNKI has built the most comprehensive system of China academic knowledge resources — China Integrated Knowledge Resources Database.", "a": "A", "trans": "中国知网建立了中国最全面的学术知识资源系统——中国知识资源总库。（A）", "explain": "中国知网是中国重要的学术知识资源平台，包含大量期刊、学位论文、会议论文等资源，所以该说法正确。", "q_show": "CNKI has built the most comprehensive system of China academic knowledge resources — China Integrated Knowledge Resources Database."}, {"u": 1, "no": "4", "q": "A domain name is a human-readable, alphanumeric label used to identify and locate resources on the internet.", "a": "A", "trans": "域名是一种人类可读的、由字母和数字组成的标签，用于识别和定位互联网上的资源。（A）", "explain": "域名的作用是帮助用户更方便地访问互联网资源，所以该说法正确。", "q_show": "A domain name is a human-readable, alphanumeric label used to identify and locate resources on the internet."}, {"u": 1, "no": "5", "q": "The suffix of a domain name is often an indicator of the type of information you will find there.", "a": "A", "trans": "域名后缀通常可以表明你将在该网站中找到的信息类型。（A）", "explain": "例如 .edu 通常表示教育机构，.gov 通常表示政府网站，.com 通常表示商业网站，所以该说法正确。", "q_show": "The suffix of a domain name is often an indicator of the type of information you will find there."}, {"u": 1, "no": "6", "q": "The materials located by using the electronic periodical index & database are of academic level while those obtained through Internet search engines have not gone through a peer-review.", "a": "A", "trans": "通过电子期刊索引和数据库检索到的资料通常具有学术水平，而通过互联网搜索引擎获得的资料不一定经过同行评审。（A）", "explain": "学术数据库中的资料通常更正式、更可靠，而普通搜索引擎中的内容来源复杂，不一定经过同行评审，所以该说法正确。", "q_show": "The materials located by using the electronic periodical index & database are of academic level while those obtained through Internet search engines have not gone through a peer-review."}, {"u": 1, "no": "7", "q": "The web sites retrieved in one engine may differ dramatically from those retrieved in another.", "a": "A", "trans": "一个搜索引擎检索到的网站可能与另一个搜索引擎检索到的网站有很大差异。（A）", "explain": "不同搜索引擎的索引范围、排序规则和算法不同，因此检索结果可能差异很大。", "q_show": "The web sites retrieved in one engine may differ dramatically from those retrieved in another."}, {"u": 1, "no": "8", "q": "Advanced searches may return many results, while simple searches will narrow the search without enough information.", "a": "B", "trans": "高级搜索可能返回很多结果，而简单搜索会在信息不足的情况下缩小检索范围。（B）", "explain": "通常情况下，高级搜索可以通过限定条件使检索更准确，往往会缩小范围；简单搜索反而可能返回大量宽泛结果。因此该说法错误。", "q_show": "Advanced searches may return many results, while simple searches will narrow the search without enough information."}, {"u": 1, "no": "9", "q": "When you search for articles, the more specific information you enter into the search fields, the more accurate your search will be.", "a": "A", "trans": "当你搜索文章时，在检索字段中输入的信息越具体，检索结果就越准确。（A）", "explain": "输入更具体的信息可以减少无关结果，提高检索准确性，所以该说法正确。", "q_show": "When you search for articles, the more specific information you enter into the search fields, the more accurate your search will be."}, {"u": 1, "no": "10", "q": "The search with operator AND will normally retrieve fewer results than if you search for one of the terms on its own. The more terms you enter, the narrower your search becomes.", "a": "A", "trans": "使用 AND 运算符进行检索通常会比单独检索其中一个词得到更少的结果。输入的检索词越多，检索范围就越窄。（A）", "explain": "AND 要求多个检索词同时出现，因此会缩小检索范围，所以该说法正确。", "q_show": "The search with operator AND will normally retrieve fewer results than if you search for one of the terms on its own. The more terms you enter, the narrower your search becomes."}, {"u": 1, "no": "11", "q": "The Boolean operator OR expands your search. The more terms you enter, the more documents you will retrieve.", "a": "A", "trans": "布尔运算符 OR 可以扩大检索范围。输入的检索词越多，检索到的文献就越多。（A）", "explain": "OR 表示任意一个检索词出现即可，因此可以扩大检索范围，所以该说法正确。", "q_show": "The Boolean operator OR expands your search. The more terms you enter, the more documents you will retrieve."}, {"u": 1, "no": "12", "q": "Operator NOT is generally used to narrow the search result, and it can improve the accuracy of the search result, so we should use it as often as possible.", "a": "B", "trans": "NOT 运算符通常用于缩小检索结果，并可以提高检索结果的准确性，因此我们应该尽可能经常使用它。（B）", "explain": "NOT 确实可以排除无关结果，但如果过度使用，也可能误删有用资料，所以不能“尽可能经常使用”。因此该说法错误。", "q_show": "Operator NOT is generally used to narrow the search result, and it can improve the accuracy of the search result, so we should use it as often as possible."}, {"u": 1, "no": "13", "q": "A wildcard is a symbol used to replace or represent one or more characters.", "a": "A", "trans": "通配符是一种用于替代或表示一个或多个字符的符号。（A）", "explain": "通配符可用于表示不确定字符，从而检索词形变化，所以该说法正确。", "q_show": "A wildcard is a symbol used to replace or represent one or more characters."}, {"u": 1, "no": "14", "q": "The NEAR proximity operator is used when you want to find the occurrence of search terms close to a specified number of words, in a particular order.", "a": "B", "trans": "当你想查找检索词在指定词数范围内、并按照特定顺序相邻出现时，可以使用 NEAR 邻近运算符。（B）", "explain": "NEAR 通常表示检索词彼此接近，但不一定要求按照特定顺序出现。因此该说法错误。", "q_show": "The NEAR proximity operator is used when you want to find the occurrence of search terms close to a specified number of words, in a particular order."}, {"u": 2, "no": "1", "q": "A research paper is a written document that presents the author’s original research, analysis, and interpretation of a specific topic or issue.", "a": "A", "trans": "科研论文是一种书面文件，用于呈现作者对某一特定主题或问题的原创研究、分析和解释。（A）", "explain": "科研论文的核心是展示作者围绕特定问题进行的原创性研究、分析和解释，因此该说法正确。", "q_show": "A research paper is a written document that presents the author’s original research, analysis, and interpretation of a specific topic or issue."}, {"u": 2, "no": "2", "q": "A vital step in research is to form a hypothesis based on thoughtful analysis of previous researches and their limitations, or problems and a possible solution.", "a": "A", "trans": "研究中的一个重要步骤是基于对已有研究及其局限、问题和可能解决方案的认真分析来形成假设。（A）", "explain": "研究假设通常建立在对已有研究的分析和问题发现基础上，因此该说法正确。", "q_show": "A vital step in research is to form a hypothesis based on thoughtful analysis of previous researches and their limitations, or problems and a possible solution."}, {"u": 2, "no": "3", "q": "A research paper synthesizes your discoveries about a research project and your judgment, interpretation, and evaluation of the discoveries.", "a": "A", "trans": "科研论文综合呈现你对研究项目的发现，以及你对这些发现的判断、解释和评价。（A）", "explain": "科研论文不仅呈现研究发现，还需要对发现进行解释、评价和综合分析，因此该说法正确。", "q_show": "A research paper synthesizes your discoveries about a research project and your judgment, interpretation, and evaluation of the discoveries."}, {"u": 2, "no": "4", "q": "A research proposal(计划书) should convince others that you have a worthwhile research project and that you have the competence（能力） and the work-plan to complete it.", "a": "A", "trans": "研究计划书应说服他人相信你的研究项目有价值，并且你具备完成该项目的能力和工作计划。（A）", "explain": "研究计划书的作用就是说明研究价值、可行性和研究者能力，因此该说法正确。", "q_show": "A research proposal should convince others that you have a worthwhile research project and that you have the competence and the work-plan to complete it."}, {"u": 2, "no": "5", "q": "Titles in noun phrases including gerunds（动名词） are conventional and widely used in scientific research papers.", "a": "A", "trans": "包含动名词的名词短语标题在科研论文中是常规且广泛使用的。（A）", "explain": "科研论文标题常采用名词短语结构，其中包含动名词是常见形式，因此该说法正确。", "q_show": "Titles in noun phrases including gerunds are conventional and widely used in scientific research papers."}, {"u": 2, "no": "6", "q": "When the title of a research paper consists of two parts, the relation between the two parts is the broad research field → specific study case.", "a": "A", "trans": "当科研论文标题由两部分组成时，两部分之间的关系通常是“宽泛研究领域 → 具体研究案例”。（A）", "explain": "复合标题常先指出大的研究领域，再用副标题限定具体对象、范围或案例，因此该说法正确。", "q_show": "When the title of a research paper consists of two parts, the relation between the two parts is the broad research field → specific study case."}, {"u": 2, "no": "7", "q": "It is prescribed（规定） by GB7713-87 that a title of a Chinese research paper should be no more than 20 words, while an English one within 12 words or 100 writing symbols.", "a": "A", "trans": "GB7713-87 规定，中文科研论文标题一般不超过 20 个字，英文标题一般不超过 12 个词或 100 个书写符号。（A）", "explain": "该说法符合相关论文标题长度规范要求，因此为正确。", "q_show": "It is prescribed by GB7713-87 that a title of a Chinese research paper should be no more than 20 words, while an English one within 12 words or 100 writing symbols."}, {"u": 2, "no": "8", "q": "A research paper requires its author to strictly adopt the correct academic style, which contains many elements from text structure to sentence pattern and word choice.", "a": "A", "trans": "科研论文要求作者严格采用正确的学术风格，这包括从篇章结构到句式和词语选择等多个方面。（A）", "explain": "科研论文写作强调学术规范，涉及结构、句式、用词和表达方式，因此该说法正确。", "q_show": "A research paper requires its author to strictly adopt the correct academic style, which contains many elements from text structure to sentence pattern and word choice."}, {"u": 3, "no": "1", "q": "The proportion of your abstract will vary, depending on the nature and genre of the paper that you are summarizing in your abstract.", "a": "A", "trans": "摘要各部分的比例会根据被概括论文的性质和体裁而变化。（A）", "explain": "不同类型论文的摘要结构和重点不同，各部分比例也会不同，因此该说法正确。", "q_show": "The proportion of your abstract will vary, depending on the nature and genre of the paper that you are summarizing in your abstract."}, {"u": 3, "no": "2", "q": "Your abstract should be intelligible（可读性） on its own, without a reader’s having to read your entire paper.", "a": "A", "trans": "摘要应能够独立被理解，而不需要读者阅读整篇论文。（A）", "explain": "摘要应是自足的文本，读者只看摘要也能了解研究的基本内容，因此该说法正确。", "q_show": "Your abstract should be intelligible on its own, without a reader’s having to read your entire paper."}, {"u": 3, "no": "3", "q": "Most of your abstract will describe what you have studied in your research and what you have found and what you argue in your paper.", "a": "A", "trans": "摘要的大部分内容会描述你的研究内容、研究发现以及论文中的论点。（A）", "explain": "摘要主要概括研究对象、研究发现和主要观点，因此该说法正确。", "q_show": "Most of your abstract will describe what you have studied in your research and what you have found and what you argue in your paper."}, {"u": 3, "no": "4", "q": "It’s a good idea to wait to write your abstract until after you’ve drafted your full paper, so that you know what you’re summarizing.", "a": "A", "trans": "等到完成全文草稿后再写摘要是一个好方法，这样你才知道自己要总结什么。（A）", "explain": "摘要需要概括全文内容，通常在论文完成或基本完成后撰写更准确，因此该说法正确。", "q_show": "It’s a good idea to wait to write your abstract until after you’ve drafted your full paper, so that you know what you’re summarizing."}, {"u": 3, "no": "5", "q": "Your brief mention of the important limitations to your research allows readers to accurately assess the credibility and generalizability of your research.", "a": "A", "trans": "简要提及研究的重要局限性，可以让读者准确评估研究的可信度和可推广性。（A）", "explain": "说明研究局限有助于读者判断研究结论的可靠性和适用范围，因此该说法正确。", "q_show": "Your brief mention of the important limitations to your research allows readers to accurately assess the credibility and generalizability of your research."}, {"u": 3, "no": "6", "q": "To keep your abstract short and clear, you should avoid passive sentences because they are often unnecessarily long.", "a": "A", "trans": "为了使摘要简短清晰，应避免使用被动句，因为被动句通常不必要地冗长。（A）", "explain": "被动句有时会使句子变长、表达不够直接。摘要强调简洁清楚，因此该说法正确。", "q_show": "To keep your abstract short and clear, you should avoid passive sentences because they are often unnecessarily long."}, {"u": 3, "no": "7", "q": "When writing the “Hypothesis” for target research which was not verified, we use subjunctive mood（虚拟语气）.", "a": "A", "trans": "当为尚未验证的目标研究撰写“假设”时，应使用虚拟语气。（A）", "explain": "未被验证的假设具有不确定性，使用虚拟语气可以体现这种假设性，因此该说法正确。", "q_show": "When writing the “Hypothesis” for target research which was not verified, we use subjunctive mood."}, {"u": 3, "no": "8", "q": "It is a rule to indicate an acronym（缩略词） in bracket（括号） in research papers when it is first presented (even in abstract) and will be used frequently.", "a": "A", "trans": "在科研论文中，当缩略词首次出现并且之后会频繁使用时，应在括号中注明该缩略词，即使是在摘要中也是如此。（A）", "explain": "学术写作中，缩略词首次出现时通常要给出完整形式和缩略形式，因此该说法正确。", "q_show": "It is a rule to indicate an acronym in bracket in research papers when it is first presented (even in abstract) and will be used frequently."}, {"u": 3, "no": "9", "q": "In abstracts, the discourse markers such as “indicated”, “revealed” and “suggest” indicate that “I am going to tell you the results in the following part”.", "a": "A", "trans": "在摘要中，“indicated”“revealed”和“suggest”等语篇标记表示“接下来我要告诉你研究结果”。（A）", "explain": "这些词常用于引出研究结果或发现，因此该说法正确。", "q_show": "In abstracts, the discourse markers such as “indicated”, “revealed” and “suggest” indicate that “I am going to tell you the results in the following part”."}, {"u": 3, "no": "10", "q": "In an abstract, the first person can be applied but frequent use will produce boring or awful effect although in some discipline it is always used.", "a": "A", "trans": "在摘要中可以使用第一人称，但频繁使用会产生单调甚至糟糕的效果，尽管某些学科中经常使用第一人称。（A）", "explain": "学术摘要中可以适当使用第一人称，但过度使用会影响正式性和表达效果，因此该说法正确。", "q_show": "In an abstract, the first person can be applied but frequent use will produce boring or awful effect although in some discipline it is always used."}, {"u": 4, "no": "1", "q": "The functions of Introduction are to arouse a reader’s interest and offer enough information to prepare readers to understand the paper and evaluate the findings of the study.", "a": "A", "trans": "引言的功能是激发读者兴趣，并提供足够信息，使读者能够理解论文并评价研究发现。（A）", "explain": "引言需要介绍背景、研究意义和必要信息，帮助读者进入论文主题，因此该说法正确。", "q_show": "The functions of Introduction are to arouse a reader’s interest and offer enough information to prepare readers to understand the paper and evaluate the findings of the study."}, {"u": 4, "no": "2", "q": "The Introduction section provides all background information whether directly or indirectly related to the current research.", "a": "B", "trans": "引言部分提供所有背景信息，无论这些信息是否与当前研究直接或间接相关。（B）", "explain": "引言应提供与当前研究相关的必要背景信息，而不是包含所有背景信息。无关背景会影响论文聚焦性。", "q_show": "The Introduction section provides all background information whether directly or indirectly related to the current research."}, {"u": 4, "no": "3", "q": "Swales showed that establishing a research niche is often signaled by specific terminology that expresses a contrasting viewpoint, a critical evaluation of gaps in the literature, etc.", "a": "A", "trans": "Swales 指出，建立研究空白通常通过特定术语来表示，这些术语表达对比性观点、对文献空白的批判性评价等。（A）", "explain": "Swales 的 CARS 模型强调通过指出研究空白、提出问题或反驳已有观点来建立研究空白，因此该说法正确。", "q_show": "Swales showed that establishing a research niche is often signaled by specific terminology that expresses a contrasting viewpoint, a critical evaluation of gaps in the literature, etc."}, {"u": 4, "no": "4", "q": "The subject area of interest can be clearly identified in the first few sentences in the Introduction section.", "a": "A", "trans": "研究兴趣所在的主题领域可以在引言开头的几句话中被清楚识别出来。（A）", "explain": "引言开头通常用于介绍研究领域和背景，因此读者应能较早识别研究主题。", "q_show": "The subject area of interest can be clearly identified in the first few sentences in the Introduction section."}, {"u": 4, "no": "5", "q": "Literature review provides the research background, shows what has been done in the current research field, and what gaps exist in the knowledge.", "a": "A", "trans": "文献综述提供研究背景，说明当前研究领域已经完成了哪些工作，以及知识中存在哪些空白。（A）", "explain": "文献综述的主要功能就是回顾已有研究、展示研究现状并指出研究空白，因此该说法正确。", "q_show": "Literature review provides the research background, shows what has been done in the current research field, and what gaps exist in the knowledge."}, {"u": 4, "no": "6", "q": "It is important to cite sources in Introduction as evidence of the claims you are making.", "a": "A", "trans": "在引言中引用资料来源作为论证观点的证据是很重要的。（A）", "explain": "引言中的观点和背景通常需要文献支持，引用可以增强论证可信度。", "q_show": "It is important to cite sources in Introduction as evidence of the claims you are making."}, {"u": 4, "no": "7", "q": "Failing to properly cite your sources counts as plagiarism（视作剽窃）, since you’re presenting someone else’s ideas as if they were your own.", "a": "A", "trans": "未能正确引用资料来源属于剽窃，因为你把他人的观点当作自己的观点呈现出来。（A）", "explain": "学术写作必须标明他人观点和资料来源，否则会构成学术不端。", "q_show": "Failing to properly cite your sources counts as plagiarism, since you’re presenting someone else’s ideas as if they were your own."}, {"u": 4, "no": "8", "q": "Reference sources are usually ordered according to their publication date.", "a": "A", "trans": "参考文献来源通常按照发表日期排序。（A）", "explain": "在某些引用体系或文献综述表达中，参考来源常可按照时间顺序组织，用于展示研究发展脉络。因此该题标准答案为 A。", "q_show": "Reference sources are usually ordered according to their publication date."}, {"u": 4, "no": "9", "q": "When writing the Introduction section, we can use simple present tense, present perfect（完成） tense and simple past tense.", "a": "A", "trans": "撰写引言部分时，可以使用一般现在时、现在完成时和一般过去时。（A）", "explain": "一般现在时常用于陈述普遍事实，现在完成时用于概括已有研究，一般过去时用于说明具体过去研究，因此该说法正确。", "q_show": "When writing the Introduction section, we can use simple present tense, present perfect tense and simple past tense."}, {"u": 4, "no": "10", "q": "To improve the coherence of your paragraphs, follow the “old-to-new” sequence: except for your paragraphs’ topic sentences, try to begin each sentence with “old information”.", "a": "A", "trans": "为了提高段落连贯性，应遵循“旧信息到新信息”的顺序：除了段落主题句外，尽量用“旧信息”开始每个句子。（A）", "explain": "“旧信息到新信息”的结构可以增强句子之间的衔接，使段落更连贯，因此该说法正确。", "q_show": "To improve the coherence of your paragraphs, follow the “old-to-new” sequence: except for your paragraphs’ topic sentences, try to begin each sentence with “old information”."}, {"u": 5, "no": "1", "q": "The purpose of the Method section is to provide a step-by-step description of how you conducted your empirical research to make it transparent and replicable.", "a": "A", "trans": "方法部分的目的是逐步描述你如何开展实证研究，使研究过程透明且可重复。（A）", "explain": "方法部分的核心作用就是说明研究过程，使他人能够理解并重复研究，因此该说法正确。", "q_show": "The purpose of the Method section is to provide a step-by-step description of how you conducted your empirical research to make it transparent and replicable."}, {"u": 5, "no": "2", "q": "When describing the materials, if necessary, provide enough details about your experimental protocol.", "a": "A", "trans": "描述材料时，如有必要，应提供关于实验方案的足够细节。（A）", "explain": "材料与实验方案会影响研究可重复性，因此必要时应提供充分细节，该说法正确。", "q_show": "When describing the materials, if necessary, provide enough details about your experimental protocol."}, {"u": 5, "no": "3", "q": "Clearly describe your experimental design, including the hypotheses you tested, controls, treatments, variables measured, what you actually measured, what form the data took, etc.", "a": "A", "trans": "清楚描述你的实验设计，包括所检验的假设、对照、处理、测量变量、实际测量内容、数据形式等。（A）", "explain": "这些都是方法部分需要说明的重要内容，有助于读者理解实验设计，所以该说法正确。", "q_show": "Clearly describe your experimental design, including the hypotheses you tested, controls, treatments, variables measured, what you actually measured, what form the data took, etc."}, {"u": 5, "no": "4", "q": "If you use animals in your experiment, mention relevant ethical considerations and submit your proposed research methods to the IACUC for approval prior to beginning your research.", "a": "A", "trans": "如果实验中使用动物，应说明相关伦理考虑，并在研究开始前将拟定研究方法提交给 IACUC 审批。（A）", "explain": "动物实验需要伦理审查和批准，确保实验符合动物保护和科研伦理要求，因此该说法正确。", "q_show": "If you use animals in your experiment, mention relevant ethical considerations and submit your proposed research methods to the IACUC for approval prior to beginning your research."}, {"u": 5, "no": "5", "q": "If human subjects are involved in your experiment, the procedures followed must be in accordance with the relevant Institutional Review Board for your specialty（专业领域）.", "a": "A", "trans": "如果实验涉及人类受试者，所遵循的程序必须符合相关机构审查委员会的要求。（A）", "explain": "涉及人类受试者的研究需要符合伦理审查要求，保护受试者权益，因此该说法正确。", "q_show": "If human subjects are involved in your experiment, the procedures followed must be in accordance with the relevant Institutional Review Board for your specialty."}, {"u": 5, "no": "6", "q": "If the use of proprietary（专有的） products is critical to the study, trade names have to be mentioned and capitalized to distinguish them from generic names.", "a": "A", "trans": "如果专有产品的使用对研究至关重要，则必须提及商品名，并将其首字母大写，以区别于通用名称。（A）", "explain": "当专有产品影响研究可重复性时，应明确说明商品名，并按规范书写，因此该说法正确。", "q_show": "If the use of proprietary products is critical to the study, trade names have to be mentioned and capitalized to distinguish them from generic names."}, {"u": 5, "no": "7", "q": "It should be clear from the Methods section how all of the data in the Results section were obtained.", "a": "A", "trans": "从方法部分应能清楚看出结果部分中的所有数据是如何获得的。（A）", "explain": "结果部分的数据来源应能在方法部分找到对应说明，这有助于保证论文逻辑完整和研究可重复。", "q_show": "It should be clear from the Methods section how all of the data in the Results section were obtained."}, {"u": 5, "no": "8", "q": "All materials and instruments should be identified, including the supplier’s name and location.", "a": "A", "trans": "所有材料和仪器都应被明确说明，包括供应商名称和所在地。（A）", "explain": "材料和仪器信息有助于他人重复实验，因此应尽量明确标识。", "q_show": "All materials and instruments should be identified, including the supplier’s name and location."}, {"u": 5, "no": "9", "q": "Very frequently the experimental design and data collection procedures for an experiment cannot be separated and must be integrated together.", "a": "A", "trans": "很多情况下，实验设计和数据收集程序不能分开，必须结合在一起描述。（A）", "explain": "实验设计和数据收集往往相互关联，实际写作中常需要整合说明，因此该说法正确。", "q_show": "Very frequently the experimental design and data collection procedures for an experiment cannot be separated and must be integrated together."}, {"u": 5, "no": "10", "q": "Data analysis transforms unorganized data into actionable information, often through visualizations, statistical summaries, or predictive models.", "a": "A", "trans": "数据分析将无组织的数据转化为可操作的信息，通常通过可视化、统计总结或预测模型来实现。（A）", "explain": "数据分析的目的就是从原始或无序数据中提取有用信息，因此该说法正确。", "q_show": "Data analysis transforms unorganized data into actionable information, often through visualizations, statistical summaries, or predictive models."}, {"u": 5, "no": "11", "q": "If the authors used a technique from a published study, they should include a citation and a summary of the procedure in the text.", "a": "A", "trans": "如果作者使用了已发表研究中的技术，应在文中引用该研究，并总结其操作程序。（A）", "explain": "使用已有方法时需要引用来源，同时应简要说明方法步骤，便于读者理解和复现。", "q_show": "If the authors used a technique from a published study, they should include a citation and a summary of the procedure in the text."}, {"u": 5, "no": "12", "q": "When using a method described in another published source, you may report it in exactly the same way it was previously written.", "a": "B", "trans": "当使用另一篇已发表文献中描述的方法时，可以完全按照原文的写法进行报告。（B）", "explain": "不能直接照搬原文写法，否则可能构成抄袭。应引用原文，并用自己的语言概述方法。", "q_show": "When using a method described in another published source, you may report it in exactly the same way it was previously written."}, {"u": 5, "no": "13", "q": "Passive voice is often appropriate in method sections to show the emphasis on the procedure itself rather than on the researcher who conducted it.", "a": "A", "trans": "被动语态在方法部分通常是合适的，因为它强调的是程序本身，而不是执行该程序的研究者。（A）", "explain": "方法部分常关注实验过程和操作步骤，因此使用被动语态可以突出研究程序，该说法正确。", "q_show": "Passive voice is often appropriate in method sections to show the emphasis on the procedure itself rather than on the researcher who conducted it."}, {"u": 6, "no": "1", "q": "Depending on the discipline（学科）, journal, and the nature of the study, the Results, Discussion, and even Conclusion sections can be organized in varying ways.", "a": "A", "trans": "根据学科、期刊和研究性质的不同，结果、讨论甚至结论部分可以有不同的组织方式。（A）", "explain": "不同学科和期刊对论文结构要求不同，因此这些部分可以分开写，也可以部分合并写。", "q_show": "Depending on the discipline, journal, and the nature of the study, the Results, Discussion, and even Conclusion sections can be organized in varying ways."}, {"u": 6, "no": "2", "q": "If the Results section and Discussion section are written separately, the Results section systematically report the key findings, and Discussion interprets the findings.", "a": "A", "trans": "如果结果部分和讨论部分分开写，结果部分系统报告关键发现，讨论部分解释这些发现。（A）", "explain": "结果部分强调客观呈现，讨论部分强调解释意义和影响，因此该说法正确。", "q_show": "If the Results section and Discussion section are written separately, the Results section systematically report the key findings, and Discussion interprets the findings."}, {"u": 6, "no": "3", "q": "The Results section should simply state your findings without bias or interpretation.", "a": "A", "trans": "结果部分应简单陈述研究发现，不带偏见或解释。（A）", "explain": "结果部分应客观呈现数据和发现，避免主观评价和过度解释。", "q_show": "The Results section should simply state your findings without bias or interpretation."}, {"u": 6, "no": "4", "q": "The simple past tense should be used to describe the experiments that were completed before the paper was written.", "a": "A", "trans": "描述论文写作前已经完成的实验时，应使用一般过去时。（A）", "explain": "实验发生在论文写作之前，因此通常使用一般过去时。", "q_show": "The simple past tense should be used to describe the experiments that were completed before the paper was written."}, {"u": 6, "no": "5", "q": "The present tense should be used to refer to tables, figures, and graphs that we are using to present our results.", "a": "A", "trans": "当指代用于呈现结果的表格、图和图形时，应使用现在时。（A）", "explain": "表格和图在论文中当前存在，引用它们时通常使用现在时，如 “Table 1 shows...”。", "q_show": "The present tense should be used to refer to tables, figures, and graphs that we are using to present our results."}, {"u": 6, "no": "6", "q": "You need to report your statistical findings, without describing every step of your statistical analysis.", "a": "A", "trans": "你需要报告统计结果，但不必描述统计分析的每一步。（A）", "explain": "结果部分应呈现关键统计发现，不需要逐步重复所有统计分析过程。", "q_show": "You need to report your statistical findings, without describing every step of your statistical analysis."}, {"u": 6, "no": "7", "q": "The key findings in research should be presented and explained to show how they help to address the research question(s) and how they align with （与......一致）the objectives.", "a": "A", "trans": "研究中的关键发现应被呈现并说明，以展示它们如何帮助回答研究问题，以及如何与研究目标一致。（A）", "explain": "结果部分需要围绕研究问题和目标呈现关键发现，使读者理解结果与研究目的之间的关系。", "q_show": "The key findings in research should be presented and explained to show how they help to address the research question(s) and how they align with the objectives."}, {"u": 6, "no": "8", "q": "Presenting results that are never discussed; presenting results in chronological order rather than logical order; ignoring results that do not support the conclusions.", "a": "B", "trans": "呈现从未被讨论的结果；按时间顺序而不是逻辑顺序呈现结果；忽略不支持结论的结果。（B）", "explain": "这些都是结果写作中应避免的问题，不是正确做法，因此该判断为 B。", "q_show": "Presenting results that are never discussed; presenting results in chronological order rather than logical order; ignoring results that do not support the conclusions."}, {"u": 6, "no": "9", "q": "The Results section in an academic paper fully reflects the author’s actual research practice.", "a": "A", "trans": "学术论文中的结果部分充分反映作者的实际研究实践。（A）", "explain": "结果部分来源于研究过程中的实际观察、实验和数据，因此能够反映研究实践。", "q_show": "The Results section in an academic paper fully reflects the author’s actual research practice."}, {"u": 6, "no": "10", "q": "To summarize results, writers often use visual representations: Tables and figures are commonly included in the results sections to ensure clarity.", "a": "A", "trans": "为了总结结果，作者经常使用视觉呈现方式：表格和图通常被包含在结果部分中以确保清晰性。（A）", "explain": "表格和图能够清楚、直观地呈现数据和结果，因此常用于结果部分。", "q_show": "To summarize results, writers often use visual representations: Tables and figures are commonly included in the results sections to ensure clarity."}, {"u": 6, "no": "11", "q": "The Results section should give answers to all the hypotheses on the addressed issue.", "a": "B", "trans": "结果部分应对所研究问题的所有假设都给出答案。（B）", "explain": "结果部分应围绕研究问题呈现主要发现，但并不一定能或必须回答所有假设。因此按标准答案为 B。", "q_show": "The Results section should give answers to all the hypotheses on the addressed issue."}, {"u": 6, "no": "12", "q": "In an academic paper, the results should be listed according to their importance.", "a": "A", "trans": "在学术论文中，结果应按照其重要性列出。（A）", "explain": "结果通常应按照逻辑顺序或重要性组织，以突出主要发现，因此该说法正确。", "q_show": "In an academic paper, the results should be listed according to their importance."}, {"u": 6, "no": "13", "q": "Data in scientific papers are generally presented in one of three ways: text, data tables and figures.", "a": "A", "trans": "科学论文中的数据通常以三种方式之一呈现：文本、数据表和图。（A）", "explain": "文本、表格和图是科研论文中呈现数据的常见方式。", "q_show": "Data in scientific papers are generally presented in one of three ways: text, data tables and figures."}, {"u": 6, "no": "14", "q": "We should emphasize the main points of the data and never repeat in the text the information contained in tables and figures.", "a": "A", "trans": "我们应强调数据的主要要点，绝不在正文中重复表格和图中包含的信息。（A）", "explain": "正文应概括和强调图表中的关键趋势，而不是逐项重复图表中的所有数据。", "q_show": "We should emphasize the main points of the data and never repeat in the text the information contained in tables and figures."}, {"u": 7, "no": "1", "q": "A table is made up of a caption （特指标题部分的内容）or title, column titles and a table body (which contains quantitative or qualitative data), it may also include footnotes.", "a": "A", "trans": "表格由表注或标题、列标题和表格主体组成，表格主体包含定量或定性数据，也可以包括脚注。（A）", "explain": "表格通常包括标题、列名、主体数据和必要脚注，因此该说法正确。", "q_show": "A table is made up of a caption or title, column titles and a table body (which contains quantitative or qualitative data), it may also include footnotes."}, {"u": 7, "no": "2", "q": "Tables are read from top to bottom, so titles are placed above the body of the table and are left-aligned.", "a": "A", "trans": "表格通常从上到下阅读，因此标题放在表格主体上方，并且左对齐。（A）", "explain": "表格标题通常位于表格上方，便于读者先了解表格内容，因此该说法正确。", "q_show": "Tables are read from top to bottom, so titles are placed above the body of the table and are left-aligned."}, {"u": 7, "no": "3", "q": "Table legends are quite different from figure legends（图例）. Usually, they consist only of a single phrase or sentence.", "a": "A", "trans": "表格说明与图例有很大不同。通常，它们只由一个短语或一句话构成。（A）", "explain": "表格标题或说明通常比较简短，主要概括表格内容，因此该说法正确。", "q_show": "Table legends are quite different from figure legends. Usually, they consist only of a single phrase or sentence."}, {"u": 7, "no": "4", "q": "When using numerical data with decimals（小数） in table body, try to make the decimal points line up whenever possible.", "a": "A", "trans": "在表格主体中使用带小数的数据时，应尽可能使小数点对齐。（A）", "explain": "小数点对齐可以提高数值比较的清晰度和可读性，因此该说法正确。", "q_show": "When using numerical data with decimals in table body, try to make the decimal points line up whenever possible."}, {"u": 7, "no": "5", "q": "Table gridlines（网格线） should be invisible and only horizontal lines separating the caption, column titles and footnotes from each other should be left visible.", "a": "A", "trans": "表格网格线应尽量不可见，只保留用于分隔标题、列标题和脚注的横线。（A）", "explain": "学术表格通常避免使用过多竖线和网格线，保持简洁清楚，因此该说法正确。", "q_show": "Table gridlines should be invisible and only horizontal lines separating the caption, column titles and footnotes from each other should be left visible."}, {"u": 7, "no": "6", "q": "In a table, the first column contains the independent variables(自变量) by which you are seeking to（试图） present and describe the dependent variable(s).", "a": "A", "trans": "在表格中，第一列包含自变量，用于呈现和描述因变量。（A）", "explain": "表格第一列通常列出分类项或自变量，后续列展示相关数据或因变量，因此该说法正确。", "q_show": "In a table, the first column contains the independent variables by which you are seeking to present and describe the dependent variable(s)."}, {"u": 7, "no": "7", "q": "In the text （正文）of the paper, refer to（引用） the table within parentheses（括号）and summarize the content without repeating the data.", "a": "A", "trans": "在论文正文中，应在括号中引用表格，并总结其内容，而不是重复数据。（A）", "explain": "正文应概括表格中的主要趋势或重点，不应逐项重复表格数据，因此该说法正确。", "q_show": "In the text of the paper, refer to the table within parenthesesand summarize the content without repeating the data."}, {"u": 7, "no": "8", "q": "Captions for tables are placed above the table (typically left aligned), and captions for figures are placed below the figure.", "a": "A", "trans": "表格标题放在表格上方，通常左对齐；图的标题或图注放在图的下方。（A）", "explain": "这是学术写作中常见的表格和图注位置规范，因此该说法正确。", "q_show": "Captions for tables are placed above the table (typically left aligned), and captions for figures are placed below the figure."}, {"u": 7, "no": "9", "q": "Whether it’s a graph, chart, image, or diagram, figures help readers quickly interpret and understand the results and key points of a study.", "a": "A", "trans": "无论是曲线图、图表、图片还是示意图，图都能帮助读者快速解释和理解研究结果及关键点。（A）", "explain": "图形能直观呈现复杂信息，因此有助于读者理解研究结果。", "q_show": "Whether it’s a graph, chart, image, or diagram, figures help readers quickly interpret and understand the results and key points of a study."}, {"u": 7, "no": "10", "q": "Figures are read from bottom to up, so captions are placed below the figure and are left-justified.", "a": "A", "trans": "图通常从下往上阅读，因此图注放在图下方并左对齐。（A）", "explain": "标准答案为 A。这里按文件中的标准答案保留，图注通常位于图下方。", "q_show": "Figures are read from bottom to up, so captions are placed below the figure and are left-justified."}, {"u": 7, "no": "11", "q": "A figure Caption offers enough information for readers to understand the figure without relying on the main text.", "a": "A", "trans": "图注提供足够信息，使读者无需依赖正文也能理解图的内容。（A）", "explain": "好的图注应具有相对独立性，能帮助读者直接理解图，因此该说法正确。", "q_show": "A figure Caption offers enough information for readers to understand the figure without relying on the main text."}, {"u": 7, "no": "12", "q": "If the figure uses data from external sources, provide proper attribution in the caption or reference list.", "a": "A", "trans": "如果图使用了外部来源的数据，应在图注或参考文献列表中进行适当注明。（A）", "explain": "使用外部数据必须注明来源，避免学术不规范或侵权问题，因此该说法正确。", "q_show": "If the figure uses data from external sources, provide proper attribution in the caption or reference list."}, {"u": 7, "no": "13", "q": "In the legend（图例）, you will need to explain each panel that you label and give the reader a brief takeaway of what it shows.", "a": "A", "trans": "在图例中，需要解释每个标注的分图，并给读者简要说明其展示内容。（A）", "explain": "图例应帮助读者理解图中不同面板、符号或分组的含义，因此该说法正确。", "q_show": "In the legend, you will need to explain each panel that you label and give the reader a brief takeaway of what it shows."}, {"u": 8, "no": "1", "q": "While “Move 1. Provide Background Information” not obligatory（强制性）, this move is standard across disciplines（学科）, can occur at any point in a cycle of moves, and often initiates a new cycle.", "a": "A", "trans": "虽然“步骤 1：提供背景信息”不是强制性的，但这一步骤在各学科中都是标准的，可以出现在步骤循环中的任何位置，并且常常开启一个新的循环。（A）", "explain": "讨论部分中背景信息不一定必须出现，但它常用于开启新的讨论循环或帮助读者理解研究发现，因此该说法正确。", "q_show": "While “Move 1. Provide Background Information” not obligatory, this move is standard across disciplines, can occur at any point in a cycle of moves, and often initiates a new cycle."}, {"u": 8, "no": "2", "q": "As there is usually more than one result, discussion sections are often structured into（组织成） a series of discussion cycles.", "a": "A", "trans": "由于通常不止一个结果，讨论部分常常被组织成一系列讨论循环。（A）", "explain": "每个重要结果都可能需要单独解释、比较、评价和说明意义，因此讨论部分常呈现多个循环结构。", "q_show": "As there is usually more than one result, discussion sections are often structured into a series of discussion cycles."}, {"u": 8, "no": "3", "q": "When offering explanations and suggesting implications（建议、启示） of the findings, the language used is very tentative or cautious.", "a": "A", "trans": "在解释研究发现并提出其启示时，所使用的语言通常非常试探或谨慎。（A）", "explain": "讨论部分常涉及推断和解释，不能说得过于绝对，因此通常使用谨慎表达。", "q_show": "When offering explanations and suggesting implications of the findings, the language used is very tentative or cautious."}, {"u": 8, "no": "4", "q": "You can organize your discussion around key themes, hypotheses, or research questions, following the same structure as your results section.", "a": "A", "trans": "你可以围绕关键主题、假设或研究问题组织讨论，并遵循与结果部分相同的结构。（A）", "explain": "讨论部分可以与结果部分保持对应结构，这样有助于逻辑清晰和读者理解。", "q_show": "You can organize your discussion around key themes, hypotheses, or research questions, following the same structure as your results section."}, {"u": 8, "no": "5", "q": "You should only mention limitations that are directly relevant to your research objectives and share how much impact they had on achieving the aims of your research.", "a": "A", "trans": "你只应提及与研究目标直接相关的局限，并说明这些局限对实现研究目标产生了多大影响。（A）", "explain": "局限性应与研究目标和结论相关，而不是罗列无关问题，因此该说法正确。", "q_show": "You should only mention limitations that are directly relevant to your research objectives and share how much impact they had on achieving the aims of your research."}, {"u": 8, "no": "6", "q": "When making suggestions, just state that more studies should be done, not giving concrete ideas for how future work can build on areas that your own research was unable to address.", "a": "B", "trans": "提出建议时，只需说明应该开展更多研究，而不需要给出未来研究如何基于本研究未能解决领域继续推进的具体想法。（B）", "explain": "提出未来研究建议时，应给出具体方向，而不是笼统地说“需要更多研究”。因此该说法错误。", "q_show": "When making suggestions, just state that more studies should be done, not giving concrete ideas for how future work can build on areas that your own research was unable to address."}, {"u": 8, "no": "7", "q": "In dissertations and research papers, conclusions tend to be more complex and will also include sections on the significance of the findings and recommendations for future work.", "a": "A", "trans": "在学位论文和研究论文中，结论往往更复杂，也会包括研究发现意义和未来研究建议等内容。（A）", "explain": "较长或较正式的研究论文结论通常不仅总结结果，还会讨论贡献、意义和未来方向。", "q_show": "In dissertations and research papers, conclusions tend to be more complex and will also include sections on the significance of the findings and recommendations for future work."}, {"u": 8, "no": "8", "q": "Conclusions may be optional in research articles where consolidation of the study and general implications are covered in the Discussion section.", "a": "A", "trans": "在某些研究论文中，如果研究总结和一般启示已经包含在讨论部分中，结论部分可以是可选的。（A）", "explain": "有些期刊允许将讨论和结论合并，因此单独结论部分不一定必须存在。", "q_show": "Conclusions may be optional in research articles where consolidation of the study and general implications are covered in the Discussion section."}, {"u": 8, "no": "9", "q": "Swales & Feak (2012) stated that one of the challenges in writing conclusion is to find something that is worth saying and reasonably followed from the data.", "a": "A", "trans": "Swales 和 Feak（2012）指出，写结论的挑战之一是找到值得表达且能合理地从数据中推出的内容。（A）", "explain": "结论需要基于数据和研究结果，不能脱离证据随意发挥，因此该说法正确。", "q_show": "Swales & Feak (2012) stated that one of the challenges in writing conclusion is to find something that is worth saying and reasonably followed from the data."}, {"u": 8, "no": "10", "q": "Let pictures do the talking in your conclusion — if you have made good use of tables and figures you’ll only need to describe general trends.", "a": "B", "trans": "在结论中让图片来说话——如果你很好地使用了表格和图，你只需要描述总体趋势。（B）", "explain": "结论部分不应依赖图表来完成主要表达，而应明确总结研究发现、意义和建议。因此该说法错误。", "q_show": "Let pictures do the talking in your conclusion — if you have made good use of tables and figures you’ll only need to describe general trends."}, {"u": 8, "no": "11", "q": "You only need to direct your readers to important information rather than too much details in the Conclusion section.", "a": "A", "trans": "在结论部分，你只需要引导读者关注重要信息，而不是过多细节。（A）", "explain": "结论应简洁概括重点，不应展开大量细节，因此该说法正确。", "q_show": "You only need to direct your readers to important information rather than too much details in the Conclusion section."}, {"u": 8, "no": "12", "q": "The Conclusion section can be regarded as the summary（总结） of the Results and Discussion sections, so, it can be included in the Discussion section.", "a": "B", "trans": "结论部分可以被看作结果和讨论部分的总结，因此它可以包含在讨论部分中。（B）", "explain": "标准答案为 B。虽然有些文章会合并讨论和结论，但不能简单认为结论只是结果和讨论的总结，也不能因此一概并入讨论部分。", "q_show": "The Conclusion section can be regarded as the summary of the Results and Discussion sections, so, it can be included in the Discussion section."}, {"u": 8, "no": "13", "q": "It is acceptable to point out the limitations of your research in the Discussion section and to put forward recommendations for further study.", "a": "A", "trans": "在讨论部分指出研究局限并提出进一步研究建议是可以接受的。（A）", "explain": "讨论部分常包含研究局限和未来研究建议，因此该说法正确。", "q_show": "It is acceptable to point out the limitations of your research in the Discussion section and to put forward recommendations for further study."}, {"u": 8, "no": "14", "q": "In SCI papers, tentative words are used to express the results that did not appear directly in the experiments.", "a": "A", "trans": "在 SCI 论文中，试探性词语用于表达实验中没有直接出现的结果。（A）", "explain": "当作者表达推论、可能性或间接结果时，通常使用谨慎、试探性的语言，因此该说法正确。", "q_show": "In SCI papers, tentative words are used to express the results that did not appear directly in the experiments."}, {"u": 9, "no": "1", "q": "A citation style is a set of guidelines on how to cite sources in your academic writing.", "a": "A", "trans": "引用格式是一套关于如何在学术写作中引用资料来源的指南。（A）", "explain": "引用格式规定了文内引用和参考文献列表的写法，因此该说法正确。", "q_show": "A citation style is a set of guidelines on how to cite sources in your academic writing."}, {"u": 9, "no": "2", "q": "Not all citations appearing in the text need to be present in the References section.", "a": "B", "trans": "并非所有出现在正文中的引用都需要出现在参考文献部分。（B）", "explain": "一般情况下，正文中出现的引用都应在参考文献部分列出，因此该说法错误。", "q_show": "Not all citations appearing in the text need to be present in the References section."}, {"u": 9, "no": "3", "q": "When formatting in parenthetical citations, you include identifying details of the source in parentheses in the text.", "a": "A", "trans": "使用括号式引用格式时，需要在正文括号中包含资料来源的识别信息。（A）", "explain": "括号式引用通常在正文括号中写作者、年份或页码等信息，因此该说法正确。", "q_show": "When formatting in parenthetical citations, you include identifying details of the source in parentheses in the text."}, {"u": 9, "no": "4", "q": "A footnote is a note placed at the bottom of a page in a document, used to provide additional information, clarification, or references.", "a": "A", "trans": "脚注是放在文档页面底部的注释，用于提供补充信息、说明或参考文献。（A）", "explain": "脚注通常位于页面底部，用于补充说明或注明来源，因此该说法正确。", "q_show": "A footnote is a note placed at the bottom of a page in a document, used to provide additional information, clarification, or references."}, {"u": 9, "no": "5", "q": "To avoid interrupting the continuity of the text, footnote numbers are placed at the end of the sentence, clause, or phrase containing the quoted or paraphrased material.", "a": "A", "trans": "为了避免打断正文连续性，脚注编号通常放在包含引用或转述材料的句子、从句或短语末尾。（A）", "explain": "脚注编号放在相关内容后面可以减少对正文阅读的干扰，因此该说法正确。", "q_show": "To avoid interrupting the continuity of the text, footnote numbers are placed at the end of the sentence, clause, or phrase containing the quoted or paraphrased material."}, {"u": 9, "no": "6", "q": "Endnotes are placed at the end of a research paper and arranged sequentially in relation to where the reference appears in the paper.", "a": "A", "trans": "尾注放在研究论文末尾，并按照参考内容在论文中出现的位置顺序排列。（A）", "explain": "尾注通常集中放在文末，并按正文出现顺序编号排列，因此该说法正确。", "q_show": "Endnotes are placed at the end of a research paper and arranged sequentially in relation to where the reference appears in the paper."}, {"u": 9, "no": "7", "q": "Endnotes are used for citations in certain styles, or to add extra information that doesn’t fit smoothly into the main text.", "a": "A", "trans": "尾注用于某些格式中的引用，或用于添加不适合直接放入正文的额外信息。（A）", "explain": "尾注可以用于注明来源，也可以补充正文中不便展开的信息，因此该说法正确。", "q_show": "Endnotes are used for citations in certain styles, or to add extra information that doesn’t fit smoothly into the main text."}, {"u": 9, "no": "8", "q": "The endnote number appears after any punctuation, unless the clause ends with an em dash, in which case it appears before it.", "a": "A", "trans": "尾注编号出现在任何标点之后，除非该从句以长破折号结尾，在这种情况下尾注编号出现在长破折号之前。（A）", "explain": "这是尾注编号位置的格式要求，因此该说法正确。", "q_show": "The endnote number appears after any punctuation, unless the clause ends with an em dash, in which case it appears before it."}, {"u": 9, "no": "9", "q": "Each endnote has a unique number; don’t repeat the same number even if you cite the same source more than once.", "a": "A", "trans": "每条尾注都有唯一编号；即使多次引用同一来源，也不要重复使用同一个编号。（A）", "explain": "尾注按正文出现顺序编号，每一次注释都有独立编号，因此该说法正确。", "q_show": "Each endnote has a unique number; don’t repeat the same number even if you cite the same source more than once."}, {"u": 9, "no": "10", "q": "The terms references and works cited mean the same thing in academic writing.", "a": "A", "trans": "在学术写作中，references 和 works cited 这两个术语意思相同。（A）", "explain": "标准答案为 A。两者都指列出文中引用资料来源的部分，只是在不同引用格式中名称不同。", "q_show": "The terms references and works cited mean the same thing in academic writing."}, {"u": 9, "no": "11", "q": "The entries are not to be numbered in the Reference section.", "a": "A", "trans": "参考文献部分的条目不应编号。（A）", "explain": "许多作者-日期制引用格式中，参考文献条目通常不编号，而是按作者姓氏字母顺序排列，因此该说法正确。", "q_show": "The entries are not to be numbered in the Reference section."}, {"u": 9, "no": "12", "q": "The first line of each entry flushes with the left-hand margin in the Reference section.", "a": "A", "trans": "参考文献部分每个条目的第一行与左边距对齐。（A）", "explain": "参考文献条目常采用悬挂缩进，第一行左对齐，后续行缩进，因此该说法正确。", "q_show": "The first line of each entry flushes with the left-hand margin in the Reference section."}, {"u": 9, "no": "13", "q": "Begin your Works Cited page on a separate page at the end of your research paper.", "a": "A", "trans": "在研究论文末尾单独另起一页开始 Works Cited 页面。（A）", "explain": "Works Cited 通常放在论文末尾单独成页，因此该说法正确。", "q_show": "Begin your Works Cited page on a separate page at the end of your research paper."}, {"u": 9, "no": "14", "q": "A bibliography（参考文献） requires you to list all sources used during the course of your work, whether you have referred to them specifically in your paper or not.", "a": "A", "trans": "书目要求列出写作过程中使用过的所有资料来源，无论你是否在论文中特别引用它们。（A）", "explain": "bibliography 通常范围比 references 或 works cited 更广，可以包括参考过但未直接引用的资料，因此该说法正确。", "q_show": "A bibliography requires you to list all sources used during the course of your work, whether you have referred to them specifically in your paper or not."}, {"u": 9, "no": "15", "q": "Generally, the subtitles References/Works Cited/ Bibliography will be put at the beginning of the left margin, while occasionally in the center.", "a": "A", "trans": "一般来说，References / Works Cited / Bibliography 这些小标题放在左边距起始处，有时也居中放置。（A）", "explain": "这些标题的位置会根据具体格式要求不同而变化，可以左对齐，也可以居中，因此该说法正确。", "q_show": "Generally, the subtitles References/Works Cited/ Bibliography will be put at the beginning of the left margin, while occasionally in the center."}, {"u": 9, "no": "16", "q": "Some foreign surnames in English are compound surnames, while others have a prefix, such as De, Des, Du, La, Den, etc. Both should be written as a complete surname.", "a": "A", "trans": "英语中的一些外国姓氏是复合姓氏，另一些带有前缀，如 De、Des、Du、La、Den 等。二者都应作为完整姓氏书写。（A）", "explain": "复合姓氏和带前缀的姓氏都属于完整姓氏的一部分，引用时不能随意拆分，因此该说法正确。", "q_show": "Some foreign surnames in English are compound surnames, while others have a prefix, such as De, Des, Du, La, Den, etc. Both should be written as a complete surname."}], "c": [{"u": 1, "no": "01", "q": "Primary Sources are ______ materials on which other research is based. They have not been filtered through interpretation or evaluation.", "q_raw": "Primary Sources are ______ (origin) materials on which other research is based. They have not been filtered through interpretation or evaluation.", "raw": "origin", "a": "original", "trans": "第一手资料是其他研究所依据的原始材料。它们没有经过解释或评价的筛选。（original）", "explain": "空格后是名词 materials，因此前面需要形容词修饰。origin 应变为形容词 original，表示“原始的”。", "q_show": "Primary Sources are ______ materials on which other research is based. They have not been filtered through interpretation or evaluation."}, {"u": 1, "no": "02", "q": "The secondary sources are ________ and evaluations of primary sources. They are not evidence, but rather commentary on and discussion of evidence.", "q_raw": "The secondary sources are ________ (interpret) and evaluations of primary sources. They are not evidence, but rather commentary on and discussion of evidence.", "raw": "interpret", "a": "interpretations", "trans": "第二手资料是对第一手资料的解释和评价。它们本身不是证据，而是对证据的评论和讨论。（interpretations）", "explain": "空格处与 evaluations 并列，因此需要名词复数形式。interpret 应变为 interpretations，表示“解释”。", "q_show": "The secondary sources are ________ and evaluations of primary sources. They are not evidence, but rather commentary on and discussion of evidence."}, {"u": 1, "no": "03", "q": "The Tertiary sources are an index and/or textual ________ of primary and secondary sources.", "q_raw": "The Tertiary sources are an index and/or textual ________ (condense) of primary and secondary sources.", "raw": "condense", "a": "condensation", "trans": "第三手资料是对第一手和第二手资料的索引和/或文字浓缩整理。（condensation）", "explain": "textual 后面需要名词，condense 应变为 condensation，表示“浓缩、概括”。", "q_show": "The Tertiary sources are an index and/or textual ________ of primary and secondary sources."}, {"u": 1, "no": "04", "q": "Two main approaches are matching words in the query against（匹配) the database index and ______ the database using hypertext or hypermedia links.", "q_raw": "Two main approaches are matching words in the query against（匹配) the database index and ______ (travel) the database using hypertext or hypermedia links.", "raw": "travel", "a": "traversing", "trans": "两种主要方法是将查询词与数据库索引进行匹配，以及利用超文本或超媒体链接浏览数据库。（traversing）", "explain": "空格处与 matching 并列，因此需要动名词形式。traversing 表示“遍历、浏览”。", "q_show": "Two main approaches are matching words in the query against（) the database index and ______ the database using hypertext or hypermedia links."}, {"u": 1, "no": "05", "q": "Domain names help users navigate the web by translating human-friendly names into ______ IP addresses.", "q_raw": "Domain names help users navigate the web by translating human-friendly names into ______ (number) IP addresses.", "raw": "number", "a": "numeric", "trans": "域名通过将便于人类理解的名称转换为数字形式的 IP 地址，帮助用户浏览网络。（numeric）", "explain": "IP addresses 是名词短语，前面需要形容词修饰。number 应变为 numeric，表示“数字的”。", "q_show": "Domain names help users navigate the web by translating human-friendly names into ______ IP addresses."}, {"u": 1, "no": "06", "q": "The Boolean search is a type of search allowing to combine key words with operators such as AND, NOT, and OR to further produce more ________ results.", "q_raw": "The Boolean search is a type of search allowing to combine key words with operators such as AND, NOT, and OR to further produce more ________ (relate) results.", "raw": "relate", "a": "relevant", "trans": "布尔检索是一种允许使用 AND、NOT 和 OR 等运算符组合关键词，从而得到更相关结果的检索方式。（relevant）", "explain": "results 前面需要形容词修饰。relate 应变为 relevant，表示“相关的”。", "q_show": "The Boolean search is a type of search allowing to combine key words with operators such as AND, NOT, and OR to further produce more ________ results."}, {"u": 1, "no": "07", "q": "A Wildcard is a symbol (such as ? or *) used in a keyword database search to represent the presence of zero, one, or more than one ________ character.", "q_raw": "A Wildcard is a symbol (such as ? or *) used in a keyword database search to represent the presence of zero, one, or more than one ________ (specific) character.", "raw": "specific", "a": "unspecified", "trans": "通配符是在关键词数据库检索中使用的符号，例如 ? 或 *，用于表示零个、一个或多个未指定字符的存在。（unspecified）", "explain": "通配符表示不确定的字符，因此这里需要 specific 的反义形式 unspecified，表示“未指定的”。", "q_show": "A Wildcard is a symbol (such as ? or *) used in a keyword database search to represent the presence of zero, one, or more than one ________ character."}, {"u": 1, "no": "08", "q": "Truncation is a technique that ______ your search to include various word endings and spellings.", "q_raw": "Truncation is a technique that ______ (broad) your search to include various word endings and spellings.", "raw": "broad", "a": "broadens", "trans": "截词检索是一种扩大检索范围的技术，可以包含不同的词尾变化和拼写形式。（broadens）", "explain": "主语 Truncation 是单数，句子需要谓语动词第三人称单数形式。broad 应变为 broadens，表示“扩大”。", "q_show": "Truncation is a technique that ______ your search to include various word endings and spellings."}, {"u": 1, "no": "09", "q": "Proximity ______ are shorthand notations used during a search that usually has a number to indicate how close search terms should appear.", "q_raw": "Proximity ______ (operate) are shorthand notations used during a search that usually has a number to indicate how close search terms should appear.", "raw": "operate", "a": "operators", "tr e research paper, in which the author must be able to conduct ______ (fact) analysis of the data to evaluate his research materials in an unbiased manner（方式）.", "raw": "fact", "a": "factual", "trans": "分析型研究论文本质上是信息型研究论文的一个子类型，在这种论文中，作者必须能够对数据进行事实性分析，以客观评价研究材料。（factual）", "explain": "analysis 是名词，前面需要形容词修饰。fact 应变为 factual，表示“事实的、基于事实的”。", "q_show": "An analytical research paper is essentially a sub-type of an informative research paper, in which the author must be able to conduct ______ analysis of the data to evaluate his research materials in an unbiased manner."}, {"u": 2, "no": "11", "q": "A ______ research paper allows the writer to have an opportunity to convince or influence his targeted readers.", "q_raw": "A ______ (persuade) research paper allows the writer to have an opportunity to convince or influence his targeted readers.", "raw": "persuade", "a": "persuasive", "trans": "说服型研究论文使作者有机会说服或影响目标读者。（persuasive）", "explain": "research paper 是名词短语，前面需要形容词修饰。persuade 应变为 persuasive，表示“有说服力的”。", "q_show": "A ______ research paper allows the writer to have an opportunity to convince or influence his targeted readers."}, {"u": 2, "no": "12", "q": "The five-part structure of research papers (Introduction, Method, Results and Discussion plus Abstract) serves as the ______ basis for the content.", "q_raw": "The five-part structure of research papers (Introduction, Method, Results and Discussion plus Abstract) serves as the ______ (concept) basis for the content.", "raw": "concept", "a": "conceptual", "trans": "科研论文的五部分结构，即引言、方法、结果、讨论和摘要，构成内容的概念基础。（conceptual）", "explain": "basis 是名词，前面需要形容词修饰。concept 应变为 conceptual，表示“概念上的”。", "q_show": "The five-part structure of research papers (Introduction, Method, Results and Discussion plus Abstract) serves as the ______ basis for the content."}, {"u": 3, "no": "01", "q": "This paper ________ backpacker（背包客） interest in volunteer tourism and identifies overlaps in motivations between the two forms of tourism.", "q_raw": "This roduction to a paper to make them ______."}, {"u": 4, "no": "06", "q": "The citation model of “previous research findings + (researchers + publication year)” is ______ prominent.", "q_raw": "The citation model of “previous research findings + (researchers + publication year)” is ______ (inform) prominent.", "raw": "inform", "a": "information", "trans": "“前人研究发现 +（研究者 + 出版年份）”这种引用模式是信息突出的。（information）", "explain": "这里的标准答案是 information，构成 information prominent，表示突出研究信息而非作者本身。按原标准答案保留。", "q_show": "The citation model of “previous research findings + (researchers + publication year)” is ______ prominent."}, {"u": 4, "no": "07", "q": "The citation model of “researcher + (publication year) + previous research findings” is ______ prominent.", "q_raw": "The citation model of “researcher + (publication year) + previous research findings” is ______ (authority) prominent.", "raw": "authority", "a": "author", "trans": "“研究者 +（出版年份）+ 前人研究发现”这种引用模式是作者突出的。（author）", "explain": "这里的标准答案是 author，表示该引用模式突出作者或研究者本身。按原标准答案保留。", "q_show": "The citation model of “researcher + (publication year) + previous research findings” is ______ prominent."}, {"u": 4, "no": "08", "q": "Some of the _____ （学科）that have employed crossword puzzles include information systems (Gomez and Scher, 2005).", "q_raw": "Some of the _____ (discipline) （学科）that have employed crossword puzzles include information systems (Gomez and Scher, 2005).", "raw": "discipline", "a": "disciplines", "trans": "一些使用过填字游戏的学科包括信息系统学科（Gomez and Scher, 2005）。（disciplines）", "explain": "“Some of the...” 后通常接可数名词复数，因此 discipline 应变为 disciplines。", "q_show": "Some of the _____ that have employed crossword puzzles include information systems (Gomez and Scher, 2005)."}, {"u": 4, "no": "09", "q": "Davis (1997) _____ a Chutes and Ladders approach in teaching nitrogen transformations to cooperative extension audiences.", "q_raw": "Davis (1997) _____ (employ) a Chutes and Ladders approach in teaching nitrogen transformations to cooperative extension audiences.", "raw": "employ", "a": "employed", "trans": "Davis（1997）在向合作推广对象教授氮转化时采用了“梯子与滑梯”方法。（employed）", "explain": "句子引用的是 1997 年的一项具体研究，应用一般过去时。employ 变为 employed。", "q_show": "Davis (1997) _____ a Chutes and Ladders approach in teaching nitrogen transformations to cooperative extension audiences."}, {"u": 4, "no": "10", "q": "The two hypotheses regarding the use of crossword puzzles as graded, group exercises were ______ （表述）as follows: Hypothesis 1…Hypothesis 2….", "q_raw": "The two hypotheses regarding the use of crossword puzzles as graded, group exercises were ______(formulate) （表述）as follows: Hypothesis 1…Hypothesis 2….", "raw": "formulate", "a": "formulated", "trans": "关于将填字游戏作为计分的小组练习使用的两个假设表述如下：假设 1……假设 2……（formulated）", "explain": "主语 hypotheses 与 formulate 之间是被动关系，因此使用 were formulated。", "q_show": "The two hypotheses regarding the use of crossword puzzles as graded, group exercises were ______ as follows: Hypothesis 1…Hypothesis 2…."}, {"u": 4, "no": "11", "q": "They only focused on the response of plants to ______ changes in light availability and not temporal variability in the environmental constraints on plants.", "q_raw": "They only focused on the response of plants to ______ (space) changes in light availability and not temporal variability in the environmental constraints on plants.", "raw": "space", "a": "spatial", "trans": "他们只关注植物对光照可用性空间变化的反应，而没有关注植物环境限制因素的时间变化。（spatial）", "explain": "changes 是名词，前面需要形容词修饰。space 应变为 spatial，表示“空间的”。", "q_show": "They only focused on the response of plants to ______ changes in light availability and not temporal variability in the environmental constraints on plants."}, {"u": 4, "no": "12", "q": "A number of studies have indicated that changes in the ______ of light may result in variation in growth-related traits.", "q_raw": "A number of studies have indicated that changes in the ______ (available) of light may result in variation in growth-related traits.", "raw": "available", "a": "availabilit _ part of many authoritative English tests, such as CET, WSK, TOEFL, and GRE."}, {"u": 4, "no": "16", "q": "This paper, hoping to draw some attention to the design of MC, brings forth（提出） two ______ principles in the design of vocabulary MC options.", "q_raw": "This paper, hoping to draw some attention to the design of MC, brings forth（提出） two ______ (fundament) principles in the design of vocabulary MC options.", "raw": "fundament", "a": "fundamental", "trans": "本文希望引起人们对多项选择题设计的关注，并提出了词汇多项选择题选项设计中的两个基本原则。（fundamental）", "explain": "principles 是名词，前面需要形容词修饰。fundament 应变为 fundamental，表示“基本的、根本的”。", "q_show": "This paper, hoping to draw some attention to the design of MC, brings forth two ______ principles in the design of vocabulary MC options."}, {"u": 5, "no": "01", "q": "The four areas were approximately 2km by 2km in size and were ______ by varied development patterns.", "q_raw": "The four areas were approximately 2km by 2km in size and were ______ (character) by varied development patterns.", "raw": "character", "a": "characterized", "trans": "这四个区域的面积约为 2 公里乘 2 公里，并以不同的发展模式为特征。（characterized）", "explain": "句子为被动结构 were characterized by，表示“以……为特征”。", "q_show": "The four areas were approximately 2km by 2km in size and were ______ by varied development patterns."}, {"u": 5, "no": "02", "q": "______ study materials were received from 585 residents with a response rate of 61%.", "q_raw": "______ (complete) study materials were received from 585 residents with a response rate of 61%.", "raw": "complete", "a": "Completed", "trans": "共收到 585 名居民完成的研究材料，回应率为 61%。（Completed）", "explain": "study materials 前需要形容词或过去分词修饰。Completed 表示“已完成的”。", "q_show": "______ study materials were received from 585 residents with a response rate of 61%."}, {"u": 5, "no": "03", "q": "The survey included 20 questions, the majority addressing household food procurement, preparation, and ______.", "q_raw": "The survey included 20 questions, the majority addressing household food procurement, preparation, and ______ (consume).", "raw": "consume", "a": "consumption", "trans": "该调查包括 20 个问题，其中大多数涉及家庭食物采购、准备和消费。（consumption）", "explain": "空格处与 procurement 和 preparation 并列，需要名词形式。consume 应变为 consumption。", "q_show": "The survey included 20 questions, the majority addressing household food procurement, preparation, and ______."}, {"u": 5, "no": "04", "q": "The age range of ______ was 18-65, 62% were women, 38% were men, 74% self- as Hispanic or Latino, and 23% were unemployed.", "q_raw": "The age range of ______ (participate) was 18-65, 62% were women, 38% were men, 74% self- as Hispanic or Latino, and 23% were unemployed.", "raw": "participate", "a": "participants", "trans": "参与者的年龄范围为 18 至 65 岁，其中 62% 为女性，38% 为男性，74% 自认为是西班牙裔或拉丁裔，23% 失业。（participants）", "explain": "of 后面需要名词，且根据句意指多名参与者，因此用 participants。", "q_show": "The age range of ______ was 18-65, 62% were women, 38% were men, 74% self- as Hispanic or Latino, and 23% were unemployed."}, {"u": 5, "no": "05", "q": "The study area was divided into 10 homogeneous zones ______ according to the predominant plant formations, plant stratification, topography or recreational use.", "q_raw": "The study area was divided into 10 homogeneous zones ______ (classify) according to the predominant plant formations, plant stratification, topography or recreational use.", "raw": "classify", "a": "classified", "trans": "研究区域被划分为 10 个同质区域，这些区域根据主要植物群落、植物分层、地形或休闲用途进行分类。（classified）", "explain": "zones 与 classify 之间是被动关系，因此用过去分词 classified 作后置定语。", "q_show": "The study area was divided into 10 homogeneous zones ______ according to the predominant plant formations, plant stratification, topography or recreational use."}, {"u": 5, "no": "06", "q": "This research was ______ in August 2006 in four neighborhoods designated by municipal planning boundaries within a midsized Canadian municipality.", "q_raw": "This research was ______ (conduct) in August 2006 in four neighborhoods designated by municipal planning boundaries within a m
